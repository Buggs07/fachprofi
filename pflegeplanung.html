<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>PflegefachProfi | Shutter-Planung</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* ==========================================================================
   DESIGN SYSTEM & VARIABLES
   ========================================================================== */
:root {
  --primary: #2563eb; --primary-dark: #1e40af; --primary-light: #eff6ff;
  --purple: #8b5cf6; --pink: #ec4899;
  --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
  --bg-app: #f8fafc; --bg-surface: #ffffff;
  --text-main: #0f172a; --text-muted: #64748b; --border: #e2e8f0;
  
  --shadow-sm: 0 2px 4px rgba(15,23,42,0.04);
  --shadow-md: 0 8px 16px rgba(15,23,42,0.08);
  --shadow-lg: 0 20px 40px rgba(37,99,235,0.12);
  --shadow-glow: 0 0 20px rgba(37,99,235,0.25);
  
  --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
  --ease-spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
  --shutter-width: 55px;
}

/* ==========================================================================
   RESET & WRAPPER
   ========================================================================== */
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Inter', sans-serif; background: #cbd5e1; color: var(--text-main); display: flex; justify-content: center; height: 100vh; overflow: hidden; }
button { border: none; background: none; font-family: inherit; cursor: pointer; outline: none; }
h1, h2, h3, h4 { font-weight: 800; letter-spacing: -0.02em; }

.app-wrapper {
  width: 100%; max-width: 500px; height: 100vh; height: 100dvh;
  background: var(--bg-app); display: flex; flex-direction: column;
  position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.15); overflow: hidden;
  padding-bottom: 85px; /* Angepasst für die neue Navbar */
}

/* ==========================================================================
   TOPBAR
   ========================================================================== */
.topbar {
  padding: max(16px, env(safe-area-inset-top)) 20px 16px;
  background: rgba(255,255,255,0.9); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
  z-index: 50; flex-shrink: 0;
}
.brand { font-weight: 900; font-size: 18px; display: flex; align-items: center; gap: 8px; color: var(--text-main); }
.brand i { color: var(--primary); font-size: 22px; }
.stats { display: flex; gap: 8px; }
.stat-pill { background: var(--bg-surface); border: 1px solid var(--border); padding: 6px 12px; border-radius: 99px; font-size: 13px; font-weight: 800; display: flex; align-items: center; gap: 6px; box-shadow: var(--shadow-sm); }
.stat-pill .fa-bolt { color: var(--primary); }

/* ==========================================================================
   ROUTING VIEWS
   ========================================================================== */
.view { flex: 1; overflow-y: auto; overflow-x: hidden; display: none; opacity: 0; transform: translateY(10px); transition: 0.4s var(--ease); padding-bottom: 80px; }
.view.active { display: flex; flex-direction: column; opacity: 1; transform: translateY(0); }

/* ==========================================================================
   CATALOG VIEW (Selection)
   ========================================================================== */
.view-header { padding: 24px 20px 16px; }
.view-header h1 { font-size: 26px; line-height: 1.2; margin-bottom: 8px; }
.view-header p { font-size: 14px; font-weight: 500; color: var(--text-muted); line-height: 1.4; }

.catalog-list { padding: 0 20px 20px; display: flex; flex-direction: column; gap: 12px; }
.topic-card {
  background: var(--bg-surface); border: 1px solid var(--border); border-radius: 20px;
  padding: 16px 20px; display: flex; align-items: center; justify-content: space-between;
  box-shadow: var(--shadow-sm); cursor: pointer; transition: 0.2s var(--ease-spring);
}
.topic-card:active { transform: scale(0.97); border-color: var(--primary); box-shadow: var(--shadow-glow); }
.topic-info { display: flex; align-items: center; gap: 14px; }
.topic-icon { width: 44px; height: 44px; border-radius: 12px; background: var(--primary-light); color: var(--primary); display: grid; place-items: center; font-size: 20px; }
.topic-title h3 { font-size: 16px; margin-bottom: 4px; }
.topic-title p { font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.topic-arrow { color: var(--primary); font-size: 16px; width: 32px; height: 32px; background: var(--primary-light); border-radius: 50%; display: grid; place-items: center; }

/* ==========================================================================
   SHUTTER INTERFACE
   ========================================================================== */
.shutter-header { padding: 12px 20px; background: var(--bg-surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.btn-back { width: 36px; height: 36px; border-radius: 10px; background: var(--bg-app); color: var(--text-main); display: grid; place-items: center; font-size: 14px; transition: 0.2s; }
.btn-back:active { transform: scale(0.9); background: var(--border); }
.shutter-title-text { font-size: 16px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.shutter-wrapper { flex: 1; position: relative; overflow: hidden; }
.shutter-grid {
  display: grid; height: 100%; width: 100%;
  grid-template-columns: 1fr var(--shutter-width) var(--shutter-width);
  transition: grid-template-columns 0.6s var(--ease);
}

.col { border-right: 1px solid var(--border); background: var(--bg-app); display: flex; flex-direction: column; overflow: hidden; position: relative; }
.col:last-child { border-right: none; }

.col-header {
  height: 100%; width: var(--shutter-width); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
  background: white; color: var(--text-muted); cursor: pointer; transition: 0.3s; padding: 20px 0;
}
.col:hover .col-header { background: var(--primary-light); color: var(--primary); }
.col-header-text { writing-mode: vertical-rl; transform: rotate(180deg); font-weight: 800; font-size: 15px; letter-spacing: 1px; white-space: nowrap; }
.col-header i { font-size: 20px; transform: rotate(0deg); }

.click-hint { font-size: 10px; text-transform: uppercase; font-weight: 900; color: var(--primary); writing-mode: vertical-rl; transform: rotate(180deg); margin-top: auto; opacity: 0; transition: 0.3s; }
.col:not(.active) .click-hint { opacity: 1; animation: pulseHint 2s infinite; }
@keyframes pulseHint { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

.col.active { background: var(--bg-app); cursor: default; }
.col.active .col-header {
  height: auto; width: 100%; flex-direction: row; writing-mode: horizontal-tb; transform: none;
  justify-content: flex-start; padding: 20px; background: transparent; color: var(--primary);
  border-bottom: 2px solid var(--primary);
}
.col.active .col-header-text { writing-mode: horizontal-tb; transform: none; font-size: 20px; }

.col-content { flex: 1; padding: 20px; overflow-y: auto; opacity: 0; pointer-events: none; transition: opacity 0.4s var(--ease); padding-bottom: 100px;}
.col.active .col-content { opacity: 1; pointer-events: auto; }

.rich-card { background: white; border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow-sm); opacity: 0; transform: translateY(15px); }
.col.active .rich-card { animation: slideUpFade 0.5s var(--ease-spring) forwards; }
.col.active .rich-card:nth-child(1) { animation-delay: 0.1s; }
.col.active .rich-card:nth-child(2) { animation-delay: 0.2s; }
.col.active .rich-card:nth-child(3) { animation-delay: 0.3s; }
.col.active .rich-card:nth-child(4) { animation-delay: 0.4s; }
.col.active .rich-card:nth-child(5) { animation-delay: 0.5s; }
.col.active .rich-card:nth-child(6) { animation-delay: 0.6s; }

@keyframes slideUpFade { to { opacity: 1; transform: translateY(0); } }

.rich-card-title { font-size: 11px; text-transform: uppercase; font-weight: 900; color: var(--primary); margin-bottom: 6px; letter-spacing: 0.5px; }
.rich-card-text { font-size: 14px; font-weight: 600; line-height: 1.5; color: var(--text-main); }
.rich-card-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--primary-light); color: var(--primary); display: flex; align-items: center; justify-content: center; margin-bottom: 12px; font-size: 14px; }

/* ==========================================================================
   NEW ANIMATED BOTTOM NAVIGATION
   ========================================================================== */
.nav-bottom {
  position: absolute; bottom: 0; left: 0; width: 100%; height: 85px;
  background: rgba(255,255,255,0.98); backdrop-filter: blur(20px);
  border-top: 1px solid var(--border); display: flex; justify-content: space-evenly;
  align-items: flex-end; padding-bottom: calc(12px + env(safe-area-inset-bottom)); z-index: 1000;
}

/* Normal Nav Items */
.nav-item {
  position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: var(--text-muted); text-decoration: none; width: 20%; height: 100%;
  cursor: pointer; -webkit-tap-highlight-color: transparent; padding-top: 8px;
}
.nav-item .icon-wrapper {
  position: relative; width: 44px; height: 32px; display: flex; justify-content: center; align-items: center;
  transition: 0.4s var(--ease-spring); z-index: 2;
}
.nav-item i { font-size: 22px; transition: 0.4s var(--ease-spring); }
.nav-item span {
  font-size: 10px; font-weight: 800; margin-top: 4px; opacity: 0.8;
  transition: 0.4s var(--ease-spring);
}

/* Background Blob for Active State */
.nav-item::before {
  content: ''; position: absolute; top: 12px; left: 50%; transform: translate(-50%, 0) scale(0);
  width: 44px; height: 44px; background: var(--primary-light); border-radius: 50%;
  opacity: 0; transition: 0.4s var(--ease-spring); z-index: 1;
}

/* Active State Styles */
.nav-item.active { color: var(--primary); }
.nav-item.active .icon-wrapper { transform: translateY(-8px); }
.nav-item.active i { transform: scale(1.15); color: var(--primary); }
.nav-item.active span { opacity: 1; transform: translateY(-4px); color: var(--primary); }
.nav-item.active::before { transform: translate(-50%, -20px) scale(1); opacity: 1; }

/* The Central CTA ("Üben") Button */
.nav-cta {
  position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center;
  width: 20%; height: 100%; text-decoration: none; cursor: pointer; padding-top: 8px;
}
.nav-cta .cta-btn {
  position: absolute; top: -28px; left: 50%; transform: translateX(-50%);
  width: 62px; height: 62px; border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--pink));
  color: white; display: flex; justify-content: center; align-items: center;
  font-size: 26px; box-shadow: 0 10px 25px rgba(236, 72, 153, 0.4);
  border: 5px solid var(--bg-app); transition: 0.3s var(--ease-spring);
  animation: floatCTA 3s ease-in-out infinite; z-index: 10;
}
.nav-cta:active .cta-btn { transform: translate(-50%, 4px) scale(0.92); box-shadow: 0 4px 10px rgba(236, 72, 153, 0.3); animation: none; }
.nav-cta span { font-size: 10px; font-weight: 800; color: var(--text-muted); opacity: 0.8; transition: 0.4s var(--ease-spring); z-index: 2; margin-top: 36px; }
.nav-cta.active span { color: var(--pink); opacity: 1; }

@keyframes floatCTA {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-6px); }
}

/* Toast */
.toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); background: #0f172a; color: white; padding: 12px 24px; border-radius: 99px; font-size: 14px; font-weight: 800; box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 2000; opacity: 0; pointer-events: none; transition: 0.4s var(--ease-spring); }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="app-wrapper">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="brand"><i class="fa-solid fa-clipboard-list"></i> PflegefachProfi</div>
    <div class="stats">
      <div class="stat-pill"><i class="fa-solid fa-bolt"></i> <span>240 XP</span></div>
    </div>
  </header>

  <!-- VIEW 1: CATALOG -->
  <main class="view active" id="view-catalog">
    <div class="view-header">
      <h1>Pflegeplanung<br>Bibliothek</h1>
      <p>Wähle ein pflegerisches Problem, um die exakten Ziele und Maßnahmen nach Prüfungsstandard zu analysieren.</p>
    </div>
    <div class="catalog-list" id="catalog-container">
      <!-- Injected via JS -->
    </div>
  </main>

  <!-- VIEW 2: SHUTTER INTERFACE -->
  <main class="view" id="view-shutter" style="padding-bottom: 0;">
    <div class="shutter-header">
      <button class="btn-back" onclick="App.nav('view-catalog', 3)"><i class="fa-solid fa-chevron-left"></i></button>
      <div class="shutter-title-text" id="shutter-main-title">Titel</div>
    </div>
    
    <div class="shutter-wrapper">
      <div class="shutter-grid" id="shutter-grid">
        
        <!-- Column 1: Problem -->
        <div class="col active" data-col="1" onclick="Shutter.focus(1)">
          <div class="col-header">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span class="col-header-text">Pflegeproblem</span>
            <div class="click-hint">Tippe zum Öffnen</div>
          </div>
          <div class="col-content" id="content-problem"></div>
        </div>
        
        <!-- Column 2: Ziele -->
        <div class="col" data-col="2" onclick="Shutter.focus(2)">
          <div class="col-header">
            <i class="fa-solid fa-bullseye"></i>
            <span class="col-header-text">Pflegeziele</span>
            <div class="click-hint">Tippe zum Öffnen</div>
          </div>
          <div class="col-content" id="content-goals"></div>
        </div>
        
        <!-- Column 3: Maßnahmen -->
        <div class="col" data-col="3" onclick="Shutter.focus(3)">
          <div class="col-header">
            <i class="fa-solid fa-list-check"></i>
            <span class="col-header-text">Maßnahmen</span>
            <div class="click-hint">Tippe zum Öffnen</div>
          </div>
          <div class="col-content" id="content-measures"></div>
        </div>

      </div>
    </div>
  </main>

  <!-- TOAST -->
  <div class="toast" id="toastMsg">In Entwicklung</div>

  <!-- NEW BOTTOM NAVIGATION -->
  <nav class="nav-bottom">
    <a href="#" class="nav-item" onclick="App.mockNav('Home', 0)">
      <div class="icon-wrapper"><i class="fa-solid fa-house"></i></div>
      <span>Home</span>
    </a>
    <a href="#" class="nav-item" onclick="App.mockNav('Prüfungsthemen', 1)">
      <div class="icon-wrapper"><i class="fa-solid fa-book-medical"></i></div>
      <span>Themen</span>
    </a>
    
    <a href="#" class="nav-cta" onclick="App.mockNav('Üben', 2)">
      <div class="cta-btn"><i class="fa-solid fa-bolt"></i></div>
      <span>Üben</span>
    </a>

    <a href="#" class="nav-item active" onclick="App.nav('view-catalog', 3)">
      <div class="icon-wrapper"><i class="fa-solid fa-clipboard-list"></i></div>
      <span>Planung</span>
    </a>
    <a href="#" class="nav-item" onclick="App.mockNav('Handlungsketten', 4)">
      <div class="icon-wrapper"><i class="fa-solid fa-route"></i></div>
      <span>Ketten</span>
    </a>
  </nav>

</div>

<script>
/* ==========================================================================
   1. DATA STRUCTURE (Exam Focus)
   ========================================================================== */
const DATA = [
  {
    id: "p1", category: "Kardiologie", icon: "🫀",
    title: "Gefahr der Hypervolämie",
    problemText: "Der Pflegeempfänger hat eine fortgeschrittene Herzinsuffizienz (NYHA III). Es besteht die Gefahr einer kardialen Dekompensation mit akuter Überwässerung (Lungen-/Beinödeme).",
    goals: [
      { type: "Nahziel", text: "PE zeigt innerhalb von 48h keine Zunahme der peripheren Ödeme." },
      { type: "Fernziel", text: "PE hält sein Trockengewicht (+/- 500g) dauerhaft stabil." }
    ],
    measures: [
      "Pfk wiegt PE täglich morgens nüchtern zur Verlaufskontrolle.",
      "Pfk führt im FD/SD/ND eine strenge Ein- und Ausfuhrbilanzierung durch.",
      "Pfk kontrolliert 1x im FD Knöchel und Unterschenkel auf Ödembildung.",
      "Pfk beschränkt die tägliche Trinkmenge nach ärztl. AO auf 1.500 ml.",
      "Pfk positioniert PE bei Dyspnoe umgehend in Herzstuhllagerung zur Vorlastsenkung.",
      "Pfk verabreicht angeordnete Diuretika pünktlich im FD zur Entlastung."
    ]
  },
  {
    id: "p2", category: "Neurologie", icon: "🧠",
    title: "Aspirationsgefahr bei Dysphagie",
    problemText: "Nach einem ischämischen Apoplex leidet der PE an einer Schluckstörung. Es droht das Verschlucken von Nahrung oder Speichel mit Folge einer Aspirationspneumonie.",
    goals: [
      { type: "Nahziel", text: "PE toleriert angedickte Flüssigkeiten ohne Hustenreiz während der Mahlzeit." },
      { type: "Fernziel", text: "PE bleibt während des gesamten Aufenthalts pneumoniefrei." }
    ],
    measures: [
      "Pfk lagert PE zu jeder Mahlzeit strikt im 90°-Winkel (Oberkörper hoch).",
      "Pfk dickt alle Getränke auf Nektarkonsistenz an, um die Fließgeschwindigkeit zu senken.",
      "Pfk reicht Nahrungsmittel nur teelöffelweise an.",
      "Pfk führt nach jeder Mahlzeit eine Mundraumkontrolle auf Speisereste durch.",
      "Pfk belässt PE nach dem Essen für weitere 30 Minuten in aufrechter Position.",
      "Pfk saugt bei plötzlichem Husten/Verschlucken sofort ab."
    ]
  },
  {
    id: "p3", category: "Mobilität", icon: "🛏️",
    title: "Hohes Dekubitusrisiko",
    problemText: "Der PE ist stark immobil, kachektisch und stuhlinkontinent. Es besteht ein hohes Risiko für die Entstehung von Druckgeschwüren an den Prädilektionsstellen.",
    goals: [
      { type: "Nahziel", text: "Die Haut an Kreuzbein und Fersen zeigt bis zum Schichtende keine Rötung." },
      { type: "Fernziel", text: "Die Hautintegrität des PE bleibt dauerhaft vollständig erhalten." }
    ],
    measures: [
      "Pfk führt im FD und SD eine Hautinspektion aller Prädilektionsstellen durch.",
      "Pfk positioniert PE alle 2 Stunden im Wechsel (Rücken, 30° Li, 30° Re).",
      "Pfk lagert die Fersen des PE dauerhaft mit einem Kissen hohl.",
      "Pfk reinigt die Haut bei Inkontinenzereignissen sofort mit klarem Wasser.",
      "Pfk streicht gefährdete Hautstellen NICHT aus, um Mikrotraumen zu vermeiden.",
      "Pfk reicht im FD und SD eiweißreiche Zusatznahrung zur Gewebeunterstützung an."
    ]
  }
];

/* ==========================================================================
   2. APP & NAVIGATION LOGIC
   ========================================================================== */
const App = {
  init() {
    this.renderCatalog();
  },
  
  // Refined Navigation to handle indexing for the new Bottom Nav
  nav(id, navIndex = 3) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    
    this.updateNav(navIndex);
    if(navigator.vibrate) navigator.vibrate(15);
  },
  
  mockNav(name, navIndex) {
    const toast = document.getElementById("toastMsg");
    toast.textContent = `${name} Modul (kommt bald)`;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
    
    this.updateNav(navIndex);
    if(navigator.vibrate) navigator.vibrate(15);
  },
  
  updateNav(index) {
    const navItems = document.querySelectorAll('.nav-bottom > a');
    navItems.forEach(i => i.classList.remove('active'));
    if(navItems[index]) navItems[index].classList.add('active');
  },
  
  renderCatalog() {
    const list = document.getElementById('catalog-container');
    list.innerHTML = DATA.map(item => `
      <div class="topic-card" onclick="Shutter.open('${item.id}')">
        <div class="topic-info">
          <div class="topic-icon">${item.icon}</div>
          <div class="topic-title">
            <p>${item.category}</p>
            <h3>${item.title}</h3>
          </div>
        </div>
        <div class="topic-arrow"><i class="fa-solid fa-chevron-right"></i></div>
      </div>
    `).join('');
  }
};

/* ==========================================================================
   3. SHUTTER ENGINE
   ========================================================================== */
const Shutter = {
  open(id) {
    const data = DATA.find(d => d.id === id);
    if(!data) return;

    document.getElementById('shutter-main-title').innerText = data.title;
    
    document.getElementById('content-problem').innerHTML = `
      <div class="rich-card">
        <div class="rich-card-icon"><i class="fa-solid fa-user-injured"></i></div>
        <div class="rich-card-title">Situationsbeschreibung</div>
        <div class="rich-card-text">${data.problemText}</div>
      </div>
    `;

    document.getElementById('content-goals').innerHTML = data.goals.map(g => `
      <div class="rich-card">
        <div class="rich-card-title">${g.type}</div>
        <div class="rich-card-text">${g.text}</div>
      </div>
    `).join('');

    document.getElementById('content-measures').innerHTML = data.measures.map((m, i) => `
      <div class="rich-card">
        <div class="rich-card-title">Maßnahme ${i+1}</div>
        <div class="rich-card-text">${m}</div>
      </div>
    `).join('');

    this.focus(1);
    App.nav('view-shutter', 3);
  },

  focus(index) {
    document.querySelectorAll('.col').forEach(c => {
      c.classList.remove('active');
      const content = c.querySelector('.col-content');
      content.style.animation = 'none';
      content.offsetHeight; // trigger reflow
      content.style.animation = null; 
    });
    
    document.querySelector(`.col[data-col="${index}"]`).classList.add('active');
    
    const grid = document.getElementById('shutter-grid');
    if(index === 1) grid.style.gridTemplateColumns = "1fr var(--shutter-width) var(--shutter-width)";
    if(index === 2) grid.style.gridTemplateColumns = "var(--shutter-width) 1fr var(--shutter-width)";
    if(index === 3) grid.style.gridTemplateColumns = "var(--shutter-width) var(--shutter-width) 1fr";

    if(navigator.vibrate) navigator.vibrate(20);
  }
};

// Boot App
document.addEventListener('DOMContentLoaded', () => App.init());
</script>
</body>
</html>
