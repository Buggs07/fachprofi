<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>PflegefachProfi | Pflegeplanung</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root { --primary: #2563eb; --purple: #8b5cf6; --pink: #ec4899; --bg: #f8fafc; --text: #0f172a; --border: #e2e8f0; --shutter: 55px; }
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Inter', sans-serif; background: #cbd5e1; height: 100vh; overflow: hidden; display: flex; justify-content: center; }
.app-wrapper { width: 100%; max-width: 500px; height: 100vh; background: var(--bg); display: flex; flex-direction: column; position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.15); overflow: hidden; }

/* CONTENT AREA */
#content-area { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.view { flex: 1; overflow-y: auto; display: none; padding-bottom: 20px; }
.view.active { display: flex; flex-direction: column; }

/* NAVBAR */
.nav-bottom { flex-shrink: 0; height: 85px; background: white; border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); }
.nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #64748b; font-size: 10px; font-weight: 800; text-decoration: none; cursor: pointer; }
.nav-item.active { color: var(--primary); }
.nav-cta { position: relative; width: 60px; }
.nav-cta .btn { position: absolute; bottom: 20px; width: 50px; height: 50px; background: var(--primary); color: white; border-radius: 50%; display: grid; place-items: center; font-size: 20px; box-shadow: 0 4px 12px rgba(37,99,235,0.3); }

/* SHUTTER GRID */
.shutter-wrapper { flex: 1; display: grid; grid-template-columns: 1fr var(--shutter) var(--shutter); transition: 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
.col { border-right: 1px solid var(--border); background: white; display: flex; flex-direction: column; cursor: pointer; overflow: hidden; }
.col.active { background: var(--bg); }
.col-header { height: 100%; width: var(--shutter); display: flex; flex-direction: column; align-items: center; justify-content: center; writing-mode: vertical-rl; transform: rotate(180deg); font-weight: 800; color: #64748b; }
.active .col-header { height: auto; width: 100%; flex-direction: row; writing-mode: horizontal-tb; transform: none; justify-content: flex-start; padding: 20px; color: var(--primary); border-bottom: 2px solid var(--primary); }
.col-content { padding: 20px; opacity: 0; transition: 0.3s; overflow-y: auto; }
.active .col-content { opacity: 1; }
.card { background: white; border: 1px solid var(--border); padding: 16px; border-radius: 12px; margin-bottom: 12px; font-weight: 600; font-size: 14px; box-shadow: var(--shadow-sm); }
</style>
</head>
<body>

<div class="app-wrapper">
    <div id="content-area">
        <!-- View Katalog -->
        <main class="view active" id="view-catalog">
            <div style="padding: 24px;"><h1>Pflegeplanung</h1><p>Wähle ein Thema.</p></div>
            <div id="catalog-container" style="padding: 0 20px;"></div>
        </main>

        <!-- View Shutter -->
        <main class="view" id="view-shutter">
            <div class="shutter-wrapper" id="shutter-grid">
                <div class="col active" data-col="1" onclick="Shutter.focus(1)">
                    <div class="col-header"><i class="fa-solid fa-exclamation-circle"></i> Problem</div>
                    <div class="col-content" id="content-problem"></div>
                </div>
                <div class="col" data-col="2" onclick="Shutter.focus(2)">
                    <div class="col-header"><i class="fa-solid fa-bullseye"></i> Ziele</div>
                    <div class="col-content" id="content-goals"></div>
                </div>
                <div class="col" data-col="3" onclick="Shutter.focus(3)">
                    <div class="col-header"><i class="fa-solid fa-check"></i> Maßnahmen</div>
                    <div class="col-content" id="content-measures"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Navigation -->
    <nav class="nav-bottom">
        <a class="nav-item"><i class="fa-solid fa-house"></i>Home</a>
        <a class="nav-item"><i class="fa-solid fa-book"></i>Themen</a>
        <a class="nav-item nav-cta"><div class="btn"><i class="fa-solid fa-bolt"></i></div><span>Üben</span></a>
        <a class="nav-item active" onclick="switchView('catalog')"><i class="fa-solid fa-list"></i>Planung</a>
        <a class="nav-item"><i class="fa-solid fa-route"></i>Ketten</a>
    </nav>
</div>

<script>
const DATA = [
  { 
    id: "p1", title: "Herzinsuffizienz", prob: "Gefahr der Hypervolämie", 
    goals: ["Nahziel: Ödemreduktion bis 48h.", "Fernziel: Gewichtsstabilität (+/- 500g)."], 
    measures: ["Pfk wiegt täglich.", "Pfk bilanziert FD/SD.", "Pfk kontrolliert Ödeme.", "Pfk verabreicht Diuretika.", "Pfk überwacht Trinkmenge.", "Pfk pflegt Haut."] 
  }
];

function switchView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + id).classList.add('active');
}

function renderCatalog() {
    document.getElementById('catalog-container').innerHTML = DATA.map(item => `
        <div class="card" onclick="openShutter('${item.id}')">${item.title} <i class="fa-solid fa-chevron-right"></i></div>
    `).join('');
}

function openShutter(id) {
    const data = DATA.find(d => d.id === id);
    document.getElementById('content-problem').innerHTML = `<div class="card"><h3>${data.prob}</h3></div>`;
    document.getElementById('content-goals').innerHTML = data.goals.map(g => `<div class="card">${g}</div>`).join('');
    document.getElementById('content-measures').innerHTML = data.measures.map(m => `<div class="card">${m}</div>`).join('');
    switchView('shutter');
    Shutter.focus(1);
}

const Shutter = {
  focus(index) {
    document.querySelectorAll('.col').forEach(c => c.classList.remove('active'));
    document.querySelector(`.col[data-col="${index}"]`).classList.add('active');
    const grid = document.getElementById('shutter-grid');
    if(index === 1) grid.style.gridTemplateColumns = "1fr var(--shutter) var(--shutter)";
    if(index === 2) grid.style.gridTemplateColumns = "var(--shutter) 1fr var(--shutter)";
    if(index === 3) grid.style.gridTemplateColumns = "var(--shutter) var(--shutter) 1fr";
  }
};

renderCatalog();
</script>
</body>
</html>
