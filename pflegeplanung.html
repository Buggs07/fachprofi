<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>PflegefachProfi | Planung</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
    --primary: #2563eb; --primary-dark: #1e40af; --bg: #f8fafc;
    --text: #0f172a; --muted: #64748b; --border: #e2e8f0;
    --shutter-width: 55px; --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Inter', sans-serif; background: #cbd5e1; height: 100vh; overflow: hidden; display: flex; justify-content: center; }

.app-wrapper {
    width: 100%; max-width: 500px; height: 100vh; background: var(--bg);
    display: flex; flex-direction: column; position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.15); overflow: hidden;
}

/* NAVIGATION */
.nav-bottom {
    flex-shrink: 0; width: 100%; height: 75px; background: rgba(255,255,255,0.98);
    backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; 
    justify-content: space-evenly; align-items: flex-end; padding-bottom: calc(12px + env(safe-area-inset-bottom));
    z-index: 1000;
}
.nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text); text-decoration: none; width: 20%; cursor: pointer; }
.nav-item.active { color: var(--primary); }

/* CONTENT AREA */
#content-area { flex: 1; overflow: hidden; position: relative; }
.screen { display: none; height: 100%; flex-direction: column; }
.screen.active { display: flex; }

/* SHUTTER GRID */
.shutter-wrapper { flex: 1; position: relative; overflow: hidden; display: grid; grid-template-columns: 1fr var(--shutter-width) var(--shutter-width); transition: 0.6s var(--ease); }
.col { border-right: 1px solid var(--border); background: #f1f5f9; display: flex; flex-direction: column; overflow: hidden; cursor: pointer; }
.col.active { background: white; cursor: default; }
.col-header { padding: 20px; font-weight: 800; writing-mode: vertical-rl; transform: rotate(180deg); display: flex; align-items: center; justify-content: center; gap: 10px; }
.active .col-header { writing-mode: horizontal-tb; transform: none; justify-content: flex-start; color: var(--primary); border-bottom: 2px solid var(--primary); }
.col-content { padding: 20px; opacity: 0; pointer-events: none; transition: 0.3s; overflow-y: auto; }
.active .col-content { opacity: 1; pointer-events: auto; }

/* CARDS */
.card { background: white; border: 1px solid var(--border); padding: 16px; border-radius: 16px; margin-bottom: 12px; font-weight: 600; line-height: 1.4; box-shadow: var(--shadow-sm); }
</style>
</head>
<body>

<div class="app-wrapper">
    <div id="content-area">
        <!-- View 1: Katalog -->
        <main class="view active" id="view-catalog">
            <div style="padding: 24px;"><h1>Erkrankungen</h1><p>Wähle ein Thema.</p></div>
            <div id="catalog-list" style="padding: 0 20px;"></div>
        </main>

        <!-- View 2: Planung (Shutter) -->
        <main class="view" id="view-shutter">
            <div class="shutter-wrapper" id="shutter-grid">
                <div class="col active" data-col="1" onclick="focusCol(1)">
                    <div class="col-header"><i class="fa-solid fa-circle-exclamation"></i> Problem</div>
                    <div class="col-content" id="content-problem"></div>
                </div>
                <div class="col" data-col="2" onclick="focusCol(2)">
                    <div class="col-header"><i class="fa-solid fa-bullseye"></i> Ziele</div>
                    <div class="col-content" id="content-goals"></div>
                </div>
                <div class="col" data-col="3" onclick="focusCol(3)">
                    <div class="col-header"><i class="fa-solid fa-check"></i> Maßnahmen</div>
                    <div class="col-content" id="content-measures"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Bottom Nav -->
    <nav class="nav-bottom">
        <a class="nav-item"><i class="fa-solid fa-house"></i><span>Home</span></a>
        <a class="nav-item"><i class="fa-solid fa-book"></i><span>Themen</span></a>
        <a class="nav-item"><i class="fa-solid fa-bolt"></i><span>Üben</span></a>
        <a class="nav-item active" onclick="switchView('catalog')"><i class="fa-solid fa-clipboard-list"></i><span>Planung</span></a>
        <a class="nav-item"><i class="fa-solid fa-route"></i><span>Ketten</span></a>
    </nav>
</div>

<script>
const DATA = [
  { id: "p1", title: "Herzinsuffizienz", prob: "Gefahr der Hypervolämie", goals: ["Nahziel: Ödemreduktion", "Fernziel: Gewichtsstabilität"], measures: ["Pfk wiegt täglich.", "Pfk bilanziert FD/SD.", "Pfk kontrolliert Ödeme.", "Pfk verabreicht Diuretika.", "Pfk überwacht Trinkmenge.", "Pfk pflegt Haut."] }
];

function renderCatalog() {
    document.getElementById('catalog-list').innerHTML = DATA.map(item => `
        <div class="card" onclick="openShutter('${item.id}')">${item.title} <i class="fa-solid fa-chevron-right"></i></div>
    `).join('');
}

function openShutter(id) {
    const data = DATA.find(d => d.id === id);
    document.getElementById('content-problem').innerHTML = `<h3>${data.prob}</h3><p style="margin-top:10px">${data.title}</p>`;
    document.getElementById('content-goals').innerHTML = data.goals.map(g => `<div class="card">${g}</div>`).join('');
    document.getElementById('content-measures').innerHTML = data.measures.map(m => `<div class="card">${m}</div>`).join('');
    document.getElementById('view-catalog').classList.remove('active');
    document.getElementById('view-shutter').classList.add('active');
}

function switchView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + id).classList.add('active');
}

function focusCol(index) {
    document.querySelectorAll('.col').forEach(c => c.classList.remove('active'));
    document.querySelector(`.col[data-col="${index}"]`).classList.add('active');
    const grid = document.getElementById('shutter-grid');
    if(index === 1) grid.style.gridTemplateColumns = "1fr var(--shutter-width) var(--shutter-width)";
    if(index === 2) grid.style.gridTemplateColumns = "var(--shutter-width) 1fr var(--shutter-width)";
    if(index === 3) grid.style.gridTemplateColumns = "var(--shutter-width) var(--shutter-width) 1fr";
}

renderCatalog();
</script>
</body>
</html>
