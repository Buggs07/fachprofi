<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PflegefachProfi | Examen-Training</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root { --primary: #2563eb; --accent: #f43f5e; --success: #10b981; --danger: #ef4444; --bg: #f8fafc; --text: #0f172a; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { font-family: 'Inter', sans-serif; background: #e2e8f0; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        .app-container { width: 100%; max-width: 500px; height: 100vh; background: var(--bg); position: relative; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Training Views */
        .view { display: none; height: 100%; flex-direction: column; }
        .view.active { display: flex; }
        
        .header { padding: 32px 24px 20px; background: white; border-bottom: 1px solid var(--border); }
        .header h1 { font-size: 20px; color: var(--primary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .header p { font-size: 16px; font-weight: 600; color: var(--text); }
        
        .card-grid { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .option-card { padding: 18px; border-radius: 16px; background: white; border: 2px solid #e2e8f0; cursor: pointer; transition: 0.2s; font-weight: 600; }
        .option-card.selected { border-color: var(--primary); background: #eff6ff; }
        .option-card.correct { border-color: var(--success); background: #d1fae5; }
        .option-card.wrong { border-color: var(--danger); background: #fee2e2; }
        
        .footer { padding: 20px; background: white; border-top: 1px solid var(--border); }
        .btn-cta { width: 100%; padding: 18px; border-radius: 14px; background: linear-gradient(135deg, var(--primary), var(--purple, #8b5cf6)); color: white; font-size: 18px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-cta:disabled { background: #cbd5e1; cursor: not-allowed; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
        .pulse { animation: pulse 2s infinite; }
    </style>
</head>
<body>

<div class="app-container" id="app">
    <!-- View 1: Training -->
    <div id="view-training" class="view active">
        <div class="header">
            <h1 id="step-title">Schritt 1/2</h1>
            <p id="exam-question">Lade Frage...</p>
        </div>
        <div class="card-grid" id="cards"></div>
        <div class="footer">
            <button id="cta" class="btn-cta pulse" onclick="ExamController.validate()">Antwort prüfen</button>
        </div>
    </div>

    <!-- View 2: Result -->
    <div id="view-result" class="view">
        <div style="text-align:center; padding: 60px 20px;">
            <h2 id="res-msg">Perfekt!</h2>
            <div id="res-score" style="font-size: 48px; font-weight: 900; margin: 20px 0;">100%</div>
            <button class="btn-cta" onclick="location.reload()">Zurück zum Start</button>
        </div>
    </div>
</div>

<script>
const STATE = {
    step: 1,
    selected: [],
    score: 0
};

const EXAM_DATA = {
    title: "Herzinsuffizienz",
    goals: [
        { text: "Schmerzreduktion auf NRS 4 innerhalb 60 Min.", correct: true },
        { text: "Verbesserung der Atemsituation.", correct: true },
        { text: "Patient soll nie wieder krank werden.", correct: false },
        { text: "Patient soll nur noch liegen.", correct: false }
    ],
    measures: [
        { text: "Pfk erhebt im FD/SD die Schmerzintensität.", correct: true },
        { text: "Pfk lagert PE bei Bedarf hoch.", correct: true },
        { text: "Pfk achtet auf Bilanzierung.", correct: true },
        { text: "Pfk verabreicht Bedarfsmedikation.", correct: true },
        { text: "Pfk beobachtet Beinödeme.", correct: true },
        { text: "Pfk gibt Medis nach Gefühl.", correct: false },
        { text: "Pfk wäscht bei Zeit.", correct: false },
        { text: "Pfk lässt Patienten rennen.", correct: false }
    ]
};

const ExamController = {
    init() {
        this.render();
    },
    
    render() {
        const isStep1 = STATE.step === 1;
        const data = isStep1 ? EXAM_DATA.goals : EXAM_DATA.measures;
        const limit = isStep1 ? 2 : 5;
        
        document.getElementById('step-title').innerText = `Schritt ${STATE.step} von 2`;
        document.getElementById('exam-question').innerText = isStep1 ? `Wählen Sie 2 geeignete Ziele zu ${EXAM_DATA.title} aus.` : `Wählen Sie 5 geeignete Maßnahmen zu ${EXAM_DATA.title} aus.`;
        
        const grid = document.getElementById('cards');
        grid.innerHTML = '';
        data.forEach((item, i) => {
            const card = document.createElement('div');
            card.className = 'option-card';
            card.innerText = item.text;
            card.onclick = () => this.toggle(card, i, limit);
            grid.appendChild(card);
        });
    },

    toggle(el, i, limit) {
        if(STATE.selected.includes(i)) {
            STATE.selected = STATE.selected.filter(x => x !== i);
            el.classList.remove('selected');
        } else if(STATE.selected.length < limit) {
            STATE.selected.push(i);
            el.classList.add('selected');
        }
        document.getElementById('cta').disabled = STATE.selected.length !== limit;
    },

    validate() {
        const isStep1 = STATE.step === 1;
        const data = isStep1 ? EXAM_DATA.goals : EXAM_DATA.measures;
        const cards = document.querySelectorAll('.option-card');
        
        STATE.selected.forEach(i => {
            cards[i].classList.add(data[i].correct ? 'correct' : 'wrong');
        });
        
        setTimeout(() => {
            if(isStep1) {
                STATE.step = 2;
                STATE.selected = [];
                this.render();
                document.getElementById('cta').disabled = true;
                document.getElementById('cta').innerText = "Antwort prüfen";
            } else {
                this.showResult();
            }
        }, 1500);
    },

    showResult() {
        document.getElementById('view-training').classList.remove('active');
        document.getElementById('view-result').classList.add('active');
        setTimeout(() => window.location.reload(), 5000); // Auto-Return
    }
};

ExamController.init();
</script>
</body>
</html>
