<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PflegefachProfi | Planung</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root { --primary: #2563eb; --purple: #8b5cf6; --bg: #f8fafc; --text: #0f172a; --border: #e2e8f0; --shutter: 50px; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #cbd5e1; height: 100vh; overflow: hidden; }

/* APP LAYOUT */
.app-wrapper { width: 100%; max-width: 500px; height: 100vh; margin: 0 auto; background: var(--bg); display: flex; flex-direction: column; position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.1); }
#content-area { flex: 1; overflow: hidden; position: relative; }

/* SHUTTER GRID */
.shutter-grid { display: grid; height: 100%; transition: 0.5s var(--ease, cubic-bezier(0.2, 0.8, 0.2, 1)); }
.col { border-right: 1px solid var(--border); background: white; display: flex; flex-direction: column; cursor: pointer; overflow: hidden; }
.col-header { padding: 20px; font-weight: 900; background: var(--bg); height: 100%; display: flex; align-items: center; justify-content: center; writing-mode: vertical-rl; transform: rotate(180deg); }
.active .col-header { writing-mode: horizontal-tb; transform: none; justify-content: flex-start; height: 60px; background: #eff6ff; color: var(--primary); }
.col-content { padding: 20px; opacity: 0; pointer-events: none; height: 100%; overflow-y: auto; }
.active .col-content { opacity: 1; pointer-events: auto; }

/* HOME / CATALOG VIEW */
.catalog-list { padding: 20px; }
.item-card { background: white; padding: 20px; border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }

/* NAV */
.nav-bottom { height: 75px; background: white; border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; }
</style>
</head>
<body>

<div class="app-wrapper">
    <div id="content-area">
        <!-- View: Catalog -->
        <div id="view-catalog" class="screen">
            <header style="padding: 20px;"><h1>Erkrankungen</h1></header>
            <div class="catalog-list" id="topic-list"></div>
        </div>

        <!-- View: Shutter Planning -->
        <div id="view-shutter" class="screen" style="display:none;">
            <div class="shutter-grid" id="grid" style="grid-template-columns: 1fr var(--shutter) var(--shutter);">
                <div class="col active" data-col="1" onclick="focusCol(1)">
                    <div class="col-header"><i class="fa-solid fa-exclamation-circle"></i> Problem</div>
                    <div class="col-content" id="col-problem"></div>
                </div>
                <div class="col" data-col="2" onclick="focusCol(2)">
                    <div class="col-header"><i class="fa-solid fa-bullseye"></i> Ziele</div>
                    <div class="col-content" id="col-goals"></div>
                </div>
                <div class="col" data-col="3" onclick="focusCol(3)">
                    <div class="col-header"><i class="fa-solid fa-clipboard-check"></i> Maßnahmen</div>
                    <div class="col-content" id="col-measures"></div>
                </div>
            </div>
        </div>
    </div>

    <nav class="nav-bottom">
        <button onclick="switchView('catalog')"><i class="fa-solid fa-house"></i></button>
        <button><i class="fa-solid fa-layer-group"></i></button>
        <button><i class="fa-solid fa-bolt"></i></button>
    </nav>
</div>

<script>
const DATA = [
    { id: 1, title: "Herzinsuffizienz", prob: "Gefahr der Überwässerung", goals: ["Nahziel: Ödemreduktion", "Fernziel: Gewichtsstabilität"], measures: ["Bilanzieren", "Wiegen", "Diuretika"] },
    { id: 2, title: "Schlaganfall", prob: "Dysphagie", goals: ["Nahziel: Schluckfähigkeit", "Fernziel: Mobilität"], measures: ["Aspirationsschutz", "Bobath"] }
];

function renderCatalog() {
    const list = document.getElementById('topic-list');
    list.innerHTML = DATA.map(t => `<div class="item-card" onclick="openPlanning('${t.id}')">${t.title} <i class="fa-solid fa-arrow-right"></i></div>`).join('');
}

function openPlanning(id) {
    const p = DATA.find(x => x.id == id);
    document.getElementById('col-problem').innerHTML = `<h3>${p.prob}</h3>`;
    document.getElementById('col-goals').innerHTML = p.goals.map(g => `<div class="card">${g}</div>`).join('');
    document.getElementById('col-measures').innerHTML = p.measures.map(m => `<div class="card">${m}</div>`).join('');
    document.getElementById('view-catalog').style.display = 'none';
    document.getElementById('view-shutter').style.display = 'block';
}

function focusCol(index) {
    document.querySelectorAll('.col').forEach(c => c.classList.remove('active'));
    document.querySelector(`.col[data-col="${index}"]`).classList.add('active');
    const grid = document.getElementById('grid');
    if(index === 1) grid.style.gridTemplateColumns = "1fr var(--shutter) var(--shutter)";
    if(index === 2) grid.style.gridTemplateColumns = "var(--shutter) 1fr var(--shutter)";
    if(index === 3) grid.style.gridTemplateColumns = "var(--shutter) var(--shutter) 1fr";
}

function switchView(id) {
    document.getElementById('view-shutter').style.display = 'none';
    document.getElementById('view-catalog').style.display = 'block';
}

renderCatalog();
</script>
</body>
</html>
