<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>PflegefachProfi • Examenstraining</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* Design System verkürzt für Performance - Funktionalität im Fokus */
:root { --primary: #2563eb; --accent: #f43f5e; --success: #10b981; --danger: #ef4444; --bg: #f8fafc; }
* { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
body { font-family: 'Inter', sans-serif; background: #cbd5e1; height: 100vh; display: flex; justify-content: center; }
.app-wrapper { width: 100%; max-width: 500px; height: 100dvh; background: var(--bg); position: relative; overflow: hidden; }

/* Exam Layout */
.exam-header { padding: 24px; background: white; border-bottom: 1px solid #e2e8f0; }
.exam-title { font-size: 18px; font-weight: 900; color: var(--primary); margin-bottom: 8px; }
.exam-instr { font-size: 15px; font-weight: 600; color: #334155; line-height: 1.4; }
.exam-badge { display: inline-block; background: #fee2e2; color: #991b1b; padding: 4px 12px; border-radius: 6px; font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 12px; }

.cards-container { padding: 20px; display: flex; flex-direction: column; gap: 12px; height: calc(100vh - 200px); overflow-y: auto; }
.choice-card { padding: 18px; border-radius: 16px; background: white; border: 2px solid #e2e8f0; cursor: pointer; transition: 0.2s; }
.choice-card.selected { border-color: var(--primary); background: #eff6ff; }
.choice-card.correct { border-color: var(--success); background: #d1fae5; }
.choice-card.wrong { border-color: var(--danger); background: #fee2e2; }

.submit-btn { width: calc(100% - 40px); margin: 20px; padding: 20px; border-radius: 16px; background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; font-weight: 900; font-size: 18px; animation: glow 2s infinite alternate; }
@keyframes glow { 0% { box-shadow: 0 0 5px var(--accent); } 100% { box-shadow: 0 0 20px var(--accent); } }
</style>
</head>
<body>

<div class="app-wrapper">
    <!-- TRAINING VIEW -->
    <div id="exam-view" class="view" style="display:none;">
        <div class="exam-header">
            <div id="step-badge" class="exam-badge">Schritt 1</div>
            <div id="exam-instr" class="exam-instr">Lade...</div>
        </div>
        <div class="cards-container" id="cards-grid"></div>
        <button id="submit-btn" class="submit-btn" onclick="Exam.checkStep()">Prüfen</button>
    </div>

    <!-- RESULT VIEW -->
    <div id="result-view" class="view" style="display:none; text-align:center; padding:50px;">
        <h1>Examen abgeschlossen!</h1>
        <div id="final-score" style="font-size: 50px; font-weight: 900;">0%</div>
        <button class="submit-btn" onclick="location.reload()">Zurück zum Home</button>
    </div>
</div>

<script>
const Exam = {
    currentStep: 1,
    selected: [],
    
    // Beispiel-Daten (Modulares Design)
    problem: {
        title: "Herzinsuffizienz",
        goals: [
            { text: "Schmerzreduktion auf NRS 4 innerhalb 60 Min.", correct: true },
            { text: "Verbesserung der Atemsituation.", correct: true },
            { text: "Patient soll nie wieder krank werden.", correct: false },
            { text: "Patient soll nur noch liegen.", correct: false }
        ],
        measures: [
            { text: "Pfk erhebt im FD/SD die Schmerzintensität mittels NRS.", correct: true },
            { text: "Pfk lagert PE bei Bedarf in Oberkörperhochposition.", correct: true },
            { text: "Pfk achtet auf Bilanzierung.", correct: true },
            { text: "Pfk verabreicht Bedarfsmedikation nach ärztl. Anordnung.", correct: true },
            { text: "Pfk beobachtet Beinödeme bei jedem Ankleiden.", correct: true },
            { text: "Pfk gibt Schmerzmittel nach Gefühl.", correct: false },
            { text: "Pfk wäscht Patient bei Zeit.", correct: false },
            { text: "Pfk lässt Patienten rennen.", correct: false }
        ]
    },

    start() {
        document.getElementById('exam-view').style.display = 'block';
        this.renderStep();
    },

    renderStep() {
        const grid = document.getElementById('cards-grid');
        grid.innerHTML = '';
        this.selected = [];
        
        const data = this.currentStep === 1 ? this.problem.goals : this.problem.measures;
        const targetCount = this.currentStep === 1 ? 2 : 5;
        
        document.getElementById('step-badge').innerText = `Schritt ${this.currentStep} / 2`;
        document.getElementById('exam-instr').innerText = this.currentStep === 1 
            ? `Wählen Sie 2 geeignete Ziele zu ${this.problem.title} aus.` 
            : `Wählen Sie 5 geeignete Maßnahmen zu ${this.problem.title} aus.`;

        data.forEach((item, i) => {
            const card = document.createElement('div');
            card.className = 'choice-card';
            card.innerHTML = item.text;
            card.onclick = () => this.toggle(card, i, targetCount);
            grid.appendChild(card);
        });
    },

    toggle(el, index, limit) {
        if(this.selected.includes(index)) {
            this.selected = this.selected.filter(i => i !== index);
            el.classList.remove('selected');
        } else if(this.selected.length < limit) {
            this.selected.push(index);
            el.classList.add('selected');
        }
    },

    checkStep() {
        const data = this.currentStep === 1 ? this.problem.goals : this.problem.measures;
        const cards = document.querySelectorAll('.choice-card');
        
        data.forEach((item, i) => {
            const card = cards[i];
            if(this.selected.includes(i)) {
                card.classList.add(item.correct ? 'correct' : 'wrong');
            }
        });

        setTimeout(() => {
            if(this.currentStep === 1) {
                this.currentStep = 2;
                this.renderStep();
            } else {
                this.showResult();
            }
        }, 1500);
    },

    showResult() {
        document.getElementById('exam-view').style.display = 'none';
        document.getElementById('result-view').style.display = 'block';
        setTimeout(() => {
            alert("Examen beendet! Sehr gut gemacht.");
            window.location.reload(); // Auto-Return / Reload
        }, 5000);
    }
};

Exam.start();
</script>
</body>
</html>
