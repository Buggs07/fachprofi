<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>PflegefachProfi | Pflegeplanung</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* ==========================================================================
   DESIGN SYSTEM & VARIABLES
   ========================================================================== */
:root {
  --primary: #2563eb;
  --primary-dark: #1e40af;
  --purple: #8b5cf6;
  --pink: #ec4899;
  
  --success: #10b981;
  --success-light: #d1fae5;
  --success-dark: #065f46;
  
  --warning: #f59e0b;
  --warning-light: #fef3c7;
  --warning-dark: #92400e;
  
  --danger: #ef4444;
  --danger-light: #fee2e2;
  --danger-dark: #991b1b;
  
  --bg-app: #f8fafc;
  --bg-surface: #ffffff;
  --text-main: #0f172a;
  --text-muted: #64748b;
  --border: #e2e8f0;
  
  --shadow-sm: 0 2px 4px rgba(15,23,42,0.04);
  --shadow-md: 0 8px 16px rgba(15,23,42,0.08);
  --shadow-lg: 0 24px 48px rgba(37,99,235,0.12);
  --shadow-glow: 0 0 20px rgba(37,99,235,0.3);
  
  --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
  --ease-spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

/* ==========================================================================
   RESET & WRAPPER (MOBILE FIRST SAAS)
   ========================================================================== */
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Inter', sans-serif; background: #cbd5e1; color: var(--text-main); display: flex; justify-content: center; min-height: 100vh; overflow: hidden; }
button { border: none; background: none; font-family: inherit; cursor: pointer; outline: none; }
h1, h2, h3, h4 { font-weight: 800; letter-spacing: -0.02em; }

.app-wrapper {
  width: 100%; max-width: 500px; height: 100vh; height: 100dvh;
  background: var(--bg-app); position: relative; display: flex; flex-direction: column;
  box-shadow: 0 0 50px rgba(0,0,0,0.15); overflow: hidden;
}

/* ==========================================================================
   GLOBAL UI ELEMENTS
   ========================================================================== */
.topbar {
  padding: max(16px, env(safe-area-inset-top)) 20px 16px;
  background: rgba(255,255,255,0.9); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
  z-index: 50; position: relative;
}
.brand { font-weight: 900; font-size: 18px; display: flex; align-items: center; gap: 8px; color: var(--text-main); }
.brand i { color: var(--primary); font-size: 22px; }
.stats { display: flex; gap: 8px; }
.stat-pill { background: var(--bg-surface); border: 1px solid var(--border); padding: 6px 12px; border-radius: 99px; font-size: 13px; font-weight: 800; display: flex; align-items: center; gap: 6px; box-shadow: var(--shadow-sm); }
.stat-pill .fa-bolt { color: var(--primary); }
.stat-pill .fa-fire { color: var(--warning); }

.view { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: 100px; display: none; opacity: 0; transform: translateY(10px); transition: all 0.3s var(--ease); }
.view.active { display: block; opacity: 1; transform: translateY(0); }

/* ==========================================================================
   HOME VIEW (ACCORDIONS)
   ========================================================================== */
.home-header { padding: 24px 20px 16px; }
.home-header h1 { font-size: 28px; line-height: 1.2; margin-bottom: 8px; background: linear-gradient(135deg, var(--primary), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.home-header p { color: var(--text-muted); font-size: 15px; font-weight: 500; line-height: 1.4; }

.cat-list { padding: 0 20px; display: flex; flex-direction: column; gap: 12px; }
.cat-card { background: var(--bg-surface); border-radius: 20px; border: 1px solid var(--border); box-shadow: var(--shadow-sm); overflow: hidden; transition: 0.3s var(--ease); }
.cat-card.open { border-color: var(--primary); box-shadow: var(--shadow-md); }

.cat-header { padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
.cat-title { display: flex; align-items: center; gap: 12px; font-size: 16px; font-weight: 800; }
.cat-icon { width: 40px; height: 40px; border-radius: 12px; background: var(--primary-light); color: var(--primary); display: grid; place-items: center; font-size: 18px; }
.cat-arrow { color: var(--text-muted); transition: 0.3s var(--ease-spring); }
.cat-card.open .cat-arrow { transform: rotate(180deg); color: var(--primary); }

.cat-body { display: grid; grid-template-rows: 0fr; transition: 0.3s var(--ease); }
.cat-card.open .cat-body { grid-template-rows: 1fr; }
.cat-body-inner { overflow: hidden; }
.prob-list { padding: 0 20px 20px; display: flex; flex-direction: column; gap: 8px; }

.prob-btn {
  width: 100%; text-align: left; padding: 14px 16px; border-radius: 14px; background: var(--bg-app);
  border: 1px solid var(--border); font-size: 15px; font-weight: 700; color: var(--text-main);
  display: flex; justify-content: space-between; align-items: center; transition: 0.2s;
}
.prob-btn:active { transform: scale(0.98); background: var(--primary-light); border-color: var(--primary); }
.status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); }
.status-dot.easy { background: var(--success); box-shadow: 0 0 8px var(--success); }
.status-dot.medium { background: var(--warning); box-shadow: 0 0 8px var(--warning); }
.status-dot.hard { background: var(--danger); box-shadow: 0 0 8px var(--danger); }

/* ==========================================================================
   TRAINING VIEW (THE EXAM SIMULATOR)
   ========================================================================== */
.train-header { padding: 16px 20px; border-bottom: 1px solid var(--border); background: var(--bg-surface); position: sticky; top: 0; z-index: 10; }
.back-btn { font-size: 14px; font-weight: 800; color: var(--text-muted); display: flex; align-items: center; gap: 6px; margin-bottom: 12px; }
.train-kicker { font-size: 11px; text-transform: uppercase; font-weight: 900; color: var(--primary); letter-spacing: 0.5px; margin-bottom: 4px; }
.train-title { font-size: 22px; margin-bottom: 16px; }

.train-progress { display: flex; gap: 8px; margin-bottom: 12px; }
.step-dot { flex: 1; height: 6px; border-radius: 99px; background: var(--border); transition: 0.4s var(--ease); }
.step-dot.active { background: var(--primary); box-shadow: 0 0 10px rgba(37,99,235,0.4); }

.instruction-box { background: var(--primary-light); border-left: 4px solid var(--primary); padding: 12px 16px; border-radius: 0 12px 12px 0; font-size: 14px; font-weight: 700; color: var(--primary-dark); display: flex; justify-content: space-between; align-items: center; }

.card-grid { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
.select-card {
  background: var(--bg-surface); border: 2px solid var(--border); border-radius: 16px;
  padding: 16px; cursor: pointer; transition: 0.2s var(--ease-spring); position: relative;
  box-shadow: var(--shadow-sm);
}
.select-card:active { transform: scale(0.97); }
.select-card.selected { border-color: var(--primary); background: var(--primary-light); box-shadow: var(--shadow-glow); transform: translateY(-2px); }
.card-text { font-size: 15px; font-weight: 600; line-height: 1.45; color: var(--text-main); }
.check-icon { position: absolute; top: 16px; right: 16px; font-size: 18px; color: var(--primary); opacity: 0; transform: scale(0.5); transition: 0.3s var(--ease-spring); }
.select-card.selected .check-icon { opacity: 1; transform: scale(1); }
.select-card.selected .card-text { padding-right: 24px; }

/* Evaluation States */
.select-card.eval-correct { border-color: var(--success); background: var(--success-light); }
.select-card.eval-correct .check-icon { color: var(--success-dark); opacity: 1; transform: scale(1); content: "\f00c"; }
.select-card.eval-wrong { border-color: var(--danger); background: var(--danger-light); animation: shake 0.4s var(--ease-spring); }
.select-card.eval-wrong .check-icon { color: var(--danger-dark); opacity: 1; transform: scale(1); }
.select-card.eval-missed { border-color: var(--warning); background: var(--warning-light); }

.explanation { margin-top: 12px; font-size: 13px; font-weight: 600; padding: 10px; border-radius: 8px; display: none; line-height: 1.4; }
.eval-correct .explanation { display: block; background: rgba(16,185,129,0.15); color: var(--success-dark); }
.eval-wrong .explanation { display: block; background: rgba(239,68,68,0.15); color: var(--danger-dark); }
.eval-missed .explanation { display: block; background: rgba(245,158,11,0.15); color: var(--warning-dark); }

/* Footer CTA */
.train-footer { position: fixed; bottom: 0; width: 100%; max-width: 500px; padding: 16px 20px; padding-bottom: max(16px, env(safe-area-inset-bottom)); background: rgba(255,255,255,0.9); backdrop-filter: blur(12px); border-top: 1px solid var(--border); z-index: 100; }
.btn-main { width: 100%; padding: 18px; border-radius: 16px; background: linear-gradient(135deg, var(--primary), var(--purple)); color: white; font-size: 16px; font-weight: 800; letter-spacing: 0.5px; box-shadow: 0 10px 20px rgba(37,99,235,0.3); transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; }
.btn-main:active { transform: scale(0.96); box-shadow: 0 4px 10px rgba(37,99,235,0.2); }
.btn-main:disabled { background: var(--border); color: var(--text-muted); box-shadow: none; transform: none; cursor: not-allowed; }

/* ==========================================================================
   RESULT VIEW
   ========================================================================== */
.result-header { text-align: center; padding: 40px 20px 20px; }
.score-circle { width: 140px; height: 140px; border-radius: 50%; border: 10px solid var(--primary-light); margin: 0 auto 20px; display: grid; place-items: center; background: var(--bg-surface); box-shadow: var(--shadow-lg); position: relative; }
.score-circle.perfect { border-color: var(--success-light); box-shadow: 0 0 30px rgba(16,185,129,0.3); }
.score-text { font-size: 42px; font-weight: 900; letter-spacing: -2px; color: var(--text-main); }
.score-text span { font-size: 20px; }

.feedback-msg { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
.coaching-msg { font-size: 14px; font-weight: 600; color: var(--text-muted); margin-bottom: 24px; line-height: 1.4; }
.xp-reward { font-size: 24px; font-weight: 900; color: var(--success); display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 30px;}

.ampel-box { background: var(--bg-surface); border-radius: 20px; padding: 20px; border: 1px solid var(--border); margin: 0 20px 30px; text-align: center; }
.ampel-title { font-size: 13px; text-transform: uppercase; font-weight: 800; color: var(--text-muted); margin-bottom: 12px; }
.ampel-btns { display: flex; gap: 10px; }
.ampel-btn { flex: 1; padding: 14px 0; border-radius: 12px; font-weight: 800; font-size: 14px; border: 2px solid transparent; transition: 0.2s; }
.ampel-btn:active { transform: scale(0.95); }
.btn-easy { background: var(--success-light); color: var(--success-dark); }
.btn-med { background: var(--warning-light); color: var(--warning-dark); }
.btn-hard { background: var(--danger-light); color: var(--danger-dark); }
.ampel-btn.selected { border-color: currentColor; box-shadow: var(--shadow-md); transform: translateY(-2px); }

/* ==========================================================================
   ANIMATIONS
   ========================================================================== */
@keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-6px); } 40%, 80% { transform: translateX(6px); } }
.shake { animation: shake 0.4s var(--ease-spring); }

.floating-xp { position: fixed; font-size: 28px; font-weight: 900; color: var(--success); pointer-events: none; z-index: 9999; text-shadow: 0 4px 10px rgba(16,185,129,0.4); animation: floatUp 1s var(--ease) forwards; }
.floating-xp.negative { color: var(--danger); text-shadow: 0 4px 10px rgba(239,68,68,0.4); }
@keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-60px) scale(1.2); } }
</style>
</head>
<body>

<div class="app-wrapper">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="brand"><i class="fa-solid fa-clipboard-list"></i> PflegefachProfi</div>
    <div class="stats">
      <div class="stat-pill"><i class="fa-solid fa-fire"></i> <span id="ui-streak">0</span></div>
      <div class="stat-pill"><i class="fa-solid fa-bolt"></i> <span id="ui-xp">0</span></div>
    </div>
  </header>

  <!-- =========================================================
       VIEW: HOME (CATEGORIES)
       ========================================================= -->
  <main class="view active" id="view-home">
    <div class="home-header">
      <h1>Pflegeplanung<br>Examenstraining</h1>
      <p>Wähle ein Pflegeproblem. Trainiere die korrekte Formulierung von Zielen und Maßnahmen nach Prüfungsstandard.</p>
    </div>
    <div class="cat-list" id="cat-container">
      <!-- Injected via JS -->
    </div>
  </main>

  <!-- =========================================================
       VIEW: TRAINING
       ========================================================= -->
  <main class="view" id="view-train">
    <div class="train-header">
      <button class="back-btn" onclick="App.goHome()"><i class="fa-solid fa-chevron-left"></i> Übersicht</button>
      <div class="train-progress">
        <div class="step-dot active" id="dot-1"></div>
        <div class="step-dot" id="dot-2"></div>
        <div class="step-dot" id="dot-3"></div>
      </div>
      <div class="train-kicker" id="train-category">Kategorie</div>
      <h2 class="train-title" id="train-title">Pflegeproblem</h2>
      <div class="instruction-box" id="train-instruction">
        <span>Wähle 2 Ziele aus.</span>
        <span id="train-counter">0/2</span>
      </div>
    </div>
    
    <div class="card-grid" id="train-cards">
      <!-- Injected via JS -->
    </div>

    <div class="train-footer">
      <button class="btn-main" id="btn-submit" disabled onclick="Trainer.submitStep()">Prüfen <i class="fa-solid fa-check"></i></button>
    </div>
  </main>

  <!-- =========================================================
       VIEW: RESULT
       ========================================================= -->
  <main class="view" id="view-result">
    <div class="result-header">
      <div class="score-circle" id="res-circle">
        <div class="score-text"><span id="res-score">0</span><span>%</span></div>
      </div>
      <div class="feedback-msg" id="res-feedback">Prüfungsreif!</div>
      <div class="coaching-msg" id="res-coaching">Sehr sauber strukturiert.</div>
      <div class="xp-reward" id="res-xp">+0 XP</div>
    </div>

    <div class="ampel-box">
      <div class="ampel-title">Wie schwer war dieser Fall?</div>
      <div class="ampel-btns">
        <button class="ampel-btn btn-easy" onclick="Trainer.setDifficulty('easy')">🟢 Easy</button>
        <button class="ampel-btn btn-med" onclick="Trainer.setDifficulty('medium')">🟡 Mittel</button>
        <button class="ampel-btn btn-hard" onclick="Trainer.setDifficulty('hard')">🔴 Schwer</button>
      </div>
    </div>

    <div style="padding: 0 20px;">
      <button class="btn-main" style="margin-bottom: 12px; background: var(--bg-surface); color: var(--text-main); border: 2px solid var(--border); box-shadow: none;" onclick="Trainer.retry()">Nochmal üben <i class="fa-solid fa-rotate-right"></i></button>
      <button class="btn-main" onclick="App.goHome()">Zurück zur Übersicht <i class="fa-solid fa-list"></i></button>
    </div>
  </main>

</div>

/* ==========================================================================
   2. STATE & STORAGE
   ========================================================================== */
const STORAGE_KEY = 'pfp.exam.v1';
const State = {
  xp: 0, streak: 0,
  history: {}, // { probId: { status: 'easy' } }
  
  // View State
  activeProb: null,
  step: 1,
  selGoals: [],
  selMeasures: []
};

function loadData() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if(d) { State.xp = d.xp||0; State.streak = d.streak||0; State.history = d.history||{}; }
  } catch(e) {}
  updateTopbar();
}
function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({xp: State.xp, streak: State.streak, history: State.history}));
  updateTopbar();
}
function addXP(amount) {
  State.xp += amount;
  if(amount > 0) showFloatingXP(amount);
  else if(amount < 0) showFloatingXP(amount, true);
  saveData();
}

/* ==========================================================================
   3. CORE APP LOGIC
   ========================================================================== */
const App = {
  init() {
    loadData();
    this.renderHome();
    this.nav('view-home');
  },
  nav(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0,0);
  },
  goHome() {
    this.renderHome(); // Refresh statuses
    this.nav('view-home');
  },
  renderHome() {
    const container = document.getElementById('cat-container');
    // Group categories
    const groups = {};
    DATA.forEach(p => {
      if(!groups[p.categoryId]) groups[p.categoryId] = { title: p.categoryTitle, icon: p.categoryIcon, problems: [] };
      groups[p.categoryId].problems.push(p);
    });

    let html = '';
    for(const key in groups) {
      const g = groups[key];
      html += `
        <div class="cat-card">
          <div class="cat-header" onclick="this.parentElement.classList.toggle('open'); haptic(10);">
            <div class="cat-title"><div class="cat-icon">${g.icon}</div> ${g.title}</div>
            <i class="fa-solid fa-chevron-down cat-arrow"></i>
          </div>
          <div class="cat-body">
            <div class="cat-body-inner">
              <div class="prob-list">
                ${g.problems.map(p => {
                  const status = State.history[p.id]?.status || 'none';
                  const dotClass = status === 'easy' ? 'easy' : status === 'medium' ? 'medium' : status === 'hard' ? 'hard' : '';
                  return `
                  <button class="prob-btn" onclick="Trainer.start('${p.id}')">
                    ${p.title}
                    <div class="status-dot ${dotClass}"></div>
                  </button>
                `}).join('')}
              </div>
            </div>
          </div>
        </div>
      `;
    }
    container.innerHTML = html;
  }
};

/* ==========================================================================
   4. TRAINING ENGINE
   ========================================================================== */
const Trainer = {
  start(id) {
    State.activeProb = DATA.find(p => p.id === id);
    State.step = 1;
    State.selGoals = [];
    State.selMeasures = [];
    
    // Shuffle arrays
    State.activeProb.sGoals = [...State.activeProb.goals].sort(() => Math.random() - 0.5);
    State.activeProb.sMeasures = [...State.activeProb.measures].sort(() => Math.random() - 0.5);

    document.getElementById('train-category').innerText = State.activeProb.categoryTitle;
    document.getElementById('train-title').innerText = State.activeProb.title;
    
    App.nav('view-train');
    this.renderStep();
  },

  renderStep() {
    const isStep1 = State.step === 1;
    
    // Update Header
    document.getElementById('dot-1').className = `step-dot ${isStep1 ? 'active' : 'active'}`;
    document.getElementById('dot-2').className = `step-dot ${isStep1 ? '' : 'active'}`;
    document.getElementById('train-counter').innerText = isStep1 ? `${State.selGoals.length}/2` : `${State.selMeasures.length}/5`;
    document.querySelector('#train-instruction span').innerText = isStep1 ? "Wähle exakt 2 Ziele aus." : "Wähle exakt 5 Maßnahmen.";

    // Render Cards
    const items = isStep1 ? State.activeProb.sGoals : State.activeProb.sMeasures;
    const selectedArr = isStep1 ? State.selGoals : State.selMeasures;

    let html = '';
    items.forEach(item => {
      const isSelected = selectedArr.includes(item.id);
      html += `
        <div class="select-card ${isSelected ? 'selected' : ''}" id="card-${item.id}" onclick="Trainer.toggleCard('${item.id}')">
          <i class="fa-solid fa-check check-icon"></i>
          <div class="card-text">${item.text}</div>
          <div class="explanation" id="exp-${item.id}">${item.explanation}</div>
        </div>
      `;
    });
    document.getElementById('train-cards').innerHTML = html;
    
    this.checkButtonState();
  },

  toggleCard(id) {
    const isStep1 = State.step === 1;
    const arr = isStep1 ? State.selGoals : State.selMeasures;
    const limit = isStep1 ? 2 : 5;

    if(arr.includes(id)) {
      arr.splice(arr.indexOf(id), 1);
      haptic(10);
    } else {
      if(arr.length >= limit) {
        document.getElementById(`card-${id}`).classList.add('shake');
        setTimeout(()=> document.getElementById(`card-${id}`).classList.remove('shake'), 400);
        haptic([30,30]);
        return; // limit reached
      }
      arr.push(id);
      haptic(15);
    }
    this.renderStep(); // Re-render to update classes and counter
  },

  checkButtonState() {
    const isStep1 = State.step === 1;
    const arr = isStep1 ? State.selGoals : State.selMeasures;
    const limit = isStep1 ? 2 : 5;
    const btn = document.getElementById('btn-submit');
    
    if(arr.length === limit) {
      btn.disabled = false;
      btn.innerHTML = `Auswahl prüfen <i class="fa-solid fa-magnifying-glass"></i>`;
    } else {
      btn.disabled = true;
      btn.innerHTML = `Noch ${limit - arr.length} wählen...`;
    }
  },

  submitStep() {
    haptic(40);
    const isStep1 = State.step === 1;
    const items = isStep1 ? State.activeProb.sGoals : State.activeProb.sMeasures;
    const selectedArr = isStep1 ? State.selGoals : State.selMeasures;
    
    let allCorrect = true;

    // Evaluate
    items.forEach(item => {
      const card = document.getElementById(`card-${item.id}`);
      const isSelected = selectedArr.includes(item.id);
      
      // Remove basic selected class for eval classes
      card.classList.remove('selected');
      card.style.pointerEvents = 'none'; // Lock card

      if(isSelected && item.correct) {
        card.classList.add('eval-correct');
        addXP(isStep1 ? 10 : 8);
      } else if (isSelected && !item.correct) {
        card.classList.add('eval-wrong');
        addXP(isStep1 ? -5 : -4);
        allCorrect = false;
      } else if (!isSelected && item.correct) {
        card.classList.add('eval-missed');
        allCorrect = false;
      }
    });

    if(allCorrect) {
      State.streak++;
      addXP(10); // Bonus
    } else {
      State.streak = 0;
    }
    saveData();

    // Update Button for next phase
    const btn = document.getElementById('btn-submit');
    if(isStep1) {
      btn.innerHTML = `Weiter zu Maßnahmen <i class="fa-solid fa-arrow-right"></i>`;
      btn.onclick = () => { State.step = 2; Trainer.renderStep(); };
    } else {
      btn.innerHTML = `Ergebnis anzeigen <i class="fa-solid fa-flag-checkered"></i>`;
      btn.onclick = () => { Trainer.finish(); };
    }
  },

  finish() {
    App.nav('view-result');
    document.getElementById('dot-3').classList.add('active');
    
    // Calculate Score
    let maxCorrect = 7; // 2 goals + 5 measures
    let actualCorrect = 0;
    
    State.activeProb.goals.forEach(g => { if(g.correct && State.selGoals.includes(g.id)) actualCorrect++; });
    State.activeProb.measures.forEach(m => { if(m.correct && State.selMeasures.includes(m.id)) actualCorrect++; });
    // Minus wrongs
    State.activeProb.goals.forEach(g => { if(!g.correct && State.selGoals.includes(g.id)) actualCorrect--; });
    State.activeProb.measures.forEach(m => { if(!m.correct && State.selMeasures.includes(m.id)) actualCorrect--; });
    
    if(actualCorrect < 0) actualCorrect = 0;
    let pct = Math.round((actualCorrect / maxCorrect) * 100);

    // UI Updates
    document.getElementById('res-score').innerText = pct;
    const circle = document.getElementById('res-circle');
    const fb = document.getElementById('res-feedback');
    const coach = document.getElementById('res-coaching');

    if(pct >= 90) {
      circle.className = "score-circle perfect";
      fb.innerText = "Prüfungsreif!";
      fb.style.color = "var(--success)";
      coach.innerText = "Exzellente Struktur. WER, WANN, WIE und WARUM perfekt angewandt.";
    } else if (pct >= 70) {
      circle.className = "score-circle";
      fb.innerText = "Solide!";
      fb.style.color = "var(--warning)";
      coach.innerText = "Gute Basis, aber achte genauer auf die Distraktoren in der Prüfung.";
    } else {
      circle.className = "score-circle";
      fb.innerText = "Noch unsicher";
      fb.style.color = "var(--danger)";
      coach.innerText = "Einige Pflegemaßnahmen waren nicht messbar oder falsch formuliert. Übe diesen Fall nochmal.";
    }

    // Reset Ampel buttons visually
    document.querySelectorAll('.ampel-btn').forEach(b => b.classList.remove('selected'));
    haptic([40,50,40]);
  },

  setDifficulty(status) {
    haptic(20);
    document.querySelectorAll('.ampel-btn').forEach(b => b.classList.remove('selected'));
    event.target.classList.add('selected');
    
    if(!State.history[State.activeProb.id]) State.history[State.activeProb.id] = {};
    State.history[State.activeProb.id].status = status;
    saveData();
  },

  retry() {
    this.start(State.activeProb.id);
  }
};

/* ==========================================================================
   5. UTILS & EFFECTS
   ========================================================================== */
function updateTopbar() {
  document.getElementById('ui-xp').innerText = State.xp;
  document.getElementById('ui-streak').innerText = State.streak;
}

function haptic(pattern) {
  if(navigator.vibrate) navigator.vibrate(pattern);
}

function showFloatingXP(amount, negative=false) {
  const el = document.createElement('div');
  el.className = `floating-xp ${negative ? 'negative' : ''}`;
  el.innerText = amount > 0 ? `+${amount}` : amount;
  el.style.left = (40 + Math.random()*20) + '%';
  el.style.top = '50%';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

// Boot
document.addEventListener('DOMContentLoaded', () => App.init());
</script>
