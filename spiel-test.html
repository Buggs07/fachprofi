<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PflegefachProfi • Übung</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
*{
box-sizing:border-box;
margin:0;
padding:0
}

:root{
--blue:#3158ff;
--purple:#8b16d8;
--pink:#f72585;
--bg:#f7f8fc;
--card:#fff;
--ink:#15182f;
--muted:#687086;
--line:#e8ecf5;
--green:#1fca72;
--yellow:#ffbf1f;
--red:#ff3864;
--shadow:0 18px 50px rgba(49,88,255,.14);
--shadow2:0 8px 24px rgba(15,18,42,.09);
--ease:cubic-bezier(.2,.8,.2,1);
--navH:76px
}

html{
scroll-behavior:smooth;
overflow-x:hidden
}

body{
font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
background:var(--bg);
color:var(--ink);
min-height:100vh;
overflow-x:hidden;
-webkit-font-smoothing:antialiased
}

button,input{
font-family:inherit
}

button{
cursor:pointer;
border:0
}

.wrap{
max-width:1180px;
margin:0 auto;
padding:0 18px;
width:100%
}

.appbar{
position:sticky;
top:0;
z-index:1000;
height:var(--navH);
background:linear-gradient(135deg,#3158ff 0%,#5c25dc 52%,#9400c9 100%);
box-shadow:0 10px 30px rgba(67,43,218,.24)
}

.appbar-in{
height:100%;
display:flex;
align-items:center;
justify-content:space-between;
gap:14px
}

.brand{
display:flex;
align-items:center;
gap:12px;
color:white;
text-decoration:none
}

.logo{
width:48px;
height:48px;
border-radius:18px;
background:rgba(255,255,255,.18);
display:grid;
place-items:center;
backdrop-filter:blur(8px)
}

.logo i{
font-size:24px
}

.brand b{
font-size:22px;
letter-spacing:-.04em
}

.nav{
display:flex;
align-items:center;
gap:8px;
background:rgba(255,255,255,.12);
padding:7px;
border-radius:24px;
backdrop-filter:blur(10px)
}

.nav a{
border:0;
text-decoration:none;
color:rgba(255,255,255,.78);
background:transparent;
font-weight:900;
font-size:13px;
border-radius:17px;
padding:10px 13px;
display:flex;
gap:8px;
align-items:center;
transition:.2s var(--ease)
}

.nav a.active,
.nav a:hover{
background:#fff;
color:#4b2be4;
transform:translateY(-1px)
}

.hero{
padding:18px 0
}

.hero-card{
background:linear-gradient(135deg,#3158ff 0%,#6323d8 58%,#9b00c9 100%);
border-radius:34px;
padding:18px;
box-shadow:var(--shadow);
color:#fff
}

.hero-top{
display:flex;
align-items:center;
justify-content:space-between;
gap:18px;
flex-wrap:wrap
}

.hero-title h1{
font-size:clamp(1.5rem,4vw,2.4rem);
letter-spacing:-.06em
}

.hero-title p{
font-size:13px;
margin-top:6px;
line-height:1.5;
color:rgba(255,255,255,.78);
font-weight:700
}

.stats{
display:flex;
gap:8px;
flex-wrap:wrap
}

.stat{
background:rgba(255,255,255,.14);
padding:12px;
border-radius:20px;
min-width:90px
}

.stat small{
display:block;
font-size:10px;
font-weight:900;
opacity:.7;
text-transform:uppercase
}

.stat b{
font-size:22px;
letter-spacing:-.05em
}

.layout{
display:grid;
grid-template-columns:320px 1fr;
gap:14px;
padding-bottom:100px
}

.sidebar{
background:#fff;
border-radius:30px;
box-shadow:var(--shadow2);
overflow:hidden;
position:sticky;
top:90px;
height:fit-content
}

.sidebar-head{
padding:16px;
border-bottom:1px solid var(--line)
}

.sidebar-head h2{
font-size:17px;
letter-spacing:-.04em
}

.search{
margin-top:12px;
position:relative
}

.search i{
position:absolute;
left:14px;
top:50%;
transform:translateY(-50%);
color:var(--muted)
}

.search input{
width:100%;
height:46px;
border-radius:17px;
border:1px solid var(--line);
padding:0 14px 0 40px;
font-weight:800;
background:#fbfcff
}

.topic-list{
display:grid;
gap:8px;
padding:10px;
max-height:650px;
overflow:auto
}

.topic{
width:100%;
border:1px solid var(--line);
background:#fff;
border-radius:22px;
padding:12px;
display:grid;
grid-template-columns:auto 1fr;
gap:10px;
text-align:left;
transition:.2s var(--ease)
}

.topic:hover{
transform:translateY(-1px);
box-shadow:0 8px 20px rgba(15,18,42,.06)
}

.topic.active{
background:linear-gradient(135deg,#3158ff,#8b16d8);
color:#fff;
border-color:transparent
}

.topic-icon{
width:44px;
height:44px;
border-radius:16px;
display:grid;
place-items:center;
font-size:22px;
background:rgba(49,88,255,.12)
}

.topic.active .topic-icon{
background:rgba(255,255,255,.16)
}

.topic-title{
font-weight:950;
font-size:13px;
letter-spacing:-.02em
}

.topic-meta{
font-size:10px;
font-weight:900;
margin-top:4px;
opacity:.7
}

.main{
background:#fff;
border-radius:34px;
box-shadow:var(--shadow2);
overflow:hidden
}

.selected{
padding:18px;
border-bottom:1px solid var(--line)
}

.selected h2{
font-size:28px;
letter-spacing:-.06em
}

.selected p{
margin-top:6px;
font-size:13px;
font-weight:700;
color:var(--muted)
}

.modes{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
padding:18px
}

.mode{
position:relative;
overflow:hidden;
background:#fff;
border:1px solid var(--line);
border-radius:30px;
padding:22px;
min-height:180px;
text-align:left;
transition:.25s var(--ease)
}

.mode:hover{
transform:translateY(-3px);
box-shadow:var(--shadow)
}

.mode:active{
transform:scale(.98)
}

.mode::before{
content:"";
position:absolute;
right:-35px;
top:-35px;
width:120px;
height:120px;
border-radius:50%;
background:rgba(49,88,255,.09)
}

.mode-icon{
width:58px;
height:58px;
border-radius:22px;
display:grid;
place-items:center;
font-size:28px;
background:rgba(49,88,255,.11);
margin-bottom:16px
}

.mode h3{
font-size:22px;
letter-spacing:-.05em
}

.mode p{
margin-top:8px;
font-size:13px;
line-height:1.55;
font-weight:700;
color:var(--muted)
}

.reward{
margin-top:14px;
display:inline-flex;
align-items:center;
gap:6px;
background:#f1f4ff;
padding:8px 10px;
border-radius:99px;
font-size:11px;
font-weight:900;
color:#4a4fe7
}

@media(max-width:940px){

.layout{
grid-template-columns:1fr
}

.sidebar{
position:relative;
top:auto
}

.modes{
grid-template-columns:1fr
}

}

@media(max-width:650px){

.wrap{
padding:0 12px
}

.hero-card{
border-radius:28px
}

.hero-top{
display:block
}

.stats{
margin-top:12px;
display:grid;
grid-template-columns:repeat(3,1fr)
}

.stat{
min-width:0
}

.selected h2{
font-size:24px
}

}
</style>
</head>

<body>

<header class="appbar">
<div class="wrap appbar-in">

<a class="brand" href="#">
<div class="logo">
<i class="fa-solid fa-stethoscope"></i>
</div>
<b>PflegefachProfi</b>
</a>

<nav class="nav">
<a href="#">Home</a>
<a href="#">Themen</a>
<a href="#" class="active">Üben</a>
</nav>

</div>
</header>

<section class="hero">
<div class="wrap">

<div class="hero-card">

<div class="hero-top">

<div class="hero-title">
<h1>Übungsarena</h1>
<p>
Lerne aktiv statt passiv. Flashcards, Quiz, Memory und Lückentext direkt aus den Prüfungsthemen generiert.
</p>
</div>

<div class="stats">
<div class="stat">
<small>XP</small>
<b id="xp">0</b>
</div>

<div class="stat">
<small>Streak</small>
<b id="streak">0</b>
</div>

<div class="stat">
<small>Sessions</small>
<b id="sessions">0</b>
</div>
</div>

</div>

</div>

</div>
</section>

<main class="wrap layout">

<aside class="sidebar">

<div class="sidebar-head">
<h2>Thema auswählen</h2>

<div class="search">
<i class="fa-solid fa-magnifying-glass"></i>
<input placeholder="COPD, Diabetes, Sepsis…"/>
</div>
</div>

<div class="topic-list">

<button class="topic active">
<div class="topic-icon">🩸</div>
<div>
<div class="topic-title">Diabetes mellitus</div>
<div class="topic-meta">⚗️ Endokrinologie</div>
</div>
</button>

<button class="topic">
<div class="topic-icon">🧠</div>
<div>
<div class="topic-title">Schlaganfall</div>
<div class="topic-meta">🧠 Neurologie</div>
</div>
</button>

<button class="topic">
<div class="topic-icon">🫁</div>
<div>
<div class="topic-title">COPD</div>
<div class="topic-meta">🫁 Pneumologie</div>
</div>
</button>

</div>

</aside>

<section class="main">

<div class="selected">
<h2>Diabetes mellitus</h2>
<p>
Wähle eine Lernmethode. Fortschritt und XP werden lokal gespeichert.
</p>
</div>

<div class="modes">

<button class="mode">

<div class="mode-icon">
🃏
</div>

<h3>Flashcards</h3>

<p>
Animierte Lernkarten mit Definitionen, Symptomen, Assessment und Pflege.
</p>

<div class="reward">
<i class="fa-solid fa-star"></i>
+2 XP pro Karte
</div>

</button>

<button class="mode">

<div class="mode-icon">
⚡
</div>

<h3>Quiz</h3>

<p>
Schnelle Multiple-Choice-Fragen mit Sofortfeedback und Animationen.
</p>

<div class="reward">
<i class="fa-solid fa-star"></i>
+10 XP richtig
</div>

</button>

<button class="mode">

<div class="mode-icon">
🧠
</div>

<h3>Flip Memory</h3>

<p>
Verbinde Symptome, Assessment und Pflegeinhalte miteinander.
</p>

<div class="reward">
<i class="fa-solid fa-star"></i>
+8 XP pro Paar
</div>

</button>

<button class="mode">

<div class="mode-icon">
✍️
</div>

<h3>Lückentext</h3>

<p>
Aktives Abrufen wichtiger Fachbegriffe und Prüfungssätze.
</p>

<div class="reward">
<i class="fa-solid fa-star"></i>
+12 XP richtig
</div>

</button>

</div>

</section>

</main>

<script>

let xp = Number(localStorage.getItem("pfp_xp")) || 0
let streak = Number(localStorage.getItem("pfp_streak")) || 0
let sessions = Number(localStorage.getItem("pfp_sessions")) || 0

document.getElementById("xp").textContent = xp
document.getElementById("streak").textContent = streak
document.getElementById("sessions").textContent = sessions

document.querySelectorAll(".mode").forEach(mode => {

mode.addEventListener("click", () => {

xp += 10
sessions += 1

localStorage.setItem("pfp_xp", xp)
localStorage.setItem("pfp_sessions", sessions)

document.getElementById("xp").textContent = xp
document.getElementById("sessions").textContent = sessions

mode.animate([
{ transform:"scale(1)" },
{ transform:"scale(.96)" },
{ transform:"scale(1)" }
],{
duration:280,
easing:"cubic-bezier(.2,.8,.2,1)"
})

confetti()

})

})

function confetti(){

for(let i=0;i<60;i++){

const el = document.createElement("div")

el.style.position = "fixed"
el.style.width = "10px"
el.style.height = "10px"
el.style.borderRadius = "50%"
el.style.left = Math.random()*100+"vw"
el.style.top = "-20px"
el.style.background = ["#3158ff","#8b16d8","#f72585","#1fca72","#ffbf1f"][Math.floor(Math.random()*5)]
el.style.zIndex = "9999"
el.style.pointerEvents = "none"

document.body.appendChild(el)

el.animate([
{
transform:"translateY(0) rotate(0deg)",
opacity:1
},
{
transform:`translateY(${window.innerHeight+100}px) rotate(720deg)`,
opacity:.2
}
],{
duration:3000 + Math.random()*1200,
easing:"linear"
})

setTimeout(()=>{
el.remove()
},4200)

}

}

</script>

</body>
</html>
