<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>PflegefachProfi • smart lernen</title>
    <!-- Font Awesome (Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ---------- VARIABLEN (original) ---------- */
        :root {
            --primary: #4361ee;
            --primary-dark: #3a56d4;
            --primary-light: #eef2ff;
            --secondary: #7209b7;
            --accent: #f72585;
            --success: #4cc9f0;
            --warning: #fca311;
            --danger: #e63946;
            --key: #ffd166;
            --text-primary: #1d3557;
            --text-secondary: #457b9d;
            --text-tertiary: #a8dadc;
            --background: #f1faee;
            --surface: #ffffff;
            --border: #e0e0e0;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-elevated: 0 8px 24px rgba(0, 0, 0, 0.12);
            --radius: 12px;
            --radius-lg: 20px;
            --spacing-xs: 8px;
            --spacing-sm: 16px;
            --spacing-md: 24px;
            --spacing-lg: 32px;
            --spacing-xl: 48px;
            --font: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--background);
            color: var(--text-primary);
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ---------- HEADER (schlank, klebrig) ---------- */
        .header {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            gap: 12px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            font-size: 1.4rem;
            color: var(--primary);
            cursor: pointer;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(145deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.4rem;
        }

        .user-stats {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .key-badge {
            background: var(--key);
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: var(--shadow);
            color: var(--text-primary);
        }

        .progress-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            background: white;
            padding: 4px 14px 4px 8px;
            border-radius: 40px;
            box-shadow: var(--shadow);
        }

        .progress-bar-bg {
            width: 80px;
            height: 10px;
            background: var(--border);
            border-radius: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--success), var(--primary));
            border-radius: 20px;
            transition: width 0.4s;
        }

        .progress-text {
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* ---------- HERO / EINSTIEG ---------- */
        .hero-module {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-radius: 30px;
            padding: 30px 25px;
            margin: 30px 0 20px;
            box-shadow: var(--shadow-elevated);
        }

        .hero-module h2 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 10px;
        }

        .hero-module p {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 15px;
        }

        .hero-module .badge {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(4px);
            display: inline-block;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
        }

        /* ---------- MODUL GRID (attraktiv, fachlich) ---------- */
        .module-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
            gap: 22px;
            margin-top: 20px;
            margin-bottom: 40px;
        }

        .module-card {
            background: var(--surface);
            border-radius: 28px;
            padding: 24px;
            box-shadow: var(--shadow);
            transition: transform 0.2s ease, box-shadow 0.2s;
            border: 1px solid var(--border);
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .module-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-elevated);
            border-color: var(--primary-light);
        }

        .module-card.locked {
            opacity: 0.7;
            filter: grayscale(0.4);
            pointer-events: none;
        }

        .card-icon {
            width: 64px;
            height: 64px;
            background: var(--primary-light);
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 2rem;
            margin-bottom: 16px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .card-title {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        .key-cost {
            background: var(--key);
            padding: 4px 12px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .card-desc {
            color: var(--text-secondary);
            margin: 12px 0 16px;
            flex: 1;
        }

        .meta-row {
            display: flex;
            gap: 20px;
            font-size: 0.9rem;
            color: var(--text-tertiary);
            margin-bottom: 20px;
        }

        .meta-row i {
            color: var(--primary);
            width: 18px;
        }

        .completed-stamp {
            background: var(--success);
            color: white;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            width: fit-content;
        }

        /* ---------- DETAILANSICHT ---------- */
        .detail-view {
            display: none;
            padding: 20px 0 40px;
        }

        .detail-header {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-weight: 600;
            cursor: pointer;
            padding: 8px 18px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }

        .back-btn:hover {
            background: var(--primary-light);
            color: var(--primary);
        }

        .step-indicator {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }

        .step-dot {
            width: 12px;
            height: 12px;
            border-radius: 20px;
            background: var(--border);
            transition: 0.2s;
        }

        .step-dot.active {
            background: var(--primary);
            width: 28px;
        }

        .step-dot.completed {
            background: var(--success);
        }

        /* ---------- KARTEN FÜR LEKTION, EXPERTENNOTIZ, SPIEL, QUIZ ---------- */
        .lesson-card {
            background: var(--surface);
            border-radius: 32px;
            padding: 30px 25px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .lesson-icon {
            width: 70px;
            height: 70px;
            background: var(--primary-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 2.2rem;
            margin: 0 auto 20px;
        }

        .lesson-title {
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 24px;
            letter-spacing: -0.02em;
        }

        .expert-note {
            background: #fff8e7;
            border-radius: 20px;
            padding: 20px;
            margin: 25px 0 15px;
            border-left: 6px solid var(--warning);
            box-shadow: var(--shadow);
        }

        .expert-note h4 {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #b45309;
            margin-bottom: 10px;
            font-size: 1.2rem;
        }

        .user-note {
            background: #e6f3ff;
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            border-left: 6px solid var(--primary);
        }

        .user-note h4 {
            display: flex;
            gap: 8px;
            color: var(--primary-dark);
            margin-bottom: 12px;
        }

        .user-note textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--border);
            border-radius: 18px;
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            background: white;
        }

        .user-note button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            margin-top: 12px;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .user-note button:hover {
            background: var(--primary-dark);
        }

        /* ---------- SPIEL (memory) ---------- */
        .game-area {
            background: linear-gradient(145deg, #f9f9f9, white);
            border-radius: 30px;
            padding: 25px;
            margin: 30px 0;
            border: 1px solid var(--border);
        }

        .pairs-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 20px 0;
        }

        .pair-card {
            background: white;
            border-radius: 20px;
            padding: 18px 8px;
            text-align: center;
            font-weight: 600;
            box-shadow: var(--shadow);
            border: 2px solid transparent;
            transition: 0.2s;
            cursor: pointer;
        }

        .pair-card.selected {
            border-color: var(--primary);
            background: var(--primary-light);
        }

        .pair-card.matched {
            background: var(--success);
            color: white;
            opacity: 0.6;
            pointer-events: none;
        }

        /* ---------- QUIZ (Modul Abschluss) ---------- */
        .quiz-container {
            margin: 30px 0;
        }

        .quiz-question {
            font-size: 1.3rem;
            font-weight: 700;
            margin: 25px 0 15px;
        }

        .quiz-option {
            background: white;
            border: 2px solid var(--border);
            border-radius: 60px;
            padding: 15px 20px;
            margin: 10px 0;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 18px;
            font-weight: 500;
        }

        .quiz-option:hover {
            border-color: var(--primary);
            background: var(--primary-light);
        }

        .quiz-option.selected {
            border-color: var(--primary);
            background: var(--primary-light);
        }

        .quiz-option.correct {
            border-color: var(--success);
            background: #e0f2fe;
        }

        .quiz-option.incorrect {
            border-color: var(--danger);
            background: #fee2e2;
        }

        .option-letter {
            width: 32px;
            height: 32px;
            background: var(--primary-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--primary);
        }

        .quiz-feedback {
            padding: 20px;
            border-radius: 30px;
            margin: 20px 0;
            display: none;
            font-weight: 600;
        }

        /* ---------- BUTTONS ---------- */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .nav-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: var(--shadow);
        }

        .nav-btn.secondary {
            background: white;
            color: var(--primary);
            border: 1px solid var(--border);
        }

        .nav-btn:disabled {
            background: var(--border);
            color: var(--text-tertiary);
            pointer-events: none;
        }

        .nav-btn:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: scale(1.02);
        }

        .nav-btn.secondary:hover {
            background: var(--primary-light);
        }

        /* ---------- ABSCHLUSS / CONFETTI ---------- */
        .completion-screen {
            text-align: center;
            padding: 30px 20px;
        }

        .key-reward {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 30px 0;
        }

        .big-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            animation: bounce 1s infinite;
        }

        @keyframes bounce { 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-10px); } }

        .confetti {
            position: fixed;
            width: 12px;
            height: 12px;
            background: var(--accent);
            top: -20px;
            z-index: 9999;
            animation: fall 3s linear forwards;
        }

        @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }

        /* ---------- MOBILE OPTIMIERUNG ---------- */
        @media (max-width: 600px) {
            .logo span { display: none; }
            .progress-wrap { padding: 4px 8px; }
            .progress-bar-bg { width: 60px; }
            .module-grid { grid-template-columns: 1fr; }
            .hero-module h2 { font-size: 1.8rem; }
            .lesson-card { padding: 20px; }
            .pairs-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container header-content">
            <div class="logo" id="homeBtn">
                <div class="logo-icon"><i class="fas fa-hand-holding-heart"></i></div>
                <span>PflegefachProfi</span>
            </div>
            <div class="user-stats">
                <div class="key-badge"><i class="fa-solid fa-key"></i> <span id="keyCount">1</span></div>
                <div class="progress-wrap">
                    <div class="progress-bar-bg"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
                    <span class="progress-text" id="progressText">0/3</span>
                </div>
            </div>
        </div>
    </header>

    <main>
        <!-- MODULÜBERSICHT (HOME) -->
        <section id="moduleOverview" class="container">
            <div class="hero-module">
                <h2>Willkommen, Pflegeprofi</h2>
                <p>Dein persönlicher Prüfungstrainer – mit Schlüsseln, Spielen und Merkhilfen.</p>
                <span class="badge"><i class="fas fa-star"></i> 3 Module bereit</span>
            </div>
            <div class="module-grid" id="moduleGrid"></div>
        </section>

        <!-- DETAILANSICHT MODUL -->
        <section id="moduleDetail" class="detail-view container">
            <div class="detail-header">
                <button class="back-btn" id="backToOverview"><i class="fas fa-arrow-left"></i> alle Module</button>
                <div class="step-indicator" id="stepIndicator"></div>
            </div>
            <div id="lessonContainer"></div>
        </section>
    </main>

    <!-- Platz für Confetti -->
    <div id="confettiContainer" style="position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:9999;"></div>

    <script>
        (function(){
            // ---------- FARBEN & GRUNDLAGEN (original) ----------
            // Alle Daten sind leicht erweiterbar

            const MODULES = [
                {
                    id: 1,
                    title: 'Kompetenzbereiche & Prüfungstage',
                    icon: 'fa-clipboard-list',
                    desc: 'Welcher KB wird wann geprüft? Lerne die 5 Bereiche und ihre Schwerpunkte.',
                    keyCost: 0,
                    lessons: [
                        { title: 'Die 5 Kompetenzbereiche', body: '<p><strong>KB I Pflegeprozess</strong> (I.1–I.6)<br><strong>KB II Kommunikation</strong> (II.1–II.3)<br><strong>KB III Team</strong> (III.1–III.3)<br><strong>KB IV Recht/Ethik</strong> (IV.1–IV.3)<br><strong>KB V Wissenschaft</strong> (V.1–V.3)</p>' },
                        { title: 'Prüfungstag 1 (schriftlich)', body: '<p><span class="badge" style="background:var(--primary-light)">I.1, II.1, I.5, I.6</span> – Pflegeprozess planen, Beziehungsgestaltung, evaluieren, dokumentieren.</p><div class="example-box" style="background:#fff0d9; padding:15px; border-radius:20px;">🔍 <strong>Fallbeispiel:</strong> Herr Meier, Diabetes & Demenz – Pflegeplanung mit SMARTen Zielen.</div>' },
                        { title: 'Prüfungstag 2 (schriftlich)', body: '<p><span class="badge" style="background:var(--primary-light)">I.2, II.2, V.1</span> – Pflegediagnostik, Beratung, Evidenz.</p><div class="example-box" style="background:#fff0d9; padding:15px; border-radius:20px;">🔍 Beratung eines Patienten mit Sturzrisiko – evidenzbasierte Massnahmen nennen.</div>' },
                        { title: 'Tag 3, mündlich & praktisch', body: '<p><span class="badge" style="background:var(--primary-light)">I.3, I.4, III.2, II.3</span> sowie <strong>mündlich:</strong> KB III, IV, V (Reflexion).</p>' }
                    ],
                    expertNote: '<strong>💡 Merkhilfe:</strong> Die Abkürzung <em>P-R-H-D-W</em> hilft: Pflegen, Reden, Helfen, Denken, Wissen.',
                    gamePairs: [
                        { left: 'KB I', right: 'Pflegeprozess' },
                        { left: 'KB II', right: 'Kommunikation' },
                        { left: 'KB III', right: 'Team' },
                        { left: 'KB IV', right: 'Recht/Ethik' },
                        { left: 'KB V', right: 'Wissenschaft' }
                    ],
                    quiz: [
                        { q: 'Welcher Kompetenzbereich umfasst die Pflegeprozessplanung?', options: ['KB I', 'KB II', 'KB III', 'KB IV'], correct: 0 },
                        { q: 'An welchem Prüfungstag wird Kommunikation (KB II) geprüft?', options: ['Nur Tag 1', 'Tag 1 und 2', 'Nur mündlich', 'Nur praktisch'], correct: 1 },
                        { q: 'Was ist Schwerpunkt der mündlichen Prüfung?', options: ['Praktische Pflege', 'Reflexion mit Recht, Ethik, Wissenschaft', 'Dokumentation', 'Medikamente'], correct: 1 }
                    ]
                },
                {
                    id: 2,
                    title: 'Kommunikationsmodelle',
                    icon: 'fa-message',
                    desc: 'Vier‑Ohren, Peplau, GFK – mit Beispielen aus dem Pflegealltag.',
                    keyCost: 1,
                    lessons: [
                        { title: 'Vier‑Ohren‑Modell (Schulz von Thun)', body: '<ul class="bullet-list"><li><strong>Sachebene:</strong> Worüber ich informiere</li><li><strong>Selbstoffenbarung:</strong> Was ich von mir zeige</li><li><strong>Beziehungsebene:</strong> Was ich vom anderen halte</li><li><strong>Appellebene:</strong> Wozu ich bewegen will</li></ul><div class="example-box">🫂 Patient: „Ist heute schon wieder diese Schwester da?“ → Appell: andere Schwester schicken.</div>' },
                        { title: 'Pflegetheorie Peplau', body: '<ul><li><strong>Orientierung:</strong> Kennenlernen</li><li><strong>Identifikation:</strong> Vertrauen</li><li><strong>Nutzung:</strong> Selbstständigkeit</li><li><strong>Auflösung:</strong> Beziehung endet</li></ul><div class="example-box">👵 Aufnahmegespräch: „Was brauchen Sie?“</div>' },
                        { title: 'Gewaltfreie Kommunikation (GFK)', body: '<ol><li>Beobachtung (ohne Wertung)</li><li>Gefühl („Ich fühle …“)</li><li>Bedürfnis („weil ich brauche …“)</li><li>Bitte (konkret, erfüllbar)</li></ol><div class="example-box">„Ich sehe Sie weinen, ich fühle mich betroffen, weil mir Ihr Wohl wichtig ist. Möchten Sie reden?“</div>' },
                        { title: 'Ich‑Botschaften & Fragetechniken', body: '<p><strong>Ich‑Botschaft:</strong> „Ich habe das Gefühl, Sie sind ungeduldig“ statt Vorwurf.<br><strong>Offene Frage:</strong> „Was beschäftigt Sie?“<br><strong>Paraphrasieren:</strong> „Verstehe ich richtig, dass …?“</p>' }
                    ],
                    expertNote: '<strong>👩‍🏫 Expertentipp:</strong> In der Prüfung immer das Modell benennen und dann auf das Beispiel anwenden – das bringt Punkte.',
                    gamePairs: [
                        { left: 'Sachebene', right: 'Fakten' },
                        { left: 'Selbstoffenbarung', right: 'Gefühle' },
                        { left: 'Beziehungsebene', right: 'Tonfall' },
                        { left: 'Appellebene', right: 'Wunsch' }
                    ],
                    quiz: [
                        { q: 'Vier-Ohren-Modell: Welche Ebene fehlt? (Sache, Selbstoffenbarung, Beziehung, ?)', options: ['Appell', 'Kanal', 'Rauschen', 'Feedback'], correct: 0 },
                        { q: 'Peplau: In welcher Phase entsteht Vertrauen?', options: ['Orientierung', 'Identifikation', 'Nutzung', 'Auflösung'], correct: 1 },
                        { q: 'Erster Schritt der GFK?', options: ['Gefühl', 'Bedürfnis', 'Beobachtung', 'Bitte'], correct: 2 }
                    ]
                },
                {
                    id: 3,
                    title: 'Recht in der Pflege',
                    icon: 'fa-gavel',
                    desc: 'Einwilligung, Fixierung, Haftung – fallbasiert verstehen.',
                    keyCost: 1,
                    lessons: [
                        { title: 'Einwilligung & Aufklärung', body: '<p><strong>§630d BGB:</strong> Einwilligung nötig<br><strong>§630e:</strong> Aufklärung durch Arzt</p><div class="example-box">Demenz-Patientin wehrt sich gegen PEG → keine wirksame Einwilligung (natürlicher Wille).</div>' },
                        { title: 'Unterbringung / Fixierung', body: '<p>Freiheitsentziehung nur mit richterlicher Genehmigung, ausser bei akuter Eigengefahr (dann sofort nachholen).</p><div class="example-box">Fixierung mit Bauchgurt ohne Beschluss = rechtswidrig. Alternativen: Niedrigbett, Wechseldruckmatratze.</div>' },
                        { title: 'Haftung & Delegation', body: '<p><strong>§823 BGB:</strong> Schadensersatz bei schuldhafter Pflichtverletzung.<br><strong>Übernahmeverantwortung:</strong> Nur Aufgaben übernehmen, die man beherrscht.</p><div class="example-box">i.v.-Injektion ohne Ausbildung → Pflegekraft haftet.</div>' },
                        { title: 'Schweigepflicht & Datenschutz', body: '<p><strong>§203 StGB:</strong> Strafrechtliche Schweigepflicht. Auskunft nur mit Einwilligung.</p><div class="example-box">Ehemann fragt nach Diagnose: „Bitten Sie Ihre Frau, mich zu entbinden.“</div>' }
                    ],
                    expertNote: '<strong>⚖️ Wichtig:</strong> In der mündlichen Prüfung immer zuerst den Paragrafen nennen, dann erklären – das zeigt Kompetenz.',
                    gamePairs: [
                        { left: '§630d', right: 'Einwilligung' },
                        { left: '§823', right: 'Schadensersatz' },
                        { left: 'Fixierung', right: 'Freiheitsentziehung' },
                        { left: 'Übernahme', right: 'Verantwortung' }
                    ],
                    quiz: [
                        { q: 'Wer klärt über einen Eingriff auf?', options: ['Arzt', 'Pflegekraft', 'Angehörige', 'Patient'], correct: 0 },
                        { q: 'Fixierung ohne richterliche Genehmigung ist erlaubt …', options: ['nie', 'bei akuter Eigengefahr (dann sofort beantragen)', 'immer mit Einwilligung', 'nach Rücksprache mit Angehörigen'], correct: 1 },
                        { q: 'Übernahmeverantwortung bedeutet:', options: ['Alles ausführen, was der Arzt sagt', 'Nur übernehmen, was man kann', 'Der Arzt haftet immer', 'Der Patient haftet mit'], correct: 1 }
                    ]
                }
            ];

            // ---------- Globale Zustände ----------
            let userKeys = 1;
            let completedModules = [];
            let userNotes = {};      // { modulId: "notiz" }

            // Cookies
            function setCookie(name, val, days) {
                let d = new Date();
                d.setTime(d.getTime() + days * 86400000);
                document.cookie = name + "=" + JSON.stringify(val) + ";expires=" + d.toUTCString() + ";path=/";
            }
            function getCookie(name) {
                let cookies = document.cookie.split('; ');
                for (let c of cookies) {
                    let [n, v] = c.split('=');
                    if (n === name) try { return JSON.parse(v); } catch { return v; }
                }
                return null;
            }

            function loadProgress() {
                let k = getCookie('userKeys');
                if (k !== null) userKeys = parseInt(k);
                else userKeys = 1;
                let cm = getCookie('completedModules');
                if (cm) completedModules = cm;
                let un = getCookie('userNotes');
                if (un) userNotes = un;
                updateUI();
            }
            function saveProgress() {
                setCookie('userKeys', userKeys, 30);
                setCookie('completedModules', completedModules, 30);
                setCookie('userNotes', userNotes, 30);
                updateUI();
            }

            // UI aktualisieren (Header, Modul-Grid)
            function updateUI() {
                document.getElementById('keyCount').innerText = userKeys;
                let total = MODULES.length;
                let comp = completedModules.length;
                document.getElementById('progressFill').style.width = (comp / total * 100) + '%';
                document.getElementById('progressText').innerText = comp + '/' + total;
                renderModules();
            }

            // MODULE ÜBERSICHT ZEICHNEN
            function renderModules() {
                let grid = document.getElementById('moduleGrid');
                grid.innerHTML = '';
                MODULES.forEach(m => {
                    let completed = completedModules.includes(m.id);
                    let locked = m.keyCost > 0 && !completed && userKeys < m.keyCost && m.id !== 1;
                    let card = document.createElement('div');
                    card.className = `module-card ${locked ? 'locked' : ''}`;
                    card.dataset.id = m.id;
                    card.innerHTML = `
                        <div class="card-icon"><i class="fas ${m.icon}"></i></div>
                        <div class="card-header">
                            <span class="card-title">${m.title}</span>
                            <span class="key-cost"><i class="fa-solid fa-key"></i> ${m.keyCost}</span>
                        </div>
                        <p class="card-desc">${m.desc}</p>
                        <div class="meta-row">
                            <span><i class="fas fa-book-open"></i> ${m.lessons.length}</span>
                            <span><i class="fas fa-puzzle-piece"></i> Spiel</span>
                        </div>
                        ${completed ? '<div class="completed-stamp"><i class="fas fa-check-circle"></i> abgeschlossen</div>' : ''}
                    `;
                    grid.appendChild(card);
                });
            }

            // MODUL ÖFFNEN
            function openModule(id) {
                let mod = MODULES.find(m => m.id === id);
                if (!mod) return;
                if (id !== 1 && !completedModules.includes(id) && userKeys < mod.keyCost) {
                    alert(`🔒 Du brauchst ${mod.keyCost} Schlüssel.`);
                    return;
                }
                // Schlüssel abziehen (nur bei erstmaligem Öffnen)
                if (!completedModules.includes(id) && mod.keyCost > 0 && id !== 1) {
                    userKeys -= mod.keyCost;
                    saveProgress();
                }
                currentModuleId = id;
                currentStep = 0;
                document.getElementById('moduleOverview').style.display = 'none';
                document.getElementById('moduleDetail').style.display = 'block';
                renderLesson();
            }

            let currentModuleId = 1;
            let currentStep = 0;

            // LEKTION RENDERN (inkl. Expertennotiz, Benutzernotiz, Spiel, Quiz-Button)
            function renderLesson() {
                let mod = MODULES.find(m => m.id === currentModuleId);
                let stepCount = mod.lessons.length;
                // Schritt-Indikatoren
                let stepsHtml = '';
                for (let i = 0; i < stepCount; i++) {
                    let cls = 'step-dot';
                    if (i === currentStep) cls += ' active';
                    else if (i < currentStep) cls += ' completed';
                    stepsHtml += `<div class="${cls}"></div>`;
                }
                document.getElementById('stepIndicator').innerHTML = stepsHtml;

                let lesson = mod.lessons[currentStep];
                let savedNote = userNotes[currentModuleId] || '';

                let html = `
                    <div class="lesson-card">
                        <div class="lesson-icon"><i class="fas ${mod.icon}"></i></div>
                        <h2 class="lesson-title">${lesson.title}</h2>
                        <div class="content">${lesson.body}</div>

                        <!-- EXPERTENNOTIZ (von mir als Experte fest eingetragen) -->
                        <div class="expert-note">
                            <h4><i class="fas fa-lightbulb"></i> Experten‑Tipp</h4>
                            <p>${mod.expertNote || 'Hier kommt ein wertvoller Hinweis.'}</p>
                        </div>

                        <!-- BENUTZERNOTIZ (individuell speicherbar) -->
                        <div class="user-note">
                            <h4><i class="fas fa-pencil-alt"></i> Meine Notizen</h4>
                            <textarea id="userNoteArea" rows="3" placeholder="eigene Gedanken, Merksätze …">${savedNote.replace(/</g, '&lt;')}</textarea>
                            <button id="saveUserNote"><i class="fas fa-save"></i> Notiz speichern</button>
                        </div>

                        <!-- SPIEL (vor dem Quiz) – wird immer angezeigt, aber nur wenn letzte Lektion erreicht? Wir zeigen es immer, kann aber auch übersprungen werden. Besser: Nur anzeigen, wenn currentStep === stepCount-1? Nein, Kunde wollte "bevor das Quiz", also wenn es die letzte Lektion ist, vor dem Quiz. -->
                        ${currentStep === stepCount-1 ? `
                            <div class="game-area">
                                <h3 style="margin-bottom:15px;"><i class="fas fa-gamepad"></i> Lernspiel – finde die Paare</h3>
                                <div class="pairs-grid" id="gameGrid"></div>
                                <div id="gameMessage" style="margin:15px 0; min-height:24px;"></div>
                                <button class="nav-btn secondary" id="resetGame" style="margin-top:10px;"><i class="fas fa-redo-alt"></i> neu mischen</button>
                            </div>
                        ` : ''}

                        <!-- NAVIGATIONSBUTTONS -->
                        <div class="nav-buttons">
                            <button class="nav-btn secondary" id="prevBtn" ${currentStep === 0 ? 'disabled' : ''}><i class="fas fa-chevron-left"></i> zurück</button>
                            ${currentStep < stepCount-1 ? 
                                '<button class="nav-btn" id="nextBtn">weiter <i class="fas fa-chevron-right"></i></button>' : 
                                '<button class="nav-btn" id="startQuizBtn">🚀 Modul Abschluss</button>'}
                        </div>
                    </div>
                `;

                document.getElementById('lessonContainer').innerHTML = html;

                // Events
                document.getElementById('prevBtn')?.addEventListener('click', () => {
                    if (currentStep > 0) { currentStep--; renderLesson(); }
                });
                document.getElementById('nextBtn')?.addEventListener('click', () => {
                    if (currentStep < stepCount-1) { currentStep++; renderLesson(); }
                });
                document.getElementById('startQuizBtn')?.addEventListener('click', () => {
                    showQuiz();
                });
                document.getElementById('saveUserNote')?.addEventListener('click', () => {
                    let note = document.getElementById('userNoteArea').value;
                    userNotes[currentModuleId] = note;
                    saveProgress();
                    alert('Notiz gespeichert!');
                });

                // Spiel initialisieren (falls vorhanden)
                if (currentStep === stepCount-1) {
                    initGame(mod.gamePairs);
                }
            }

            // SPIEL (Memory)
            function initGame(pairs) {
                if (!pairs) return;
                let grid = document.getElementById('gameGrid');
                let cards = [];
                pairs.forEach((p, idx) => {
                    cards.push({ id: 'l'+idx, text: p.left, pairId: idx, matched: false });
                    cards.push({ id: 'r'+idx, text: p.right, pairId: idx, matched: false });
                });
                cards = cards.sort(() => Math.random() - 0.5);
                grid.innerHTML = '';
                cards.forEach(c => {
                    let div = document.createElement('div');
                    div.className = 'pair-card';
                    div.dataset.pairId = c.pairId;
                    div.dataset.cardId = c.id;
                    div.innerText = c.text;
                    grid.appendChild(div);
                });

                let selected = null;
                let msg = document.getElementById('gameMessage');
                grid.addEventListener('click', (e) => {
                    let card = e.target.closest('.pair-card');
                    if (!card || card.classList.contains('matched')) return;
                    if (!selected) {
                        selected = card;
                        card.classList.add('selected');
                    } else if (selected === card) {
                        selected.classList.remove('selected');
                        selected = null;
                    } else {
                        if (selected.dataset.pairId === card.dataset.pairId) {
                            selected.classList.add('matched');
                            card.classList.add('matched');
                            msg.innerHTML = '✅ Richtig – Paar gefunden!';
                            selected.classList.remove('selected');
                        } else {
                            msg.innerHTML = '❌ Leider falsch. Versuch’s nochmal.';
                            selected.classList.remove('selected');
                        }
                        selected = null;
                    }
                });

                document.getElementById('resetGame')?.addEventListener('click', () => {
                    initGame(pairs);
                    msg.innerHTML = '';
                });
            }

            // QUIZ (Modul Abschluss)
            function showQuiz() {
                let mod = MODULES.find(m => m.id === currentModuleId);
                let questions = mod.quiz;
                let html = `
                    <div class="lesson-card">
                        <h2 class="lesson-title"><i class="fas fa-clipboard-check"></i> Modul Abschluss</h2>
                        <div class="quiz-container" id="quizContainer"></div>
                        <div class="quiz-feedback" id="quizFeedback"></div>
                        <div class="nav-buttons">
                            <button class="nav-btn secondary" id="backFromQuiz"><i class="fas fa-arrow-left"></i> Lektionen</button>
                            <button class="nav-btn" id="submitQuiz">Auswerten</button>
                        </div>
                    </div>
                `;
                document.getElementById('lessonContainer').innerHTML = html;

                let qContainer = document.getElementById('quizContainer');
                questions.forEach((q, idx) => {
                    let qDiv = document.createElement('div');
                    qDiv.innerHTML = `<div class="quiz-question">${idx+1}. ${q.q}</div>`;
                    q.options.forEach((opt, optIdx) => {
                        qDiv.innerHTML += `
                            <div class="quiz-option" data-q="${idx}" data-opt="${optIdx}">
                                <span class="option-letter">${String.fromCharCode(65+optIdx)}</span> ${opt}
                            </div>
                        `;
                    });
                    qContainer.appendChild(qDiv);
                });

                // Auswahl
                document.querySelectorAll('.quiz-option').forEach(opt => {
                    opt.addEventListener('click', function() {
                        let qIdx = this.dataset.q;
                        document.querySelectorAll(`[data-q="${qIdx}"]`).forEach(el => el.classList.remove('selected'));
                        this.classList.add('selected');
                    });
                });

                document.getElementById('backFromQuiz').addEventListener('click', () => {
                    currentStep = mod.lessons.length-1;
                    renderLesson();
                });

                document.getElementById('submitQuiz').addEventListener('click', () => {
                    evaluateQuiz(questions);
                });
            }

            function evaluateQuiz(questions) {
                let correctCount = 0;
                questions.forEach((q, idx) => {
                    let selected = document.querySelector(`.quiz-option.selected[data-q="${idx}"]`);
                    if (selected && parseInt(selected.dataset.opt) === q.correct) correctCount++;
                });
                let fb = document.getElementById('quizFeedback');
                fb.style.display = 'block';
                if (correctCount === questions.length) {
                    fb.innerHTML = '🎉 Glückwunsch! Alle Antworten richtig.';
                    fb.style.background = '#d1fae5';
                    fb.style.color = '#065f46';
                    showConfetti();

                    // Schlüssel nur vergeben, wenn Modul noch nicht abgeschlossen
                    if (!completedModules.includes(currentModuleId)) {
                        completedModules.push(currentModuleId);
                        userKeys += 1;
                        saveProgress();
                    } else {
                        // Wiederholung: keine Belohnung, aber trotzdem Erfolg
                        // wir können eine kurze Nachricht anzeigen
                    }
                    setTimeout(() => {
                        // Weiterleitung zur Übersicht nach Erfolg
                        document.getElementById('moduleDetail').style.display = 'none';
                        document.getElementById('moduleOverview').style.display = 'block';
                    }, 3000);
                } else {
                    fb.innerHTML = `❌ Leider nur ${correctCount}/${questions.length} richtig. Versuch’s nochmal!`;
                    fb.style.background = '#fee2e2';
                    fb.style.color = '#991b1b';
                }
            }

            // CONFETTI
            function showConfetti() {
                let container = document.getElementById('confettiContainer');
                for (let i = 0; i < 70; i++) {
                    let conf = document.createElement('div');
                    conf.className = 'confetti';
                    conf.style.left = Math.random() * 100 + '%';
                    conf.style.background = `hsl(${Math.random()*360}, 80%, 60%)`;
                    conf.style.animationDelay = Math.random() * 2 + 's';
                    container.appendChild(conf);
                }
                setTimeout(() => container.innerHTML = '', 3500);
            }

            // EVENT LISTENER
            document.getElementById('homeBtn').addEventListener('click', () => {
                document.getElementById('moduleDetail').style.display = 'none';
                document.getElementById('moduleOverview').style.display = 'block';
            });
            document.getElementById('backToOverview').addEventListener('click', () => {
                document.getElementById('moduleDetail').style.display = 'none';
                document.getElementById('moduleOverview').style.display = 'block';
            });
            document.getElementById('moduleGrid').addEventListener('click', (e) => {
                let card = e.target.closest('.module-card');
                if (card) openModule(parseInt(card.dataset.id));
            });

            // START
            loadProgress();
        })();
    </script>
</body>
</html>
