<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>PflegefachProfi • Lernen mit Flow</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #4361ee;
            --primary-soft: #eef2ff;
            --secondary: #7209b7;
            --accent: #f72585;
            --success: #4cc9f0;
            --warning: #fca311;
            --danger: #e63946;
            --key: #ffd166;
            --surface: #ffffff;
            --background: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-light: #e2e8f0;
            --shadow-sm: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            --shadow-md: 0 10px 15px -3px rgb(0 0 0 / 0.05), 0 4px 6px -4px rgb(0 0 0 / 0.05);
            --radius-card: 24px;
            --radius-btn: 40px;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: var(--font);
            background: var(--background);
            color: var(--text-main);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 1024px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-light);
            position: sticky;
            top: 0;
            z-index: 30;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 1.4rem;
            color: var(--primary);
            letter-spacing: -0.02em;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(145deg, var(--primary), var(--secondary));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.3rem;
            box-shadow: var(--shadow-sm);
        }

        .user-stats {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .key-badge {
            background: var(--key);
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: var(--shadow-sm);
        }

        .progress-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            background: white;
            padding: 4px 14px 4px 8px;
            border-radius: 40px;
            box-shadow: var(--shadow-sm);
        }

        .progress-bar-bg {
            width: 80px;
            height: 8px;
            background: var(--border-light);
            border-radius: 40px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--success), var(--primary));
            border-radius: 40px;
            transition: width 0.4s ease;
        }

        .progress-text {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        /* Main sections */
        .section {
            padding: 32px 0;
        }

        .section-title {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }

        .section-sub {
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        /* Module grid */
        .module-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }

        .module-card {
            background: var(--surface);
            border-radius: var(--radius-card);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            border: 1px solid var(--border-light);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .module-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary-soft);
        }

        .module-card.locked {
            opacity: 0.7;
            filter: grayscale(0.5);
            pointer-events: none;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .icon-circle {
            width: 56px;
            height: 56px;
            background: var(--primary-soft);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 1.8rem;
        }

        .key-cost {
            background: var(--key);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .module-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .module-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        .module-meta {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .module-meta i {
            margin-right: 4px;
            color: var(--primary);
        }

        .completed-badge {
            background: var(--success);
            color: white;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        /* Module detail view */
        .detail-view {
            display: none;
            padding: 24px 0 40px;
        }

        .detail-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px 16px 8px 8px;
            border-radius: 40px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .back-btn:hover {
            background: var(--primary-soft);
            color: var(--primary);
        }

        .step-indicator {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }

        .step-dot {
            width: 12px;
            height: 12px;
            border-radius: 20px;
            background: var(--border-light);
            transition: var(--transition);
        }

        .step-dot.active {
            background: var(--primary);
            width: 28px;
        }

        .step-dot.completed {
            background: var(--success);
        }

        /* Lesson card */
        .lesson-card {
            background: var(--surface);
            border-radius: var(--radius-card);
            padding: 32px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-light);
            margin-bottom: 24px;
        }

        .lesson-icon {
            width: 72px;
            height: 72px;
            background: var(--primary-soft);
            border-radius: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 2.2rem;
            margin: 0 auto 24px;
        }

        .lesson-title {
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 24px;
            letter-spacing: -0.02em;
        }

        .content-block {
            margin: 24px 0;
        }

        .info-chip {
            background: var(--primary-soft);
            border-radius: 40px;
            padding: 8px 18px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            margin-bottom: 16px;
        }

        .example-box {
            background: #fff7ed;
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
            border-left: 4px solid var(--warning);
        }

        .bullet-list {
            list-style: none;
            padding: 0;
        }

        .bullet-list li {
            padding: 8px 0 8px 28px;
            position: relative;
        }

        .bullet-list li::before {
            content: "•";
            color: var(--primary);
            font-size: 1.5rem;
            position: absolute;
            left: 8px;
            top: -2px;
        }

        /* Notes section */
        .notes-section {
            background: #fef9e7;
            border-radius: 20px;
            padding: 20px;
            margin: 30px 0 20px;
            border: 2px dashed var(--key);
        }

        .notes-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #b45309;
        }

        .notes-textarea {
            width: 100%;
            padding: 16px;
            border: 1px solid var(--border-light);
            border-radius: 16px;
            font-family: inherit;
            font-size: 0.95rem;
            resize: vertical;
            background: white;
        }

        .notes-save {
            background: var(--key);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            margin-top: 10px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
        }

        .notes-save:hover {
            background: #e9b949;
        }

        /* Navigation buttons */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 24px;
        }

        .nav-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: var(--radius-btn);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: var(--shadow-sm);
        }

        .nav-btn:disabled {
            background: var(--border-light);
            color: var(--text-muted);
            cursor: not-allowed;
            box-shadow: none;
        }

        .nav-btn.secondary {
            background: white;
            color: var(--primary);
            border: 1px solid var(--border-light);
        }

        /* Quiz */
        .quiz-option {
            background: white;
            border: 2px solid var(--border-light);
            border-radius: 60px;
            padding: 16px 24px;
            margin: 12px 0;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .quiz-option:hover {
            border-color: var(--primary);
            background: var(--primary-soft);
        }

        .quiz-option.selected {
            border-color: var(--primary);
            background: var(--primary-soft);
        }

        .quiz-option.correct {
            border-color: var(--success);
            background: #e0f7fa;
        }

        .quiz-option.incorrect {
            border-color: var(--danger);
            background: #ffe6e6;
        }

        .quiz-feedback {
            padding: 20px;
            border-radius: 20px;
            margin: 20px 0;
            font-weight: 500;
            display: none;
        }

        /* Game */
        .game-area {
            background: linear-gradient(145deg, #f1f5f9, #ffffff);
            border-radius: 40px;
            padding: 24px;
            text-align: center;
            margin: 30px 0;
        }

        .pairs-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 20px 0;
        }

        .pair-card {
            background: white;
            border-radius: 20px;
            padding: 16px;
            box-shadow: var(--shadow-sm);
            font-weight: 600;
            border: 2px solid transparent;
            transition: var(--transition);
            cursor: pointer;
        }

        .pair-card.selected {
            border-color: var(--primary);
            background: var(--primary-soft);
        }

        .pair-card.matched {
            background: var(--success);
            color: white;
            opacity: 0.6;
            pointer-events: none;
        }

        /* Completion */
        .completion-screen {
            text-align: center;
            padding: 40px 20px;
        }

        .key-reward {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }

        .big-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%,100%{ transform: translateY(0); }
            50%{ transform: translateY(-10px); }
        }

        /* Confetti */
        .confetti {
            position: fixed;
            width: 12px;
            height: 12px;
            background: var(--accent);
            top: -10px;
            z-index: 9999;
            animation: confetti-fall 3s linear forwards;
        }

        @keyframes confetti-fall {
            to { transform: translateY(100vh) rotate(720deg); }
        }

        /* Mobile tweaks */
        @media (max-width: 640px) {
            .header-content {
                height: 60px;
            }
            .logo span {
                display: none;
            }
            .progress-wrap {
                padding: 4px 8px;
            }
            .progress-bar-bg {
                width: 60px;
            }
            .module-grid {
                grid-template-columns: 1fr;
            }
            .lesson-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container header-content">
            <div class="logo" id="homeBtn">
                <div class="logo-icon"><i class="fas fa-hand-holding-heart"></i></div>
                <span>PflegefachProfi</span>
            </div>
            <div class="user-stats">
                <div class="key-badge" id="keyDisplay">
                    <i class="fa-solid fa-key"></i> <span id="keyCount">1</span>
                </div>
                <div class="progress-wrap">
                    <div class="progress-bar-bg">
                        <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
                    </div>
                    <span class="progress-text" id="progressText">0/3</span>
                </div>
            </div>
        </div>
    </header>

    <main>
        <!-- Module Overview -->
        <section id="moduleOverview" class="section">
            <div class="container">
                <h1 class="section-title">Deine Lernpfade</h1>
                <p class="section-sub">Wähle ein Modul und sammle Schlüssel für neue Inhalte.</p>
                <div class="module-grid" id="moduleGrid"></div>
            </div>
        </section>

        <!-- Module Detail View -->
        <section id="moduleDetail" class="detail-view">
            <div class="container">
                <div class="detail-header">
                    <button class="back-btn" id="backToOverview"><i class="fas fa-arrow-left"></i> Übersicht</button>
                    <div class="step-indicator" id="stepIndicator"></div>
                </div>

                <!-- Dynamic content -->
                <div id="lessonContainer"></div>
            </div>
        </section>
    </main>

    <!-- Hidden confetti container -->
    <div id="confettiContainer" style="position: fixed; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index: 9999;"></div>

    <script>
        (function() {
            // ---------- MODULE DATA ----------
            const MODULES = [
                {
                    id: 1,
                    title: 'Kompetenzbereiche & Prüfungstage',
                    icon: 'fa-clipboard-list',
                    desc: 'Lerne die 5 Kompetenzbereiche und deren Prüfungszuordnung.',
                    lessons: 4,
                    time: '25 min',
                    keyCost: 0,
                    content: [
                        {
                            title: 'Die fünf Kompetenzbereiche',
                            body: `
                                <div class="info-chip"><i class="fas fa-check-circle"></i> KB I: Pflegeprozess</div>
                                <p>I.1 Pflegeprozess planen, I.2 Pflegediagnostik, I.3 Lebensgestaltung, I.4 Mobilisation, I.5 Evaluieren, I.6 Dokumentieren</p>
                                <div class="info-chip"><i class="fas fa-comments"></i> KB II: Kommunikation</div>
                                <p>II.1 Beziehungsgestaltung, II.2 Beratung, II.3 Interkulturelle Kommunikation</p>
                                <div class="info-chip"><i class="fas fa-handshake"></i> KB III: Interprofessionelles Handeln</div>
                                <p>III.1 Team, III.2 Ärztliche Anordnungen, III.3 Schnittstellen</p>
                                <div class="info-chip"><i class="fas fa-gavel"></i> KB IV: Recht & Ethik</div>
                                <p>IV.1 Rechtsgrundlagen, IV.2 Ethische Leitlinien, IV.3 Berufsethos</p>
                                <div class="info-chip"><i class="fas fa-flask"></i> KB V: Wissenschaft</div>
                                <p>V.1 Evidenzbasierte Pflege, V.2 Reflexion, V.3 Qualitätsentwicklung</p>
                            `
                        },
                        {
                            title: 'Prüfungstag 1 (schriftlich)',
                            body: `
                                <div class="example-box">
                                    <strong>Geprüft:</strong> I.1, II.1, I.5, I.6<br>
                                    <em>Fallbeispiel:</em> Pflegeplanung für einen Patienten mit Diabetes und Demenz – Ziele SMART formulieren.
                                </div>
                            `
                        },
                        {
                            title: 'Prüfungstag 2 (schriftlich)',
                            body: `
                                <div class="example-box">
                                    <strong>Geprüft:</strong> I.2, II.2, V.1<br>
                                    <em>Fallbeispiel:</em> Beratung eines Patienten mit Sturzrisiko – evidenzbasierte Maßnahmen.
                                </div>
                            `
                        },
                        {
                            title: 'Tag 3 & mündlich/praktisch',
                            body: `
                                <div class="example-box">
                                    <strong>Tag 3:</strong> I.3, I.4, III.2, II.3<br>
                                    <strong>Mündlich:</strong> KB III, IV, V – Reflexion mit Recht und Ethik.<br>
                                    <strong>Praktisch:</strong> Alle KB I-V in Handlung & Reflexion.
                                </div>
                            `
                        }
                    ]
                },
                {
                    id: 2,
                    title: 'Kommunikationsmodelle',
                    icon: 'fa-message',
                    desc: 'Vier-Ohren, Peplau, GFK – mit Beispielen aus der Pflege.',
                    lessons: 4,
                    time: '30 min',
                    keyCost: 1,
                    content: [
                        {
                            title: 'Vier-Ohren-Modell (Schulz von Thun)',
                            body: `
                                <ul class="bullet-list">
                                    <li><strong>Sachebene:</strong> Worüber ich informiere (Fakten)</li>
                                    <li><strong>Selbstoffenbarung:</strong> Was ich von mir zeige (Gefühle)</li>
                                    <li><strong>Beziehungsebene:</strong> Was ich vom Empfänger halte (Tonfall)</li>
                                    <li><strong>Appellebene:</strong> Wozu ich bewegen will (Wunsch)</li>
                                </ul>
                                <div class="example-box">
                                    <strong>Beispiel:</strong> "Ist heute schon wieder diese Schwester da?" – Appell: Andere Schwester schicken.
                                </div>
                            `
                        },
                        {
                            title: 'Pflegetheorie Peplau',
                            body: `
                                <ul class="bullet-list">
                                    <li><strong>Orientierung:</strong> Kennenlernen, Vertrauen</li>
                                    <li><strong>Identifikation:</strong> Patient nutzt Angebote</li>
                                    <li><strong>Nutzung:</strong> Selbstständigkeit</li>
                                    <li><strong>Auflösung:</strong> Beziehung endet</li>
                                </ul>
                                <div class="example-box">Beispiel: Aufnahmegespräch – "Was brauchen Sie?"</div>
                            `
                        },
                        {
                            title: 'Gewaltfreie Kommunikation (Rosenberg)',
                            body: `
                                <ol class="bullet-list" style="list-style:decimal; padding-left:20px;">
                                    <li>Beobachtung (ohne Bewertung)</li>
                                    <li>Gefühl (Ich fühle...)</li>
                                    <li>Bedürfnis (weil ich brauche...)</li>
                                    <li>Bitte (konkret, erfüllbar)</li>
                                </ol>
                                <div class="example-box">"Ich sehe Sie weinen, ich fühle mich betroffen, weil mir Ihr Wohl wichtig ist. Möchten Sie reden?"</div>
                            `
                        },
                        {
                            title: 'Ich-Botschaften & Fragetechniken',
                            body: `
                                <p><strong>Ich-Botschaft:</strong> "Ich habe das Gefühl, Sie sind ungeduldig" statt "Sie sind ungeduldig".</p>
                                <p><strong>Offene Frage:</strong> "Was beschäftigt Sie?"</p>
                                <p><strong>Paraphrasieren:</strong> "Verstehe ich richtig, dass ...?"</p>
                            `
                        }
                    ]
                },
                {
                    id: 3,
                    title: 'Recht in der Pflege',
                    icon: 'fa-gavel',
                    desc: 'Einwilligung, Fixierung, Haftung – fallbasiert lernen.',
                    lessons: 4,
                    time: '35 min',
                    keyCost: 1,
                    content: [
                        {
                            title: 'Einwilligung & Aufklärung',
                            body: `
                                <p><strong>§ 630d BGB:</strong> Einwilligung nötig, <strong>§ 630e:</strong> Aufklärung durch Arzt.</p>
                                <p>Voraussetzungen: Einsichtsfähigkeit, Aufklärung, Freiwilligkeit.</p>
                                <div class="example-box">Demenz-Patientin wehrt sich gegen PEG – keine wirksame Einwilligung (natürlicher Wille).</div>
                            `
                        },
                        {
                            title: 'Unterbringung / Fixierung',
                            body: `
                                <p>Freiheitsentziehung nur mit richterlicher Genehmigung, außer bei akuter Eigengefahr (dann sofort nachholen).</p>
                                <div class="example-box">Fixierung mit Bauchgurt ohne Beschluss = rechtswidrig. Alternativen: Niedrigbett, Wechseldruckmatratze.</div>
                            `
                        },
                        {
                            title: 'Haftung & Delegation',
                            body: `
                                <p><strong>§ 823 BGB:</strong> Schadensersatz bei schuldhafter Pflichtverletzung.</p>
                                <p>Übernahmeverantwortung: Nur Aufgaben übernehmen, die man beherrscht.</p>
                                <div class="example-box">i.v.-Injektion ohne Ausbildung: Pflegekraft haftet (Übernahmeverantwortung).</div>
                            `
                        },
                        {
                            title: 'Schweigepflicht & Datenschutz',
                            body: `
                                <p><strong>§ 203 StGB:</strong> Strafrechtliche Schweigepflicht. Auskunft nur mit Einwilligung.</p>
                                <div class="example-box">Ehemann fragt nach Diagnose: "Fragen Sie Ihre Frau, sie muss mich entbinden."</div>
                            `
                        }
                    ]
                }
            ];

            // ---------- GLOBALS ----------
            let userKeys = 1;
            let completedModules = [];
            let currentModuleId = 1;
            let currentStep = 0;
            let notes = {}; // { moduleId: "note text" }

            // ---------- COOKIE HELPERS ----------
            function setCookie(name, val, days) {
                const d = new Date();
                d.setTime(d.getTime() + days*86400000);
                document.cookie = name + "=" + JSON.stringify(val) + ";expires=" + d.toUTCString() + ";path=/";
            }
            function getCookie(name) {
                const cookies = document.cookie.split('; ');
                for (let c of cookies) {
                    const [n, v] = c.split('=');
                    if (n === name) try { return JSON.parse(v); } catch { return v; }
                }
                return null;
            }

            // ---------- LOAD / SAVE ----------
            function loadProgress() {
                const k = getCookie('userKeys');
                if (k !== null) userKeys = parseInt(k);
                else userKeys = 1;
                const cm = getCookie('completedModules');
                if (cm) completedModules = cm;
                const nt = getCookie('notes');
                if (nt) notes = nt;
                updateUI();
            }
            function saveProgress() {
                setCookie('userKeys', userKeys, 30);
                setCookie('completedModules', completedModules, 30);
                setCookie('notes', notes, 30);
                updateUI();
            }

            // ---------- UI UPDATE ----------
            function updateUI() {
                document.getElementById('keyCount').innerText = userKeys;
                const total = MODULES.length;
                const completed = completedModules.length;
                document.getElementById('progressFill').style.width = (completed/total*100)+'%';
                document.getElementById('progressText').innerText = `${completed}/${total}`;
                renderModules();
            }

            // ---------- RENDER MODULES ----------
            function renderModules() {
                const grid = document.getElementById('moduleGrid');
                grid.innerHTML = '';
                MODULES.forEach(mod => {
                    const isCompleted = completedModules.includes(mod.id);
                    const isLocked = mod.keyCost > 0 && !isCompleted && userKeys < mod.keyCost && mod.id !== 1;
                    const card = document.createElement('div');
                    card.className = `module-card ${isLocked ? 'locked' : ''}`;
                    card.dataset.id = mod.id;
                    card.innerHTML = `
                        <div class="card-header">
                            <div class="icon-circle"><i class="fas ${mod.icon}"></i></div>
                            <span class="key-cost"><i class="fa-solid fa-key"></i> ${mod.keyCost}</span>
                        </div>
                        <h3 class="module-title">${mod.title}</h3>
                        <p class="module-desc">${mod.desc}</p>
                        <div class="module-meta">
                            <span><i class="fas fa-book-open"></i> ${mod.lessons}</span>
                            <span><i class="fas fa-clock"></i> ${mod.time}</span>
                        </div>
                        ${isCompleted ? '<span class="completed-badge"><i class="fas fa-check"></i> Abgeschlossen</span>' : ''}
                    `;
                    grid.appendChild(card);
                });
            }

            // ---------- OPEN MODULE ----------
            function openModule(id) {
                const mod = MODULES.find(m => m.id === id);
                if (!mod) return;
                if (id !== 1 && !completedModules.includes(id) && userKeys < mod.keyCost) {
                    alert(`🔒 Du brauchst ${mod.keyCost} Schlüssel.`);
                    return;
                }
                if (!completedModules.includes(id) && mod.keyCost > 0 && id !== 1) {
                    userKeys -= mod.keyCost;
                    saveProgress();
                }
                currentModuleId = id;
                currentStep = 0;
                document.getElementById('moduleOverview').style.display = 'none';
                document.getElementById('moduleDetail').style.display = 'block';
                renderLesson();
            }

            // ---------- RENDER LESSON ----------
            function renderLesson() {
                const mod = MODULES.find(m => m.id === currentModuleId);
                const steps = mod.content.length;
                // Step indicators
                let stepsHtml = '';
                for (let i=0; i<steps; i++) {
                    let cls = 'step-dot';
                    if (i === currentStep) cls += ' active';
                    else if (i < currentStep) cls += ' completed';
                    stepsHtml += `<div class="${cls}"></div>`;
                }
                document.getElementById('stepIndicator').innerHTML = stepsHtml;

                const lesson = mod.content[currentStep];
                const noteText = notes[currentModuleId] || '';
                const container = document.getElementById('lessonContainer');
                container.innerHTML = `
                    <div class="lesson-card">
                        <div class="lesson-icon"><i class="fas ${mod.icon}"></i></div>
                        <h2 class="lesson-title">${lesson.title}</h2>
                        <div class="content-block">${lesson.body}</div>

                        <!-- Personal Notes -->
                        <div class="notes-section">
                            <div class="notes-header"><i class="fas fa-pen"></i> Meine Notizen</div>
                            <textarea id="moduleNote" class="notes-textarea" rows="3" placeholder="Hier kannst du eigene Notizen ergänzen...">${noteText.replace(/</g, '&lt;')}</textarea>
                            <button class="notes-save" id="saveNote"><i class="fas fa-save"></i> Notiz speichern</button>
                        </div>

                        <div class="nav-buttons">
                            <button class="nav-btn secondary" id="prevBtn" ${currentStep === 0 ? 'disabled' : ''}><i class="fas fa-chevron-left"></i> Zurück</button>
                            ${currentStep < steps-1 ? 
                                '<button class="nav-btn" id="nextBtn">Weiter <i class="fas fa-chevron-right"></i></button>' : 
                                '<button class="nav-btn" id="quizBtn">Zum Quiz <i class="fas fa-question"></i></button>'}
                        </div>
                    </div>
                `;

                document.getElementById('saveNote')?.addEventListener('click', () => {
                    const note = document.getElementById('moduleNote').value;
                    notes[currentModuleId] = note;
                    saveProgress();
                    alert('Notiz gespeichert!');
                });

                document.getElementById('prevBtn')?.addEventListener('click', () => {
                    if (currentStep > 0) { currentStep--; renderLesson(); }
                });
                document.getElementById('nextBtn')?.addEventListener('click', () => {
                    if (currentStep < steps-1) { currentStep++; renderLesson(); }
                });
                document.getElementById('quizBtn')?.addEventListener('click', showQuiz);
            }

            // ---------- QUIZ ----------
            function showQuiz() {
                const mod = MODULES.find(m => m.id === currentModuleId);
                const questions = getQuestions(currentModuleId);
                let html = `<div class="lesson-card"><h2 class="lesson-title">Quiz: ${mod.title}</h2>`;
                questions.forEach((q, idx) => {
                    html += `<div class="quiz-question" data-q="${idx}">${idx+1}. ${q.q}</div>`;
                    q.options.forEach((opt, optIdx) => {
                        html += `<div class="quiz-option" data-q="${idx}" data-opt="${optIdx}" data-correct="${opt.correct}"><span class="option-letter">${String.fromCharCode(65+optIdx)}</span> ${opt.text}</div>`;
                    });
                });
                html += `<div class="quiz-feedback" id="quizFeedback"></div>`;
                html += `<div class="nav-buttons"><button class="nav-btn secondary" id="backFromQuiz"><i class="fas fa-arrow-left"></i> Lektionen</button><button class="nav-btn" id="submitQuiz">Auswerten</button></div>`;
                html += `</div>`;
                document.getElementById('lessonContainer').innerHTML = html;

                // Option selection
                document.querySelectorAll('.quiz-option').forEach(opt => {
                    opt.addEventListener('click', function() {
                        const q = this.dataset.q;
                        document.querySelectorAll(`[data-q="${q}"]`).forEach(el => el.classList.remove('selected'));
                        this.classList.add('selected');
                    });
                });

                document.getElementById('backFromQuiz').addEventListener('click', () => {
                    currentStep = mod.content.length-1;
                    renderLesson();
                });

                document.getElementById('submitQuiz').addEventListener('click', () => {
                    evaluateQuiz(questions);
                });
            }

            function getQuestions(moduleId) {
                if (moduleId === 1) return [
                    { q: 'Welcher KB umfasst die Pflegeprozessplanung?', options: [{text:'KB I',correct:true},{text:'KB II',correct:false},{text:'KB III',correct:false},{text:'KB IV',correct:false}] },
                    { q: 'An welchem Tag wird Kommunikation (KB II) geprüft?', options: [{text:'Nur Tag 1',correct:false},{text:'Tag 1 und 2',correct:true},{text:'Nur mündlich',correct:false},{text:'Nur praktisch',correct:false}] },
                    { q: 'Was ist Schwerpunkt der mündlichen Prüfung?', options: [{text:'Praktische Pflege',correct:false},{text:'Reflexion mit Recht, Ethik, Wissenschaft',correct:true},{text:'Dokumentation',correct:false},{text:'Medikamente',correct:false}] }
                ];
                if (moduleId === 2) return [
                    { q: 'Vier-Ohren-Modell: Welche Ebene fehlt? (Sache, Selbstoffenbarung, Beziehung, ?)', options: [{text:'Appell',correct:true},{text:'Kanal',correct:false},{text:'Rauschen',correct:false},{text:'Feedback',correct:false}] },
                    { q: 'Peplau: In welcher Phase entsteht Vertrauen?', options: [{text:'Orientierung',correct:false},{text:'Identifikation',correct:true},{text:'Nutzung',correct:false},{text:'Auflösung',correct:false}] },
                    { q: 'Erster Schritt der GFK?', options: [{text:'Gefühl',correct:false},{text:'Bedürfnis',correct:false},{text:'Beobachtung',correct:true},{text:'Bitte',correct:false}] }
                ];
                return [
                    { q: 'Wer klärt auf?', options: [{text:'Arzt',correct:true},{text:'Pflegekraft',correct:false},{text:'Angehörige',correct:false},{text:'Patient',correct:false}] },
                    { q: 'Fixierung ohne Beschluss erlaubt?', options: [{text:'Nie',correct:false},{text:'Bei akuter Eigengefahr (dann sofort Genehmigung)',correct:true},{text:'Immer mit Einwilligung',correct:false},{text:'Nach Rücksprache mit Angehörigen',correct:false}] },
                    { q: 'Übernahmeverantwortung bedeutet:', options: [{text:'Alles ausführen',correct:false},{text:'Nur übernehmen, was man kann',correct:true},{text:'Arzt haftet immer',correct:false},{text:'Patient haftet',correct:false}] }
                ];
            }

            function evaluateQuiz(questions) {
                let correct = 0;
                questions.forEach((q, idx) => {
                    const selected = document.querySelector(`.quiz-option.selected[data-q="${idx}"]`);
                    if (selected && selected.dataset.correct === 'true') correct++;
                });
                const fb = document.getElementById('quizFeedback');
                fb.style.display = 'block';
                if (correct === questions.length) {
                    fb.innerHTML = '🎉 Perfekt! Du bekommst einen Schlüssel.';
                    fb.style.background = '#d1fae5';
                    fb.style.color = '#065f46';
                    showConfetti();
                    // Belohnung nur bei erstmaligem Abschluss
                    if (!completedModules.includes(currentModuleId)) {
                        completedModules.push(currentModuleId);
                        userKeys += 1;
                        saveProgress();
                        // Nach 2 Sekunden zum Game weiterleiten
                        setTimeout(() => showGame(), 2000);
                    } else {
                        setTimeout(() => showGame(), 1500);
                    }
                } else {
                    fb.innerHTML = `❌ ${correct}/${questions.length} richtig. Versuch's nochmal.`;
                    fb.style.background = '#fee2e2';
                    fb.style.color = '#991b1b';
                }
            }

            // ---------- MINI-GAME (Memory) ----------
            function showGame() {
                const mod = MODULES.find(m => m.id === currentModuleId);
                const pairs = [
                    { left: 'KB I', right: 'Pflegeprozess' },
                    { left: 'KB II', right: 'Kommunikation' },
                    { left: 'KB III', right: 'Team' },
                    { left: 'KB IV', right: 'Recht/Ethik' },
                    { left: 'KB V', right: 'Wissenschaft' }
                ]; // Beispiel-Paare – könnte modulspezifisch sein
                let gameHtml = `
                    <div class="lesson-card">
                        <h2 class="lesson-title">🧩 Mini-Game: Finde die Paare</h2>
                        <div class="game-area">
                            <p>Klicke auf zwei Karten, die zusammengehören.</p>
                            <div class="pairs-grid" id="pairsGrid"></div>
                            <div id="gameMessage" style="margin:15px 0; min-height:30px;"></div>
                            <button class="nav-btn" id="finishGame">Weiter</button>
                        </div>
                    </div>
                `;
                document.getElementById('lessonContainer').innerHTML = gameHtml;
                const grid = document.getElementById('pairsGrid');
                let cards = [];
                pairs.forEach((p, idx) => {
                    cards.push({ id: 'l'+idx, text: p.left, pairId: idx, matched: false });
                    cards.push({ id: 'r'+idx, text: p.right, pairId: idx, matched: false });
                });
                cards = cards.sort(() => Math.random() - 0.5);
                cards.forEach(c => {
                    const div = document.createElement('div');
                    div.className = 'pair-card';
                    div.dataset.pairId = c.pairId;
                    div.dataset.cardId = c.id;
                    div.innerText = c.text;
                    grid.appendChild(div);
                });

                let selected = null;
                const message = document.getElementById('gameMessage');
                grid.addEventListener('click', (e) => {
                    const card = e.target.closest('.pair-card');
                    if (!card || card.classList.contains('matched')) return;
                    if (!selected) {
                        selected = card;
                        card.classList.add('selected');
                    } else if (selected === card) {
                        selected.classList.remove('selected');
                        selected = null;
                    } else {
                        const pair1 = selected.dataset.pairId;
                        const pair2 = card.dataset.pairId;
                        if (pair1 === pair2) {
                            selected.classList.add('matched');
                            card.classList.add('matched');
                            message.innerText = '✅ Richtig!';
                            selected.classList.remove('selected');
                        } else {
                            message.innerText = '❌ Leider falsch.';
                            selected.classList.remove('selected');
                        }
                        selected = null;
                    }
                });

                document.getElementById('finishGame').addEventListener('click', () => {
                    document.getElementById('moduleDetail').style.display = 'none';
                    document.getElementById('moduleOverview').style.display = 'block';
                });
            }

            // ---------- CONFETTI ----------
            function showConfetti() {
                const container = document.getElementById('confettiContainer');
                for (let i=0; i<60; i++) {
                    const conf = document.createElement('div');
                    conf.className = 'confetti';
                    conf.style.left = Math.random()*100+'%';
                    conf.style.background = `hsl(${Math.random()*360}, 80%, 60%)`;
                    conf.style.animationDelay = Math.random()*2+'s';
                    container.appendChild(conf);
                }
                setTimeout(() => container.innerHTML = '', 3000);
            }

            // ---------- EVENT LISTENERS ----------
            document.getElementById('homeBtn').addEventListener('click', () => {
                document.getElementById('moduleDetail').style.display = 'none';
                document.getElementById('moduleOverview').style.display = 'block';
            });

            document.getElementById('backToOverview').addEventListener('click', () => {
                document.getElementById('moduleDetail').style.display = 'none';
                document.getElementById('moduleOverview').style.display = 'block';
            });

            document.getElementById('moduleGrid').addEventListener('click', (e) => {
                const card = e.target.closest('.module-card');
                if (card) openModule(parseInt(card.dataset.id));
            });

            // ---------- INIT ----------
            loadProgress();
        })();
    </script>
</body>
</html>
