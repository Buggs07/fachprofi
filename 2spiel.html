<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PflegefachProfi — Karteikarten</title>
<style>
/* ============================================================
   DESIGN TOKENS
   ============================================================ */
:root{
  --bg:#ffffff;
  --surface:#fafafa;
  --card-bg:#ffffff;
  --border:#e7e9ee;
  --text:#111827;
  --text-muted:#6b7280;
  --text-faint:#9aa0ab;

  --primary:#2563eb;
  --primary-700:#1d4ed8;
  --primary-100:#eaf0fe;
  --secondary:#7c3aed;
  --secondary-100:#f1eafe;
  --accent:#ec4899;
  --accent-100:#fdeaf3;
  --success:#10b981;
  --success-100:#e7faf2;
  --warning:#f59e0b;
  --warning-100:#fef5e6;
  --danger:#ef4444;
  --danger-100:#fdeaea;

  --shadow-sm: 0 1px 2px rgba(17,24,39,.05);
  --shadow-md: 0 2px 8px rgba(17,24,39,.06), 0 1px 2px rgba(17,24,39,.04);
  --shadow-lg: 0 12px 32px rgba(17,24,39,.10), 0 2px 6px rgba(17,24,39,.05);
  --shadow-card: 0 1px 1px rgba(17,24,39,.03), 0 20px 40px -16px rgba(37,99,235,.18);

  --r-sm:10px;
  --r-md:16px;
  --r-lg:22px;
  --r-full:999px;

  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;

  --bar-h: 64px;
  --maxw: 760px;
}

[data-theme="dark"]{
  --bg:#0a0d14;
  --surface:#11151f;
  --card-bg:#161b27;
  --border:#252b3a;
  --text:#f1f3f7;
  --text-muted:#9aa3b5;
  --text-faint:#67707f;

  --primary:#5b8def;
  --primary-700:#3d6fe0;
  --primary-100:#16233f;
  --secondary:#a78bfa;
  --secondary-100:#241c3f;
  --accent:#f472b6;
  --accent-100:#3a1e30;
  --success:#34d399;
  --success-100:#10271f;
  --warning:#fbbf24;
  --warning-100:#332108;
  --danger:#f87171;
  --danger-100:#341515;

  --shadow-sm: 0 1px 2px rgba(0,0,0,.3);
  --shadow-md: 0 2px 10px rgba(0,0,0,.35);
  --shadow-lg: 0 16px 40px rgba(0,0,0,.5);
  --shadow-card: 0 1px 1px rgba(0,0,0,.2), 0 20px 40px -16px rgba(91,141,239,.25);
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  -webkit-font-smoothing:antialiased;
  transition:background .25s ease, color .25s ease;
  padding-bottom:96px;
}
h1,h2,h3,p{margin:0;}
button{font-family:inherit;}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);}

::selection{background:var(--primary-100);}

/* Focus visibility for accessibility */
a:focus-visible, button:focus-visible, input:focus-visible, [tabindex]:focus-visible{
  outline:2px solid var(--primary);
  outline-offset:2px;
  border-radius:6px;
}

/* ============================================================
   APP BAR
   ============================================================ */
.appbar{
  position:sticky; top:0; z-index:40;
  height:var(--bar-h);
  display:flex; align-items:center; gap:16px;
  padding:0 20px;
  background:color-mix(in srgb, var(--bg) 82%, transparent);
  backdrop-filter:blur(14px) saturate(160%);
  -webkit-backdrop-filter:blur(14px) saturate(160%);
  border-bottom:1px solid var(--border);
}
.brand{display:flex; align-items:center; gap:10px; flex-shrink:0;}
.brand-mark{
  width:34px; height:34px; border-radius:10px;
  background:linear-gradient(135deg, var(--primary), var(--secondary));
  display:flex; align-items:center; justify-content:center;
  font-size:17px; color:#fff;
  box-shadow:var(--shadow-sm);
}
.brand-name{font-weight:800; font-size:16.5px; letter-spacing:-.01em;}
.brand-name span{color:var(--primary);}

.search-wrap{
  flex:1; max-width:380px; position:relative;
  display:flex; align-items:center;
}
.search-wrap svg{position:absolute; left:12px; width:16px; height:16px; color:var(--text-faint); pointer-events:none;}
.search-input{
  width:100%;
  padding:9px 12px 9px 34px;
  border-radius:var(--r-full);
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--text);
  font-size:14px;
  outline:none;
  transition:border-color .15s, box-shadow .15s;
}
.search-input:focus{border-color:var(--primary); box-shadow:0 0 0 3px var(--primary-100);}
.search-input::placeholder{color:var(--text-faint);}

.appbar-actions{display:flex; align-items:center; gap:8px; margin-left:auto; flex-shrink:0;}
.icon-btn{
  width:38px; height:38px; border-radius:var(--r-full);
  border:1px solid var(--border); background:var(--card-bg);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; color:var(--text); font-size:16px;
  transition:transform .12s ease, background .15s, box-shadow .15s;
}
.icon-btn:hover{box-shadow:var(--shadow-sm); transform:translateY(-1px);}
.icon-btn:active{transform:translateY(0) scale(.94);}
.icon-btn svg{width:18px; height:18px;}

.exam-btn{
  display:flex; align-items:center; gap:6px;
  padding:0 16px; height:38px; border-radius:var(--r-full);
  border:none; cursor:pointer; font-weight:700; font-size:13.5px;
  background:linear-gradient(135deg, var(--secondary), var(--accent));
  color:#fff; box-shadow:var(--shadow-sm);
  transition:transform .12s ease, box-shadow .15s;
  white-space:nowrap;
}
.exam-btn:hover{transform:translateY(-1px); box-shadow:var(--shadow-md);}
.exam-btn:active{transform:translateY(0) scale(.97);}

/* ============================================================
   MAIN LAYOUT
   ============================================================ */
main{max-width:var(--maxw); margin:0 auto; padding:18px 18px 0;}

/* Filter / topic chips */
.filters{display:flex; flex-direction:column; gap:10px; margin-bottom:16px;}
.chip-row{display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none;}
.chip-row::-webkit-scrollbar{display:none;}
.chip{
  flex-shrink:0;
  padding:7px 14px; border-radius:var(--r-full);
  border:1px solid var(--border); background:var(--card-bg);
  color:var(--text-muted); font-size:13px; font-weight:600;
  cursor:pointer; white-space:nowrap;
  transition:all .15s ease;
}
.chip:hover{border-color:var(--primary); color:var(--text);}
.chip.active{
  background:var(--primary); border-color:var(--primary); color:#fff;
  box-shadow:var(--shadow-sm);
}
.subfilters{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
.select-pill{
  padding:6px 10px; border-radius:var(--r-full);
  border:1px solid var(--border); background:var(--surface);
  color:var(--text); font-size:12.5px; font-weight:600;
  cursor:pointer; outline:none;
}
.toggle-pill{
  padding:6px 12px; border-radius:var(--r-full);
  border:1px solid var(--border); background:var(--surface);
  color:var(--text-muted); font-size:12.5px; font-weight:600;
  cursor:pointer; display:flex; align-items:center; gap:5px;
  transition:all .15s;
}
.toggle-pill.on{background:var(--accent-100); border-color:var(--accent); color:var(--accent);}

/* Stats */
.stats-grid{
  display:grid; grid-template-columns:repeat(4,1fr); gap:10px;
  margin-bottom:14px;
}
.stat-card{
  background:var(--card-bg); border:1px solid var(--border); border-radius:var(--r-md);
  padding:11px 12px; box-shadow:var(--shadow-sm);
}
.stat-num{font-size:19px; font-weight:800; letter-spacing:-.02em; line-height:1.1;}
.stat-label{font-size:11px; color:var(--text-muted); font-weight:600; margin-top:2px; text-transform:uppercase; letter-spacing:.03em;}
.stat-card.streak .stat-num{color:var(--warning);}
.stat-card.accuracy .stat-num{color:var(--success);}

/* Progress bar */
.progress-track{
  height:6px; border-radius:var(--r-full); background:var(--border);
  overflow:hidden; margin-bottom:22px; position:relative;
}
.progress-fill{
  height:100%; border-radius:var(--r-full);
  background:linear-gradient(90deg, var(--primary), var(--secondary));
  width:0%; transition:width .4s cubic-bezier(.4,0,.2,1);
}

/* ============================================================
   FLASHCARD
   ============================================================ */
.stage{position:relative; display:flex; align-items:center; justify-content:center; gap:10px;}
.nav-arrow{
  flex-shrink:0; width:42px; height:42px; border-radius:var(--r-full);
  border:1px solid var(--border); background:var(--card-bg);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; color:var(--text); box-shadow:var(--shadow-sm);
  transition:transform .12s, box-shadow .15s;
}
.nav-arrow:hover{box-shadow:var(--shadow-md); transform:translateY(-1px);}
.nav-arrow:disabled{opacity:.3; cursor:default; transform:none; box-shadow:none;}
@media (max-width:640px){ .nav-arrow{display:none;} }

.card-zone{flex:1; max-width:560px; min-height:430px; perspective:1800px;}

.flashcard{
  position:relative; width:100%; height:100%; min-height:430px;
  cursor:pointer; transform-style:preserve-3d;
  transition:transform .55s cubic-bezier(.22,1,.36,1);
}
.flashcard.flipped{transform:rotateY(180deg);}
.flashcard.shake{animation:shake .38s ease;}
@keyframes shake{
  10%,90%{transform:translateX(-3px);}
  20%,80%{transform:translateX(5px);}
  30%,50%,70%{transform:translateX(-7px);}
  40%,60%{transform:translateX(7px);}
}

.face{
  position:absolute; inset:0; backface-visibility:hidden;
  border-radius:var(--r-lg); border:1px solid var(--border);
  background:var(--card-bg); box-shadow:var(--shadow-card);
  padding:26px 26px 22px; display:flex; flex-direction:column;
  overflow:hidden;
}
.face.back{transform:rotateY(180deg); overflow-y:auto;}
.face::before{
  content:""; position:absolute; top:0; left:0; right:0; height:5px;
  background:linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
}

.face-top{display:flex; align-items:flex-start; justify-content:space-between; gap:10px;}
.badge-group{display:flex; gap:6px; flex-wrap:wrap;}
.badge{
  font-size:11px; font-weight:700; padding:4px 9px; border-radius:var(--r-full);
  letter-spacing:.01em;
}
.badge.cat{background:var(--primary-100); color:var(--primary);}
.badge.diff-easy{background:var(--success-100); color:var(--success);}
.badge.diff-medium{background:var(--warning-100); color:var(--warning);}
.badge.diff-hard{background:var(--danger-100); color:var(--danger);}
.badge.type{background:var(--secondary-100); color:var(--secondary);}
.stars{font-size:12px; color:var(--warning); letter-spacing:1px;}

.bookmark-btn{
  background:none; border:none; cursor:pointer; font-size:19px;
  color:var(--text-faint); line-height:1; padding:2px;
  transition:transform .15s, color .15s;
}
.bookmark-btn.active{color:var(--accent); transform:scale(1.15);}

.face-icon{font-size:26px; margin:14px 0 6px;}
.face-question{
  font-size:21px; font-weight:700; line-height:1.32; letter-spacing:-.01em;
  flex:1; display:flex; align-items:center;
}
.face-meta{display:flex; align-items:center; justify-content:space-between; margin-top:10px;}
.pos-indicator{font-size:12px; color:var(--text-faint); font-weight:600;}

.think-btn{
  margin-top:14px; align-self:flex-start;
  padding:10px 18px; border-radius:var(--r-full); border:none;
  background:var(--text); color:var(--bg); font-weight:700; font-size:13.5px;
  cursor:pointer; display:flex; align-items:center; gap:7px;
  box-shadow:var(--shadow-sm);
  transition:transform .12s, box-shadow .15s;
}
.think-btn:hover{transform:translateY(-1px); box-shadow:var(--shadow-md);}
.think-btn:active{transform:scale(.97);}

/* Back of card */
.back-answer{
  font-size:17px; font-weight:700; color:var(--primary); line-height:1.4;
  padding-bottom:10px; border-bottom:1px solid var(--border); margin-bottom:10px;
}
.back-block{margin-bottom:10px;}
.back-block-label{
  font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.04em;
  color:var(--text-faint); margin-bottom:3px; display:flex; align-items:center; gap:5px;
}
.back-block-text{font-size:13.5px; line-height:1.5; color:var(--text);}
.back-block.tip .back-block-label{color:var(--warning);}
.back-block.mistake .back-block-label{color:var(--danger);}
.back-block.mnemonic .back-block-label{color:var(--secondary);}
.back-block.clinical .back-block-label{color:var(--success);}

.judge-row{display:flex; gap:8px; margin-top:auto; padding-top:12px;}
.judge-btn{
  flex:1; padding:11px 0; border-radius:var(--r-md); border:none; cursor:pointer;
  font-weight:700; font-size:13.5px; display:flex; align-items:center; justify-content:center; gap:6px;
  transition:transform .12s, box-shadow .15s;
}
.judge-btn:active{transform:scale(.96);}
.judge-btn.unknown{background:var(--danger-100); color:var(--danger);}
.judge-btn.known{background:var(--success-100); color:var(--success);}
.judge-btn:hover{box-shadow:var(--shadow-sm);}

/* Interactive card types */
.options-list{display:flex; flex-direction:column; gap:8px; margin-top:14px;}
.option-btn{
  text-align:left; padding:12px 14px; border-radius:var(--r-md);
  border:1.5px solid var(--border); background:var(--surface); color:var(--text);
  font-size:14px; cursor:pointer; transition:all .15s;
}
.option-btn:hover{border-color:var(--primary);}
.option-btn.correct{background:var(--success-100); border-color:var(--success); color:var(--success); font-weight:700;}
.option-btn.incorrect{background:var(--danger-100); border-color:var(--danger); color:var(--danger); font-weight:700;}
.option-btn:disabled{cursor:default;}

.tf-row{display:flex; gap:10px; margin-top:16px;}
.tf-btn{
  flex:1; padding:16px; border-radius:var(--r-md); border:1.5px solid var(--border);
  background:var(--surface); font-weight:800; font-size:15px; cursor:pointer;
  color:var(--text); transition:all .15s;
}
.tf-btn.correct{background:var(--success-100); border-color:var(--success); color:var(--success);}
.tf-btn.incorrect{background:var(--danger-100); border-color:var(--danger); color:var(--danger);}

.fill-row{display:flex; gap:8px; margin-top:16px;}
.fill-input{
  flex:1; padding:11px 14px; border-radius:var(--r-md); border:1.5px solid var(--border);
  background:var(--surface); color:var(--text); font-size:14px; outline:none;
}
.fill-input:focus{border-color:var(--primary);}
.fill-check{
  padding:0 18px; border-radius:var(--r-md); border:none; background:var(--primary);
  color:#fff; font-weight:700; cursor:pointer; font-size:13.5px;
}
.fill-feedback{margin-top:10px; font-size:13.5px; font-weight:700;}
.fill-feedback.ok{color:var(--success);}
.fill-feedback.bad{color:var(--danger);}

.hotspot-hint{
  margin-top:14px; font-size:12.5px; color:var(--text-faint); font-weight:600;
  display:flex; align-items:center; gap:6px;
}

/* Bottom action bar */
.action-bar{
  position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
  display:flex; align-items:center; gap:6px;
  background:var(--card-bg); border:1px solid var(--border); border-radius:var(--r-full);
  padding:8px; box-shadow:var(--shadow-lg); z-index:30;
}
.action-bar button{
  width:46px; height:46px; border-radius:var(--r-full); border:none; background:transparent;
  display:flex; align-items:center; justify-content:center; font-size:18px; cursor:pointer;
  color:var(--text-muted); transition:background .15s, transform .12s, color .15s;
  position:relative;
}
.action-bar button:hover{background:var(--surface); color:var(--text);}
.action-bar button:active{transform:scale(.92);}
.action-bar button.primary{background:var(--primary); color:#fff;}
.action-bar button.primary:hover{background:var(--primary-700);}
.ripple{
  position:absolute; border-radius:50%; background:rgba(37,99,235,.35);
  transform:scale(0); animation:ripple .5s ease-out; pointer-events:none;
}
@keyframes ripple{to{transform:scale(2.6); opacity:0;}}

.kbd-hint{
  text-align:center; font-size:11.5px; color:var(--text-faint); margin:20px 0 4px;
}
.kbd-hint kbd{
  background:var(--surface); border:1px solid var(--border); border-radius:5px;
  padding:1px 5px; font-size:10.5px; font-family:inherit; margin:0 1px;
}

.empty-state{
  text-align:center; padding:60px 20px; color:var(--text-muted);
}
.empty-state .e-icon{font-size:38px; margin-bottom:10px;}

/* ============================================================
   EXAM MODE OVERLAY
   ============================================================ */
.exam-overlay{
  position:fixed; inset:0; background:var(--bg); z-index:100;
  display:none; flex-direction:column;
}
.exam-overlay.active{display:flex;}
.exam-head{
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 22px; border-bottom:1px solid var(--border);
}
.exam-timer{font-size:18px; font-weight:800; font-variant-numeric:tabular-nums;}
.exam-timer.low{color:var(--danger);}
.exam-close{
  border:none; background:var(--surface); width:36px; height:36px; border-radius:var(--r-full);
  cursor:pointer; font-size:16px; color:var(--text);
}
.exam-progress-text{font-size:13px; color:var(--text-muted); font-weight:600;}
.exam-body{flex:1; display:flex; align-items:center; justify-content:center; padding:20px;}
.exam-result{max-width:480px; text-align:center; margin:0 auto;}
.exam-score{font-size:54px; font-weight:800; background:linear-gradient(135deg,var(--primary),var(--secondary)); -webkit-background-clip:text; background-clip:text; color:transparent; letter-spacing:-.03em;}
.exam-score-label{color:var(--text-muted); font-weight:600; margin-top:-6px; margin-bottom:24px;}
.exam-summary-row{display:flex; justify-content:space-around; margin-bottom:24px;}
.exam-summary-row div{display:flex; flex-direction:column; align-items:center; gap:2px;}
.exam-summary-row b{font-size:20px;}
.exam-action-row{display:flex; gap:10px; justify-content:center;}
.btn-solid{
  padding:12px 22px; border-radius:var(--r-full); border:none; background:var(--primary);
  color:#fff; font-weight:700; cursor:pointer; font-size:13.5px;
}
.btn-ghost{
  padding:12px 22px; border-radius:var(--r-full); border:1px solid var(--border); background:transparent;
  color:var(--text); font-weight:700; cursor:pointer; font-size:13.5px;
}
.review-list{text-align:left; max-height:160px; overflow-y:auto; margin:14px 0; padding:0 4px;}
.review-item{
  font-size:13px; padding:8px 10px; border-radius:var(--r-sm); background:var(--danger-100);
  color:var(--text); margin-bottom:6px;
}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001s !important; transition-duration:.001s !important;}
}

@media (max-width:640px){
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .search-wrap{display:none;}
  .face{padding:20px 18px 18px;}
  .face-question{font-size:18.5px;}
}
</style>
</head>
<body>

<header class="appbar">
  <div class="brand">
    <div class="brand-mark">🩺</div>
    <div class="brand-name">Pflegefach<span>Profi</span></div>
  </div>
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="searchInput" class="search-input" type="text" placeholder="Karten durchsuchen…" aria-label="Karten durchsuchen">
  </div>
  <div class="appbar-actions">
    <button class="icon-btn" id="darkToggle" aria-label="Dunkelmodus umschalten" title="Dunkelmodus">🌙</button>
    <button class="exam-btn" id="examOpenBtn">⏱ Prüfungsmodus</button>
  </div>
</header>

<main>
  <div class="filters">
    <div class="chip-row" id="categoryChips" role="tablist" aria-label="Kategorie filtern"></div>
    <div class="subfilters">
      <select id="difficultySelect" class="select-pill" aria-label="Schwierigkeit filtern">
        <option value="all">Alle Schwierigkeiten</option>
        <option value="easy">🟢 Leicht</option>
        <option value="medium">🟠 Mittel</option>
        <option value="hard">🔴 Schwer</option>
      </select>
      <button class="toggle-pill" id="bookmarkFilter" data-on="false">⭐ Lesezeichen</button>
      <button class="toggle-pill" id="incorrectFilter" data-on="false">⚠️ Falsch beantwortet</button>
      <button class="toggle-pill" id="hideMasteredFilter" data-on="false">🙈 Gemeisterte ausblenden</button>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-num" id="statToday">0</div>
      <div class="stat-label">Heute gelernt</div>
    </div>
    <div class="stat-card accuracy">
      <div class="stat-num" id="statAccuracy">–</div>
      <div class="stat-label">Genauigkeit</div>
    </div>
    <div class="stat-card streak">
      <div class="stat-num" id="statStreak">0</div>
      <div class="stat-label">Streak</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statRemaining">0</div>
      <div class="stat-label">Verbleibend</div>
    </div>
  </div>

  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>

  difficulty: "all",
  bookmarkOnly: false,
  incorrectOnly: false,
  hideMastered: false,
  searchTerm: "",
  studiedTodaySet: new Set(),
  totalCorrect: 0,
  totalAnswered: 0,
  streak: 0,
  longestStreak: 0,
  progress: {} // id -> {box, correct, incorrect, bookmarked, lastResult}
};

CARDS.forEach(c => { state.progress[c.id] = {box:1, correct:0, incorrect:0, bookmarked:false, lastResult:null}; });

const examState = { active:false, queue:[], index:0, score:0, answers:[], timer:null, secondsLeft:0, perCardSeconds:60 };

/* ============================================================
   DOM REFS
   ============================================================ */
const $ = (sel) => document.querySelector(sel);
const cardZone = $("#cardZone");
const categoryChips = $("#categoryChips");
const progressFill = $("#progressFill");
const statToday = $("#statToday");
const statAccuracy = $("#statAccuracy");
const statStreak = $("#statStreak");
const statRemaining = $("#statRemaining");

/* ============================================================
   INIT CATEGORY CHIPS
   ============================================================ */
function buildChips(){
  const cats = ["all", ...new Set(CARDS.map(c => c.category))];
  categoryChips.innerHTML = cats.map(cat => {
    const label = cat === "all" ? "Alle Themen" : cat;
    return `<button class="chip${cat===state.category?' active':''}" data-cat="${cat}" role="tab" aria-selected="${cat===state.category}">${label}</button>`;
  }).join("");
}
categoryChips.addEventListener("click", (e) => {
  const btn = e.target.closest(".chip");
  if(!btn) return;
  state.category = btn.dataset.cat;
  buildChips();
  applyFilters(true);
});

/* ============================================================
   FILTERS
   ============================================================ */
function applyFilters(resetIndex){
  let list = CARDS.filter(c => {
    if(state.category !== "all" && c.category !== state.category) return false;
    if(state.difficulty !== "all" && c.difficulty !== state.difficulty) return false;
    if(state.bookmarkOnly && !state.progress[c.id].bookmarked) return false;
    if(state.incorrectOnly && state.progress[c.id].lastResult !== "incorrect") return false;
    if(state.hideMastered && state.progress[c.id].box >= 4) return false;
    if(state.searchTerm){
      const t = state.searchTerm.toLowerCase();
      const hay = (c.question + " " + c.topic + " " + (c.tags||[]).join(" ")).toLowerCase();
      if(!hay.includes(t)) return false;
    }
    return true;
  });
  // Leitner-ish ordering: lower box = sooner
  list = list.sort((a,b) => state.progress[a.id].box - state.progress[b.id].box);
  state.filtered = list;
  if(resetIndex) state.index = 0;
  if(state.index >= state.filtered.length) state.index = Math.max(0, state.filtered.length - 1);
  renderCard();
  updateStatsUI();
}

$("#difficultySelect").addEventListener("change", (e) => { state.difficulty = e.target.value; applyFilters(true); });

function bindToggle(id, key){
  const el = $(id);
  el.addEventListener("click", () => {
    state[key] = !state[key];
    el.classList.toggle("on", state[key]);
    el.dataset.on = String(state[key]);
    applyFilters(true);
  });
}
bindToggle("#bookmarkFilter", "bookmarkOnly");
bindToggle("#incorrectFilter", "incorrectOnly");
bindToggle("#hideMasteredFilter", "hideMastered");

let searchDebounce;
$("#searchInput").addEventListener("input", (e) => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => {
    state.searchTerm = e.target.value.trim();
    applyFilters(true);
  }, 180);
});

/* ============================================================
   CARD RENDERING
   ============================================================ */
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]));
}
function highlight(text){
  if(!state.searchTerm) return escapeHtml(text);
  const t = state.searchTerm;
  const re = new RegExp("(" + t.replace(/[.*+?^${}()|[\]\\]/g,"\\$&") + ")", "ig");
  return escapeHtml(text).replace(re, "<mark>$1</mark>");
}
const diffLabel = {easy:"🟢 Leicht", medium:"🟠 Mittel", hard:"🔴 Schwer"};
const typeIcon = {definition:"📘", difference:"⚖️", sequence:"🔢", clinical:"🏥", medication:"💊", lab:"🧪", symptoms:"🩺", complications:"⚠️", mc:"☑️", tf:"✅", fillblank:"✏️", hotspot:"👆"};
const typeLabel = {definition:"Definition", difference:"Unterschied", sequence:"Reihenfolge", clinical:"Klinischer Fall", medication:"Medikament", lab:"Laborwert", symptoms:"Symptome", complications:"Komplikationen", mc:"Multiple Choice", tf:"Wahr/Falsch", fillblank:"Lückentext", hotspot:"Aufdecken"};
const INTERACTIVE = new Set(["mc","tf","fillblank","hotspot"]);

function renderCard(){
  if(state.filtered.length === 0){
    cardZone.innerHTML = `<div class="empty-state"><div class="e-icon">🗂️</div><p>Keine Karten für diese Filter gefunden.</p></div>`;
    progressFill.style.width = "0%";
    return;
  }
  const card = state.filtered[state.index];
  const prog = state.progress[card.id];
  state.flipped = false;
  state.thought = false;
  state.interactionLocked = false;

  const stars = "★".repeat(card.priority) + "☆".repeat(3 - card.priority);
  const interactive = INTERACTIVE.has(card.type);

  let frontInner = `
    <div class="face-top">
      <div class="badge-group">
        <span class="badge cat">${escapeHtml(card.category)}</span>
        <span class="badge diff-${card.difficulty}">${diffLabel[card.difficulty]}</span>
        <span class="badge type">${typeIcon[card.type]} ${typeLabel[card.type]}</span>
      </div>
      <button class="bookmark-btn${prog.bookmarked?' active':''}" id="bmToggle" aria-label="Lesezeichen umschalten">${prog.bookmarked?'★':'☆'}</button>
    </div>
    <div class="face-icon" aria-hidden="true">${typeIcon[card.type]}</div>
    <div class="face-question">${highlight(card.question)}</div>
  `;

  if(card.type === "mc"){
    frontInner += `<div class="options-list" id="mcOptions">` +
      card.options.map((opt,i) => `<button class="option-btn" data-i="${i}">${escapeHtml(opt)}</button>`).join("") +
      `</div>`;
  } else if(card.type === "tf"){
    frontInner += `<div class="tf-row">
      <button class="tf-btn" data-val="true">Wahr</button>
      <button class="tf-btn" data-val="false">Falsch</button>
    </div>`;
  } else if(card.type === "fillblank"){
    frontInner += `<div class="fill-row">
      <input type="text" class="fill-input" id="fillInput" placeholder="Antwort eingeben…" aria-label="Antwort eingeben" autocomplete="off">
      <button class="fill-check" id="fillCheck">Prüfen</button>
    </div>
    <div class="fill-feedback" id="fillFeedback"></div>`;
  } else if(card.type === "hotspot"){
    frontInner += `<div class="hotspot-hint">👆 Tippen, um die Antwort aufzudecken</div>`;
  } else {
    frontInner += `
      <div class="face-meta">
        <span class="pos-indicator">Karte ${state.index+1} / ${state.filtered.length} · ${stars}</span>
      </div>
      <button class="think-btn" id="thinkBtn">🤔 Ich habe nachgedacht</button>
    `;
  }

  let backInner = `<div class="back-answer">${escapeHtml(card.answer || card.explain || "")}</div>`;
  if(card.explain && card.answer){
    backInner += `<div class="back-block"><div class="back-block-label">💡 Erklärung</div><div class="back-block-text">${escapeHtml(card.explain)}</div></div>`;
  }
  if(card.mnemonic){
    backInner += `<div class="back-block mnemonic"><div class="back-block-label">🧠 Mnemonic</div><div class="back-block-text">${escapeHtml(card.mnemonic)}</div></div>`;
  }
  if(card.examTip){
    backInner += `<div class="back-block tip"><div class="back-block-label">⭐ Exam-Tipp</div><div class="back-block-text">${escapeHtml(card.examTip)}</div></div>`;
  }
  if(card.mistake){
    backInner += `<div class="back-block mistake"><div class="back-block-label">⚠️ Häufiger Fehler</div><div class="back-block-text">${escapeHtml(card.mistake)}</div></div>`;
  }
  if(card.clinical){
    backInner += `<div class="back-block clinical"><div class="back-block-label">🏥 Klinisches Beispiel</div><div class="back-block-text">${escapeHtml(card.clinical)}</div></div>`;
  }
  backInner += `
    <div class="judge-row">
      <button class="judge-btn unknown" id="judgeUnknown">✗ Nicht gewusst</button>
      <button class="judge-btn known" id="judgeKnown">✓ Gewusst</button>
    </div>
  `;

  cardZone.innerHTML = `
    <div class="flashcard" id="flashcard" tabindex="0" role="group" aria-label="Karteikarte">
      <div class="face front">${frontInner}</div>
      <div class="face back">${backInner}</div>
    </div>
  `;

  attachCardEvents(card, prog, interactive);
  updateProgressBar();
  updateNavButtons();
}

function attachCardEvents(card, prog, interactive){
  const flashcard = $("#flashcard");

  $("#bmToggle")?.addEventListener("click", (e) => {
    e.stopPropagation();
    prog.bookmarked = !prog.bookmarked;
    e.target.classList.toggle("active", prog.bookmarked);
    e.target.textContent = prog.bookmarked ? "★" : "☆";
  });

  if(card.type === "definition" || card.type === "difference" || card.type === "sequence" ||
     card.type === "clinical" || card.type === "medication" || card.type === "lab" ||
     card.type === "symptoms" || card.type === "complications"){
    $("#thinkBtn")?.addEventListener("click", (e) => {
      e.stopPropagation();
      state.thought = true;
      flipCard();
    });
    flashcard.addEventListener("click", () => {
      if(!state.thought && !state.flipped){
        flashcard.classList.remove("shake");
        requestAnimationFrame(() => flashcard.classList.add("shake"));
      } else if(state.flipped){
        // allow flipping back to front to re-read question
        flipCard(true);
      }
    });
  }

  if(card.type === "hotspot"){
    flashcard.addEventListener("click", () => { if(!state.flipped) flipCard(); else flipCard(true); });
  }

  if(card.type === "mc"){
    const opts = cardZone.querySelectorAll(".option-btn");
    opts.forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        if(state.interactionLocked) return;
        state.interactionLocked = true;
        const i = Number(btn.dataset.i);
        opts.forEach(o => o.disabled = true);
        if(i === card.correctIndex){
          btn.classList.add("correct");
          setTimeout(() => { flipCard(); judge(true, card, prog, true); }, 500);
        } else {
          btn.classList.add("incorrect");
          opts[card.correctIndex].classList.add("correct");
          setTimeout(() => { flipCard(); judge(false, card, prog, true); }, 700);
        }
      });
    });
  }

  if(card.type === "tf"){
    const btns = cardZone.querySelectorAll(".tf-btn");
    btns.forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        if(state.interactionLocked) return;
        state.interactionLocked = true;
        const val = btn.dataset.val === "true";
        const correct = val === card.correctAnswer;
        btns.forEach(b => b.disabled = true);
        btn.classList.add(correct ? "correct" : "incorrect");
        if(!correct){
          btns.forEach(b => { if((b.dataset.val === "true") === card.correctAnswer) b.classList.add("correct"); });
        }
        setTimeout(() => { flipCard(); judge(correct, card, prog, true); }, 550);
      });
    });
  }

  if(card.type === "fillblank"){
    const input = $("#fillInput");
    const feedback = $("#fillFeedback");
    const check = () => {
      if(state.interactionLocked) return;
      const val = input.value.trim().toLowerCase();
      const correct = val.length > 0 && val === card.correctAnswer.toLowerCase();
      state.interactionLocked = true;
      input.disabled = true;
      feedback.textContent = correct ? "✓ Richtig: " + card.correctAnswer : "✗ Richtige Antwort: " + card.correctAnswer;
      feedback.className = "fill-feedback " + (correct ? "ok" : "bad");
      setTimeout(() => { flipCard(); judge(correct, card, prog, true); }, 700);
    };
    $("#fillCheck").addEventListener("click", (e) => { e.stopPropagation(); check(); });
    input.addEventListener("keydown", (e) => { if(e.key === "Enter"){ e.stopPropagation(); check(); } });
    input.addEventListener("click", (e) => e.stopPropagation());
  }

  $("#judgeKnown")?.addEventListener("click", (e) => { e.stopPropagation(); judge(true, card, prog, false); });
  $("#judgeUnknown")?.addEventListener("click", (e) => { e.stopPropagation(); judge(false, card, prog, false); });
}

function flipCard(toFront){
  const flashcard = $("#flashcard");
  if(!flashcard) return;
  if(toFront){ state.flipped = false; flashcard.classList.remove("flipped"); return; }
  state.flipped = true;
  flashcard.classList.add("flipped");
}

function judge(correct, card, prog, autoFromInteractive){
  state.studiedTodaySet.add(card.id);
  state.totalAnswered++;
  if(correct){
    state.totalCorrect++;
    prog.correct++;
    prog.box = Math.min(5, prog.box + 1);
    prog.lastResult = "correct";
    state.streak++;
    state.longestStreak = Math.max(state.longestStreak, state.streak);
  } else {
    prog.incorrect++;
    prog.box = 1;
    prog.lastResult = "incorrect";
    state.streak = 0;
  }
  updateStatsUI();
  setTimeout(() => goNext(), autoFromInteractive ? 250 : 0);
}

/* ============================================================
   NAVIGATION
   ============================================================ */
function goNext(){
  if(state.filtered.length === 0) return;
  state.index = (state.index + 1) % state.filtered.length;
  renderCard();
}
function goPrev(){
  if(state.filtered.length === 0) return;
  state.index = (state.index - 1 + state.filtered.length) % state.filtered.length;
  renderCard();
}
function updateNavButtons(){
  $("#prevBtn").disabled = state.filtered.length <= 1;
  $("#nextBtn").disabled = state.filtered.length <= 1;
}
function updateProgressBar(){
  const pct = state.filtered.length ? ((state.index + 1) / state.filtered.length) * 100 : 0;
  progressFill.style.width = pct + "%";
}
$("#prevBtn").addEventListener("click", goPrev);
$("#nextBtn").addEventListener("click", goNext);

/* ============================================================
   ACTION BAR
   ============================================================ */
function ripple(el){
  const r = document.createElement("span");
  r.className = "ripple";
  const size = 60;
  r.style.width = r.style.height = size + "px";
  r.style.left = (el.clientWidth/2 - size/2) + "px";
  r.style.top = (el.clientHeight/2 - size/2) + "px";
  el.appendChild(r);
  setTimeout(() => r.remove(), 500);
}
$("#shuffleBtn").addEventListener("click", (e) => {
  ripple(e.currentTarget);
  for(let i = state.filtered.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i+1));
    [state.filtered[i], state.filtered[j]] = [state.filtered[j], state.filtered[i]];
  }
  state.index = 0;
  renderCard();
});
$("#bookmarkBtn").addEventListener("click", (e) => {
  ripple(e.currentTarget);
  $("#bmToggle")?.click();
});
$("#repeatBtn").addEventListener("click", (e) => {
  ripple(e.currentTarget);
  renderCard();
});
$("#flipBtn").addEventListener("click", (e) => {
  ripple(e.currentTarget);
  const card = state.filtered[state.index];
  if(!card) return;
  if(INTERACTIVE.has(card.type)) return;
  if(!state.thought){ state.thought = true; }
  flipCard(state.flipped);
});

/* ============================================================
   KEYBOARD SHORTCUTS
   ============================================================ */
document.addEventListener("keydown", (e) => {
  if(document.activeElement && document.activeElement.tagName === "INPUT") return;
  if(examState.active) return;
  switch(e.key){
    case "ArrowRight": goNext(); break;
    case "ArrowLeft": goPrev(); break;
    case " ": e.preventDefault(); $("#flipBtn").click(); break;
    case "k": case "K": $("#judgeKnown")?.click(); break;
    case "u": case "U": $("#judgeUnknown")?.click(); break;
    case "b": case "B": $("#bmToggle")?.click(); break;
  }
});

/* ============================================================
   SWIPE SUPPORT
   ============================================================ */
let touchStartX = 0;
cardZone.addEventListener("touchstart", (e) => { touchStartX = e.changedTouches[0].clientX; }, {passive:true});
cardZone.addEventListener("touchend", (e) => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if(Math.abs(dx) > 60){
    if(dx < 0) goNext(); else goPrev();
  }
}, {passive:true});

/* ============================================================
   STATS UI
   ============================================================ */
function updateStatsUI(){
  statToday.textContent = state.studiedTodaySet.size;
  statAccuracy.textContent = state.totalAnswered ? Math.round((state.totalCorrect/state.totalAnswered)*100) + "%" : "–";
  statStreak.textContent = state.streak;
  statRemaining.textContent = state.filtered.length;
}

/* ============================================================
   DARK MODE
   ============================================================ */
const root = document.documentElement;
function setTheme(dark){
  root.setAttribute("data-theme", dark ? "dark" : "light");
  $("#darkToggle").textContent = dark ? "☀️" : "🌙";
}
let isDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
setTheme(isDark);
$("#darkToggle").addEventListener("click", () => { isDark = !isDark; setTheme(isDark); });

/* ============================================================
   EXAM MODE
   ============================================================ */
const examOverlay = $("#examOverlay");
const examBody = $("#examBody");
const examTimerEl = $("#examTimer");

$("#examOpenBtn").addEventListener("click", startExam);
$("#examCloseBtn").addEventListener("click", closeExam);

function startExam(){
  const pool = state.filtered.length >= 5 ? [...state.filtered] : [...CARDS];
  for(let i = pool.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i+1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  examState.active = true;
  examState.queue = pool.slice(0, Math.min(20, pool.length));
  examState.index = 0;
  examState.score = 0;
  examState.answers = [];
  examOverlay.classList.add("active");
  renderExamCard();
}
function closeExam(){
  examState.active = false;
  clearInterval(examState.timer);
  examOverlay.classList.remove("active");
}
function startExamTimer(){
  examState.secondsLeft = examState.perCardSeconds;
  clearInterval(examState.timer);
  updateExamTimerUI();
  examState.timer = setInterval(() => {
    examState.secondsLeft--;
    updateExamTimerUI();
    if(examState.secondsLeft <= 0){
      clearInterval(examState.timer);
      recordExamAnswer(null, false);
    }
  }, 1000);
}
function updateExamTimerUI(){
  const m = String(Math.floor(Math.max(0,examState.secondsLeft)/60)).padStart(2,"0");
  const s = String(Math.max(0,examState.secondsLeft)%60).padStart(2,"0");
  examTimerEl.textContent = m + ":" + s;
  examTimerEl.classList.toggle("low", examState.secondsLeft <= 10);
}
function renderExamCard(){
  if(examState.index >= examState.queue.length){ renderExamResults(); return; }
  const card = examState.queue[examState.index];
  $("#examProgressText").textContent = `Frage ${examState.index+1} / ${examState.queue.length}`;
  startExamTimer();

  let body = `<div style="max-width:560px;width:100%;">
    <div class="badge type" style="margin-bottom:14px;display:inline-block;">${typeIcon[card.type]} ${typeLabel[card.type]}</div>
    <h2 style="font-size:22px;font-weight:800;line-height:1.35;margin-bottom:18px;">${escapeHtml(card.question)}</h2>
    <div id="examAnswerZone"></div>
  </div>`;
  examBody.innerHTML = body;
  const zone = $("#examAnswerZone");

  if(card.type === "mc"){
    zone.innerHTML = `<div class="options-list">` + card.options.map((o,i) => `<button class="option-btn" data-i="${i}">${escapeHtml(o)}</button>`).join("") + `</div>`;
    zone.querySelectorAll(".option-btn").forEach(btn => btn.addEventListener("click", () => {
      const correct = Number(btn.dataset.i) === card.correctIndex;
      recordExamAnswer(card, correct);
    }));
  } else if(card.type === "tf"){
    zone.innerHTML = `<div class="tf-row"><button class="tf-btn" data-v="true">Wahr</button><button class="tf-btn" data-v="false">Falsch</button></div>`;
    zone.querySelectorAll(".tf-btn").forEach(btn => btn.addEventListener("click", () => {
      const correct = (btn.dataset.v === "true") === card.correctAnswer;
      recordExamAnswer(card, correct);
    }));
  } else if(card.type === "fillblank"){
    zone.innerHTML = `<div class="fill-row"><input class="fill-input" id="examFillInput" placeholder="Antwort…"><button class="fill-check" id="examFillCheck">Bestätigen</button></div>`;
    const submit = () => {
      const val = $("#examFillInput").value.trim().toLowerCase();
      recordExamAnswer(card, val === card.correctAnswer.toLowerCase());
    };
    $("#examFillCheck").addEventListener("click", submit);
    $("#examFillInput").addEventListener("keydown", (e) => { if(e.key === "Enter") submit(); });
  } else {
    zone.innerHTML = `<div class="judge-row" style="margin-top:6px;">
      <button class="judge-btn unknown" id="examUnknown">✗ Wusste ich nicht</button>
      <button class="judge-btn known" id="examKnown">✓ Wusste ich</button>
    </div>`;
    $("#examKnown").addEventListener("click", () => recordExamAnswer(card, true));
    $("#examUnknown").addEventListener("click", () => recordExamAnswer(card, false));
  }
}
function recordExamAnswer(card, correct){
  clearInterval(examState.timer);
  if(card){
    examState.answers.push({card, correct});
    if(correct) examState.score++;
  }
  examState.index++;
  renderExamCard();
}
function renderExamResults(){
  const total = examState.queue.length;
  const pct = total ? Math.round((examState.score/total)*100) : 0;
  const wrong = examState.answers.filter(a => !a.correct);
  examBody.innerHTML = `
    <div class="exam-result">
      <div class="exam-score">${pct}%</div>
      <div class="exam-score-label">Ergebnis</div>
      <div class="exam-summary-row">
        <div><b style="color:var(--success)">${examState.score}</b><span style="font-size:11.5px;color:var(--text-muted)">Richtig</span></div>
        <div><b style="color:var(--danger)">${wrong.length}</b><span style="font-size:11.5px;color:var(--text-muted)">Falsch</span></div>
        <div><b>${total}</b><span style="font-size:11.5px;color:var(--text-muted)">Gesamt</span></div>
      </div>
      ${wrong.length ? `<div class="review-list">` + wrong.map(w => `<div class="review-item">${escapeHtml(w.card.question)}</div>`).join("") + `</div>` : ""}
      <div class="exam-action-row">
        <button class="btn-ghost" id="examReviewBtn">Falsche wiederholen</button>
        <button class="btn-solid" id="examRestartBtn">Neuer Versuch</button>
      </div>
    </div>
  `;
  $("#examRestartBtn").addEventListener("click", startExam);
  $("#examReviewBtn").addEventListener("click", () => {
    if(wrong.length === 0) return;
    examState.queue = wrong.map(w => w.card);
    examState.index = 0;
    examState.score = 0;
    examState.answers = [];
    renderExamCard();
  });
}

/* ============================================================
   BOOTSTRAP
   ============================================================ */
buildChips();
applyFilters(true);

})();
</script>

<!--
  HINWEIS ZUR PERSISTENZ:
