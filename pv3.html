<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PflegefachProfi • Krankheitsbilder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:#f9fafb;color:#111827;overflow-x:hidden;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:#f1f5f9;}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:99px;}

:root{
  --primary:#2563eb;--primary-light:#3b82f6;--primary-dark:#1e40af;
  --success:#10b981;--warning:#f59e0b;--error:#ef4444;
  --gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;
  --gray-300:#d1d5db;--gray-400:#9ca3af;--gray-500:#6b7280;
  --gray-600:#4b5563;--gray-700:#374151;--gray-800:#1f2937;--gray-900:#111827;
  --radius:12px;--shadow:0 1px 3px rgba(0,0,0,.1);
  --shadow-lg:0 10px 40px rgba(0,0,0,.12);
}

.container{max-width:1100px;margin:0 auto;padding:0 20px;}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--gray-200);display:flex;justify-content:space-around;padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:1000;box-shadow:0 -2px 10px rgba(0,0,0,.05);}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 16px;text-decoration:none;color:var(--gray-500);font-size:11px;font-weight:600;border-radius:8px;transition:.2s;min-width:70px;}
.nav-item i{font-size:20px;transition:.2s;}
.nav-item.active{color:var(--primary);}
.nav-item:hover{background:var(--gray-50);}

/* HEADER */
.header{background:#fff;border-bottom:1px solid var(--gray-200);position:sticky;top:0;z-index:999;padding:16px 0;}
.header-content{display:flex;align-items:center;justify-content:space-between;}
.header-title{font-size:20px;font-weight:800;color:var(--gray-900);}
.header-stats{display:flex;gap:8px;align-items:center;}
.stat-badge{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:99px;font-size:13px;font-weight:700;background:var(--gray-100);color:var(--gray-700);}
.stat-badge.xp{background:#dbeafe;color:#1e40af;}
.stat-badge i{font-size:14px;}

/* PROGRESS */
.progress-section{padding:20px 0;background:linear-gradient(135deg,#eff6ff 0%,#fef3c7 100%);margin-bottom:20px;}
.progress-card{background:rgba(255,255,255,.7);backdrop-filter:blur(10px);border-radius:var(--radius);padding:20px;border:1px solid rgba(255,255,255,.8);}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.progress-title{font-size:14px;font-weight:700;color:var(--gray-700);}
.progress-stat{font-size:24px;font-weight:900;color:var(--primary);}
.progress-bar{height:10px;background:rgba(255,255,255,.8);border-radius:99px;overflow:hidden;box-shadow:inset 0 1px 3px rgba(0,0,0,.1);}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--success),var(--primary));border-radius:99px;transition:width .6s ease;}

/* FILTERS */
.filters{display:flex;gap:8px;padding:16px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.filters::-webkit-scrollbar{display:none;}
.filter-chip{padding:8px 16px;border-radius:99px;border:1.5px solid var(--gray-300);background:#fff;font-size:13px;font-weight:700;color:var(--gray-600);white-space:nowrap;cursor:pointer;transition:.2s;}
.filter-chip.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.filter-chip:hover{border-color:var(--primary);}

/* DISEASE CARDS */
.diseases-list{display:flex;flex-direction:column;gap:12px;padding-bottom:100px;}
.disease-card{background:#fff;border-radius:var(--radius);border:1.5px solid var(--gray-200);overflow:hidden;transition:.2s;position:relative;}
.disease-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px);}
.disease-card.learned{border-color:var(--success);background:linear-gradient(to bottom,#fff,#f0fdf4);}
.disease-card.learned .disease-badge{background:var(--success);color:#fff;}

.disease-header{padding:16px;cursor:pointer;display:flex;align-items:center;gap:12px;}
.disease-badge{width:40px;height:40px;border-radius:10px;background:var(--gray-100);color:var(--gray-600);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;flex-shrink:0;}
.disease-info{flex:1;min-width:0;}
.disease-name{font-size:16px;font-weight:800;color:var(--gray-900);margin-bottom:4px;}
.disease-category{font-size:12px;color:var(--gray-500);font-weight:600;}
.expand-btn{width:32px;height:32px;border-radius:8px;background:var(--gray-100);display:flex;align-items:center;justify-content:center;color:var(--gray-600);transition:.3s;}
.disease-card.expanded .expand-btn{transform:rotate(180deg);background:#dbeafe;color:var(--primary);}

.disease-body{display:none;padding:0 16px 16px;animation:slideDown .3s ease;}
.disease-card.expanded .disease-body{display:block;}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}

.content-section{margin-bottom:16px;}
.section-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.section-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.section-icon.def{background:#dbeafe;color:#1e40af;}
.section-icon.path{background:#fef3c7;color:#92400e;}
.section-icon.risk{background:#fee2e2;color:#991b1b;}
.section-icon.symp{background:#fce7f3;color:#9f1239;}
.section-icon.diag{background:#e0e7ff;color:#3730a3;}
.section-icon.ther{background:#d1fae5;color:#065f46;}
.section-icon.nurs{background:#ddd6fe;color:#5b21b6;}
.section-title{font-size:13px;font-weight:800;color:var(--gray-800);}
.section-content{font-size:14px;line-height:1.7;color:var(--gray-700);padding-left:36px;}
.section-content ul{list-style:none;display:flex;flex-direction:column;gap:6px;}
.section-content li{position:relative;padding-left:16px;}
.section-content li::before{content:'•';position:absolute;left:0;color:var(--primary);font-weight:900;}

/* NURSING INTERVENTIONS */
.nursing-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;padding-left:36px;}
.nursing-card{background:var(--gray-50);border:1.5px solid var(--gray-200);border-radius:8px;padding:12px;}
.nursing-card-title{font-size:13px;font-weight:700;color:var(--gray-900);margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.nursing-card-title i{color:var(--primary);font-size:12px;}
.nursing-card-desc{font-size:13px;color:var(--gray-600;line-height:1.6;}

/* TEST MODES */
.test-modes{display:flex;gap:10px;margin-top:16px;padding:0 16px 16px;}
.test-btn{flex:1;padding:12px;border-radius:10px;border:2px solid;font-weight:700;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:.2s;font-family:'Inter',sans-serif;}
.test-btn.quiz{background:#eff6ff;border-color:#3b82f6;color:#1e40af;}
.test-btn.quiz:hover{background:#dbeafe;}
.test-btn.flash{background:#fef3c7;border-color:#f59e0b;color:#92400e;}
.test-btn.flash:hover{background:#fde68a;}

/* MODAL */
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:2000;align-items:center;justify-content:center;padding:20px;}
.modal.active{display:flex;}
.modal-content{background:#fff;border-radius:16px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;animation:modalIn .3s ease;}
@keyframes modalIn{from{opacity:0;transform:scale(.95);}to{opacity:1;transform:scale(1);}}
.modal-header{padding:20px;border-bottom:1px solid var(--gray-200);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1;}
.modal-title{font-size:18px;font-weight:800;color:var(--gray-900);}
.modal-close{width:32px;height:32px;border-radius:8px;border:none;background:var(--gray-100);color:var(--gray-600);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;}
.modal-close:hover{background:var(--gray-200);}
.modal-body{padding:20px;}

/* QUIZ MODE */
.quiz-question{margin-bottom:24px;}
.quiz-q-text{font-size:15px;font-weight:700;color:var(--gray-900);margin-bottom:12px;line-height:1.5;}
.quiz-options{display:flex;flex-direction:column;gap:8px;}
.quiz-option{padding:12px 16px;border-radius:10px;border:2px solid var(--gray-300);background:#fff;cursor:pointer;transition:.2s;font-size:14px;color:var(--gray-700);}
.quiz-option:hover{border-color:var(--primary);background:#eff6ff;}
.quiz-option.selected{border-color:var(--primary);background:#eff6ff;color:var(--primary);font-weight:600;}
.quiz-option.correct{border-color:var(--success);background:#f0fdf4;color:var(--success);font-weight:600;}
.quiz-option.wrong{border-color:var(--error);background:#fef2f2;color:var(--error);font-weight:600;}
.quiz-option.disabled{pointer-events:none;opacity:.6;}
.quiz-submit{width:100%;padding:14px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--primary),#7c3aed);color:#fff;font-weight:700;font-size:15px;cursor:pointer;margin-top:12px;font-family:'Inter',sans-serif;}
.quiz-submit:hover{opacity:.9;}
.quiz-submit:disabled{opacity:.5;cursor:not-allowed;}
.quiz-result{background:var(--gray-50);border-radius:10px;padding:16px;text-align:center;margin-top:16px;}
.quiz-score{font-size:32px;font-weight:900;color:var(--primary);margin-bottom:8px;}
.quiz-feedback{font-size:14px;color:var(--gray-600);font-weight:600;}

/* FLASHCARD MODE */
.flashcard-container{display:flex;flex-direction:column;align-items:center;gap:20px;}
.flashcard-counter{font-size:14px;color:var(--gray-500);font-weight:600;}
.flashcard{width:100%;aspect-ratio:3/2;perspective:1000px;cursor:pointer;}
.flashcard-inner{position:relative;width:100%;height:100%;transition:transform .6s;transform-style:preserve-3d;}
.flashcard.flipped .flashcard-inner{transform:rotateY(180deg);}
.flashcard-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:12px;padding:24px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:16px;line-height:1.6;box-shadow:var(--shadow-lg);}
.flashcard-front{background:linear-gradient(135deg,#eff6ff,#dbeafe);color:var(--gray-900);font-weight:700;}
.flashcard-back{background:linear-gradient(135deg,#d1fae5,#a7f3d0);color:var(--gray-900);transform:rotateY(180deg);}
.flashcard-nav{display:flex;gap:12px;width:100%;}
.flashcard-nav button{flex:1;padding:12px;border-radius:10px;border:2px solid var(--gray-300);background:#fff;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;font-size:14px;}
.flashcard-nav button:hover{border-color:var(--primary);background:var(--gray-50);}
.flashcard-nav button:disabled{opacity:.4;cursor:not-allowed;}

/* LEARNED TOGGLE */
.learned-toggle{position:absolute;top:16px;right:16px;width:24px;height:24px;border-radius:6px;border:2px solid var(--gray-300);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:10;transition:.2s;}
.learned-toggle:hover{border-color:var(--success);}
.learned-toggle.active{background:var(--success);border-color:var(--success);color:#fff;}
.learned-toggle i{font-size:12px;}

/* TOAST */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--gray-900);color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;z-index:3000;animation:toastIn .3s ease;box-shadow:var(--shadow-lg);}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,10px);}to{opacity:1;transform:translate(-50%,0);}}
.toast.success{background:var(--success);}

/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px;color:var(--gray-400);}
.empty-state i{font-size:48px;margin-bottom:16px;opacity:.5;}
.empty-state p{font-size:14px;font-weight:600;}

/* CONFETTI */
.confetti-overlay{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:9999;}
.confetti{position:absolute;width:10px;height:10px;background:var(--primary);animation:confettiFall 3s ease-out forwards;}
@keyframes confettiFall{to{transform:translateY(100vh) rotate(720deg);opacity:0;}}

@media(max-width:640px){
  .container{padding:0 16px;}
  .nursing-grid{grid-template-columns:1fr;padding-left:0;margin-top:10px;}
  .section-content{padding-left:0;margin-top:8px;}
  .test-modes{flex-direction:column;}
  .header-title{font-size:18px;}
  .stat-badge{padding:5px 10px;font-size:12px;}
}
  </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="container header-content">
    <h1 class="header-title">Krankheitsbilder</h1>
    <div class="header-stats">
      <div class="stat-badge xp"><i class="fas fa-bolt"></i><span id="xpDisplay">0</span></div>
    </div>
  </div>
</header>

<!-- PROGRESS -->
<section class="progress-section">
  <div class="container">
    <div class="progress-card">
      <div class="progress-header">
        <span class="progress-title">Lernfortschritt</span>
        <span class="progress-stat"><span id="learnedCount">0</span>/<span id="totalCount">5</span></span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>
  </div>
</section>

<!-- FILTERS -->
<div class="container">
  <div class="filters">
    <button class="filter-chip active" data-filter="all">Alle</button>
    <button class="filter-chip" data-filter="Kardiologie">Kardiologie</button>
    <button class="filter-chip" data-filter="Neurologie">Neurologie</button>
    <button class="filter-chip" data-filter="Endokrinologie">Endokrinologie</button>
    <button class="filter-chip" data-filter="Respiratorisch">Respiratorisch</button>
  </div>
</div>

<!-- DISEASES LIST -->
<main class="container">
  <div class="diseases-list" id="diseasesList"></div>
  <div class="empty-state" id="emptyState" style="display:none;">
    <i class="fas fa-search"></i>
    <p>Keine Krankheitsbilder gefunden</p>
  </div>
</main>

<!-- MODAL -->
<div class="modal" id="testModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 class="modal-title" id="modalTitle">Quiz</h2>
      <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a href="#" class="nav-item active">
    <i class="fas fa-home"></i>
    <span>Home</span>
  </a>
  <a href="#" class="nav-item">
    <i class="fas fa-book-medical"></i>
    <span>Lernen</span>
  </a>
  <a href="#" class="nav-item">
    <i class="fas fa-chart-line"></i>
    <span>Fortschritt</span>
  </a>
  <a href="#" class="nav-item" onclick="resetProgress(event)">
    <i class="fas fa-rotate-left"></i>
    <span>Reset</span>
  </a>
</nav>

<div class="confetti-overlay" id="confettiContainer"></div>

<script>
// ═══════════════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════════════
const DISEASES = [
  {

    name: "Herzinsuffizienz",
    category: "Kardiologie",
    definition: "Herzinsuffizienz ist die Unfähigkeit des Herzens, ausreichend Blut zu pumpen, um den Körper mit Sauerstoff und Nährstoffen zu versorgen.",
    pathophysiology: "Das Herz verliert an Pumpkraft → Verminderte Auswurfleistung → Blut staut sich zurück (Rückwärtsversagen) → Minderperfusion der Organe (Vorwärtsversagen) → Kompensationsmechanismen (Sympathikus↑, RAAS-Aktivierung) → Langfristig: Myokardhypertrophie und Dilatation → Verschlechterung der Herzfunktion",

    symptoms: ["Dyspnoe (Luftnot), besonders bei Belastung", "Orthopnoe (Atemnot im Liegen)", "Müdigkeit und verminderte Leistungsfähigkeit", "Ödeme (Beine, Knöchel, Lunge)", "Nykturie (nächtliches Wasserlassen)", "Tachykardie", "Rasselgeräusche bei Lungenstauung"],
    diagnostics: ["Anamnese und körperliche Untersuchung", "EKG (Rhythmusstörungen, Hypertrophie)", "Echokardiographie (Ejektionsfraktion, Wandbewegung)", "Röntgen-Thorax (vergrößertes Herz, Lungenstauung)", "BNP/NT-proBNP (Herzinsuffizienzmarker)", "Labor: Elektrolyte, Nierenwerte, Blutbild"],

      {q: "Welche Medikamentengruppe ist Standard bei Herzinsuffizienz?", options: ["Antibiotika", "ACE-Hemmer und Betablocker", "Schmerzmittel", "Kortison"], correct: 1},

  {

    name: "Schlaganfall (Apoplex)",
    category: "Neurologie",
    definition: "Ein Schlaganfall ist eine plötzliche Durchblutungsstörung des Gehirns, die zu neurologischen Ausfällen führt.",

// STATE
// ═══════════════════════════════════════════════════════════════════
let state = {
  learned: new Set(),
  quizScores: {},
  xp: 0,
  currentFilter: 'all',
  currentTest: null
};

function loadState() {
  const saved = localStorage.getItem('diseaseAppState');
  if (saved) {
    const parsed = JSON.parse(saved);
    state.learned = new Set(parsed.learned || []);
    state.quizScores = parsed.quizScores || {};
    state.xp = parsed.xp || 0;
  }
}

function saveState() {
  localStorage.setItem('diseaseAppState', JSON.stringify({
    learned: [...state.learned],
    quizScores: state.quizScores,
    xp: state.xp
  }));
}

// RENDERING
// ═══════════════════════════════════════════════════════════════════
function renderDiseases() {
  const container = document.getElementById('diseasesList');
  const empty = document.getElementById('emptyState');
  
  let filtered = DISEASES;
  if (state.currentFilter !== 'all') {
    filtered = DISEASES.filter(d => d.category === state.currentFilter);
  }
  
  if (filtered.length === 0) {
    container.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  
  empty.style.display = 'none';
  container.innerHTML = filtered.map(renderDisease).join('');
}

function toggleExpand(id) {
  const card = document.querySelector(`[data-id="${id}"]`);
  card.classList.toggle('expanded');
}

function toggleLearned(id, e) {
  e.stopPropagation();
  if (state.learned.has(id)) {
    state.learned.delete(id);
  } else {
    state.learned.add(id);
    state.xp += 50;
    showToast('Als gelernt markiert! +50 XP', 'success');
  }
  saveState();
  updateProgress();
  renderDiseases();
}

function updateProgress() {
  const total = DISEASES.length;
  const learned = state.learned.size;
  const percent = Math.round((learned / total) * 100);
  
  document.getElementById('learnedCount').textContent = learned;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('progressFill').style.width = percent + '%';
  document.getElementById('xpDisplay').textContent = state.xp;
}

// ═══════════════════════════════════════════════════════════════════
// FILTERS
// ═══════════════════════════════════════════════════════════════════
document.querySelectorAll('.filter-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    state.currentFilter = chip.dataset.filter;
    renderDiseases();
  });
});

// ═══════════════════════════════════════════════════════════════════
// QUIZ MODE
// ═══════════════════════════════════════════════════════════════════
function openQuiz(diseaseId) {
  const disease = DISEASES.find(d => d.id === diseaseId);
  state.currentTest = { type: 'quiz', diseaseId, answers: [] };
  
  document.getElementById('modalTitle').textContent = `Quiz: ${disease.name}`;
  document.getElementById('modalBody').innerHTML = `
    ${disease.quiz.map((q, i) => `
      <div class="quiz-question">
        <div class="quiz-q-text">${i + 1}. ${q.q}</div>
        <div class="quiz-options">
          ${q.options.map((opt, oi) => `
            <div class="quiz-option" onclick="selectQuizOption(${i}, ${oi})">${opt}</div>
          `).join('')}
        </div>
      </div>
    `).join('')}
    <button class="quiz-submit" onclick="submitQuiz()">Antworten prüfen</button>
  `;
  
  document.getElementById('testModal').classList.add('active');
}

function selectQuizOption(qIdx, optIdx) {
  const modal = document.getElementById('modalBody');
  const options = modal.querySelectorAll('.quiz-question')[qIdx].querySelectorAll('.quiz-option');
  options.forEach(opt => opt.classList.remove('selected'));
  options[optIdx].classList.add('selected');
  state.currentTest.answers[qIdx] = optIdx;
}

function submitQuiz() {
  const disease = DISEASES.find(d => d.id === state.currentTest.diseaseId);
  let correct = 0;
  
  disease.quiz.forEach((q, i) => {
    const userAnswer = state.currentTest.answers[i];
    const isCorrect = userAnswer === q.correct;
    if (isCorrect) correct++;
    
    const options = document.querySelectorAll('.quiz-question')[i].querySelectorAll('.quiz-option');
    options.forEach((opt, oi) => {
      opt.classList.add('disabled');
      if (oi === q.correct) {
        opt.classList.add('correct');
      } else if (oi === userAnswer && !isCorrect) {
        opt.classList.add('wrong');
      }
    });
  });
  
  const xpGain = correct * 10;
  state.xp += xpGain;
  state.quizScores[state.currentTest.diseaseId] = correct;
  saveState();
  updateProgress();
  
  document.querySelector('.quiz-submit').style.display = 'none';
  document.getElementById('modalBody').insertAdjacentHTML('beforeend', `
    <div class="quiz-result">
      <div class="quiz-score">${correct}/${disease.quiz.length}</div>
      <div class="quiz-feedback">+${xpGain} XP verdient!</div>
    </div>
  `);
  
  if (correct === disease.quiz.length) {
    triggerConfetti();
  }
  
  renderDiseases();
}

// ═══════════════════════════════════════════════════════════════════
// FLASHCARD MODE
// ═══════════════════════════════════════════════════════════════════
let flashcardIndex = 0;

function openFlashcards(diseaseId) {
  const disease = DISEASES.find(d => d.id === diseaseId);
  state.currentTest = { type: 'flashcard', diseaseId };
  flashcardIndex = 0;
  
  document.getElementById('modalTitle').textContent = `Lernkarten: ${disease.name}`;
  renderFlashcard(disease);
  document.getElementById('testModal').classList.add('active');
}

function renderFlashcard(disease) {
  const card = disease.flashcards[flashcardIndex];
  document.getElementById('modalBody').innerHTML = `
    <div class="flashcard-container">
      <div class="flashcard-counter">Karte ${flashcardIndex + 1} von ${disease.flashcards.length}</div>
      <div class="flashcard" onclick="flipCard()">
        <div class="flashcard-inner" id="flashcardInner">
          <div class="flashcard-face flashcard-front">${card.q}</div>
          <div class="flashcard-face flashcard-back">${card.a}</div>
        </div>
      </div>
      <div class="flashcard-nav">
        <button onclick="prevFlashcard()" ${flashcardIndex === 0 ? 'disabled' : ''}>
          <i class="fas fa-arrow-left"></i> Zurück
        </button>
        <button onclick="nextFlashcard()" ${flashcardIndex === disease.flashcards.length - 1 ? 'disabled' : ''}>
          Weiter <i class="fas fa-arrow-right"></i>
        </button>
      </div>
    </div>
  `;
}

function flipCard() {
  document.querySelector('.flashcard').classList.toggle('flipped');
}

function prevFlashcard() {
  if (flashcardIndex > 0) {
    flashcardIndex--;
    const disease = DISEASES.find(d => d.id === state.currentTest.diseaseId);
    renderFlashcard(disease);
  }
}

function nextFlashcard() {
  const disease = DISEASES.find(d => d.id === state.currentTest.diseaseId);
  if (flashcardIndex < disease.flashcards.length - 1) {
    flashcardIndex++;
    renderFlashcard(disease);
  }
}

function closeModal() {
  document.getElementById('testModal').classList.remove('active');
  state.currentTest = null;
}

// ═══════════════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════════════
function showToast(msg, type = 'success') {
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function triggerConfetti() {
  const container = document.getElementById('confettiContainer');
  const colors = ['#2563eb', '#10b981', '#f59e0b', '#ef4444'];
  for (let i = 0; i < 40; i++) {
    const confetti = document.createElement('div');
    confetti.className = 'confetti';
    confetti.style.left = Math.random() * 100 + '%';
    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
    confetti.style.animationDelay = Math.random() * 0.3 + 's';
    container.appendChild(confetti);
    setTimeout(() => confetti.remove(), 3500);
  }
}

function resetProgress(e) {
  e.preventDefault();
  if (confirm('Lernfortschritt wirklich zurücksetzen?')) {
    state = { learned: new Set(), quizScores: {}, xp: 0, currentFilter: 'all', currentTest: null };
    saveState();
    updateProgress();
    renderDiseases();
    showToast('Fortschritt zurückgesetzt');
  }
}

// ═══════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  loadState();
  updateProgress();
  renderDiseases();
});
</script>
